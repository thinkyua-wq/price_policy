<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3개 본부 통합 관리 시스템</title>
<script>
  // === 다중 CDN 폴백 시스템 ===
  // CDN이 차단되거나 느릴 경우 자동으로 다음 CDN을 시도합니다.
  // 한국/중국 회사 네트워크 환경에서도 안정 동작하도록 4개 CDN 사용.
  (function() {
    var libs = [
      {
        name: 'tailwind',
        check: function() { return typeof tailwind !== 'undefined' || document.querySelector('[data-tailwind-loaded]') !== null; },
        urls: [
          'https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4',
          'https://cdn.tailwindcss.com',
          'https://unpkg.com/@tailwindcss/browser@4',
          'https://fastly.jsdelivr.net/npm/@tailwindcss/browser@4',
        ],
        optional: true  // Tailwind는 선택사항 (실패해도 앱은 동작)
      },
      {
        name: 'react',
        check: function() { return typeof React !== 'undefined'; },
        urls: [
          'https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js',
          'https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js',
          'https://unpkg.com/react@18.3.1/umd/react.production.min.js',
          'https://fastly.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js',
        ]
      },
      {
        name: 'react-dom',
        check: function() { return typeof ReactDOM !== 'undefined'; },
        urls: [
          'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js',
          'https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js',
          'https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js',
          'https://fastly.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js',
        ]
      },
      {
        name: 'prop-types',
        check: function() { return typeof PropTypes !== 'undefined'; },
        urls: [
          'https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js',
          'https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js',
          'https://unpkg.com/prop-types@15.8.1/prop-types.min.js',
          'https://fastly.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js',
        ]
      },
      {
        name: 'recharts',
        check: function() { return typeof Recharts !== 'undefined'; },
        urls: [
          'https://cdnjs.cloudflare.com/ajax/libs/Recharts/2.12.7/Recharts.js',
          'https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js',
          'https://unpkg.com/recharts@2.12.7/umd/Recharts.js',
          'https://fastly.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js',
        ]
      },
      {
        name: 'babel',
        check: function() { return typeof Babel !== 'undefined'; },
        urls: [
          'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js',
          'https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js',
          'https://unpkg.com/@babel/standalone/babel.min.js',
          'https://fastly.jsdelivr.net/npm/@babel/standalone@7/babel.min.js',
        ]
      },
      {
        name: 'xlsx',
        check: function() { return typeof XLSX !== 'undefined'; },
        urls: [
          'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
          'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
          'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js',
          'https://fastly.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
        ],
        optional: true
      }
    ];

    // 로딩 상태 표시
    var loadingStatus = document.createElement('div');
    loadingStatus.style.cssText = 'margin-top: 12px; color: #64748b; font-size: 11px; font-family: system-ui;';
    loadingStatus.id = 'cdn-status';

    function setStatus(msg) {
      try { loadingStatus.textContent = msg; } catch (e) {}
    }

    // 순차적으로 라이브러리 로드 (의존성 순서 중요)
    function loadLib(libIndex) {
      if (libIndex >= libs.length) {
        // 모든 라이브러리 로드 완료
        setStatus('모든 라이브러리 로드 완료, 앱 초기화 중...');
        if (typeof window.__startApp === 'function') window.__startApp();
        return;
      }

      var lib = libs[libIndex];

      // 이미 로드된 경우 다음으로
      try {
        if (lib.check()) {
          loadLib(libIndex + 1);
          return;
        }
      } catch (e) {}

      tryUrl(lib, 0, libIndex);
    }

    function tryUrl(lib, urlIndex, libIndex) {
      if (urlIndex >= lib.urls.length) {
        // 모든 CDN 실패
        if (lib.optional) {
          // 선택사항이면 무시하고 다음 라이브러리로
          console.warn('[CDN] ' + lib.name + ' 로드 실패 (선택사항, 무시)');
          loadLib(libIndex + 1);
        } else {
          showError(lib.name);
        }
        return;
      }

      var url = lib.urls[urlIndex];
      var script = document.createElement('script');
      script.crossOrigin = 'anonymous';
      script.src = url;
      setStatus('라이브러리 로드 중: ' + lib.name + ' (' + (urlIndex + 1) + '/' + lib.urls.length + ')');

      script.onload = function() {
        // Tailwind 같은 옵셔널 라이브러리는 onload 발생만으로 성공 처리
        if (lib.optional) {
          try { if (lib.check && !lib.check()) {} } catch(e) {}
          loadLib(libIndex + 1);
          return;
        }
        // 실제로 로드되었는지 확인
        setTimeout(function() {
          try {
            if (lib.check()) {
              loadLib(libIndex + 1);
            } else {
              // 스크립트는 로드됐지만 객체가 안 나타남 - 다음 CDN 시도
              tryUrl(lib, urlIndex + 1, libIndex);
            }
          } catch (e) {
            tryUrl(lib, urlIndex + 1, libIndex);
          }
        }, 50);
      };

      script.onerror = function() {
        // 이 CDN 실패, 다음 CDN 시도
        tryUrl(lib, urlIndex + 1, libIndex);
      };

      document.head.appendChild(script);
    }

    function showError(failedLib) {
      var box = document.getElementById('error-box');
      if (!box) return;
      box.style.display = 'block';
      box.innerHTML =
        '<strong>⚠️ 라이브러리 로드 실패</strong><br>' +
        '<b>' + failedLib + '</b><br><br>' +
        '<b>해결 방법:</b><br>' +
        '• 인터넷 연결을 확인해 주세요<br>' +
        '• 회사 네트워크에서 외부 CDN이 모두 차단된 환경입니다<br>' +
        '• 다른 네트워크(개인 Wi-Fi / 핫스팟)로 시도해 보세요<br>' +
        '• 또는 IT 부서에 다음 도메인 허용 요청:<br>' +
        '&nbsp;&nbsp;cdnjs.cloudflare.com, cdn.jsdelivr.net, unpkg.com';
      var loading = document.getElementById('loading');
      if (loading) loading.classList.add('hide');
    }

    // DOMContentLoaded 후 로드 시작
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() {
        var loading = document.getElementById('loading');
        if (loading) loading.appendChild(loadingStatus);
        loadLib(0);
      });
    } else {
      var loading = document.getElementById('loading');
      if (loading) loading.appendChild(loadingStatus);
      loadLib(0);
    }
  })();
</script>
<style>
  /* === 중국어 한자(CJK Unified Ideographs)만 Microsoft YaHei로 렌더링 === */
  /* 한국어/영어/숫자는 영향 안 받음 */
  @font-face {
    font-family: 'CJKChineseFont';
    src: local('Microsoft YaHei'), local('微软雅黑'), local('PingFang SC'), local('Source Han Sans CN'), local('WenQuanYi Micro Hei'), local('SimHei'), local('SimSun');
    /* CJK Unified Ideographs (한자 기본) + Extension A + Compatibility Ideographs */
    unicode-range: U+4E00-9FFF, U+3400-4DBF, U+F900-FAFF, U+20000-2A6DF, U+2A700-2B73F, U+2B740-2B81F, U+2B820-2CEAF, U+2F800-2FA1F;
    font-display: swap;
  }

  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "맑은 고딕", "CJKChineseFont", "Microsoft YaHei", "微软雅黑", "PingFang SC", "Source Han Sans CN", "WenQuanYi Micro Hei", system-ui, sans-serif; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* ===== 컬럼 너비 조절 기능 ===== */
  /* 모든 표 헤더(th)에 우측 드래그 핸들 추가 */
  table th {
    position: relative;
    overflow: visible !important;
  }
  table th .col-resizer {
    position: absolute;
    top: 0;
    right: -3px;
    width: 6px;
    height: 100%;
    cursor: col-resize;
    user-select: none;
    z-index: 10;
    background: transparent;
    transition: background 0.15s;
  }
  table th .col-resizer:hover,
  table th .col-resizer.dragging {
    background: #3b82f6;
  }
  table th .col-resizer::before {
    content: '';
    position: absolute;
    top: 25%;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 50%;
    background: #cbd5e1;
  }
  table th:hover .col-resizer::before {
    background: #94a3b8;
  }
  body.col-resizing {
    cursor: col-resize !important;
    user-select: none !important;
  }
  body.col-resizing * {
    cursor: col-resize !important;
    user-select: none !important;
  }
  #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f1f5f9; font-family: system-ui, "맑은 고딕", sans-serif; z-index: 9999; }
  #loading.hide { display: none; }
  .spinner { width: 48px; height: 48px; border: 4px solid #cbd5e1; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error-box { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 16px 24px; border-radius: 8px; max-width: 600px; font-family: system-ui, sans-serif; z-index: 10000; }

  /* === 표 첫 컬럼 sticky (가로 스크롤 시 고정) === */
  table[data-table-id] thead th:first-child,
  table[data-table-id] tfoot td:first-child {
    position: sticky;
    left: 0;
    z-index: 5;
    background-color: #f1f5f9; /* slate-100 (헤더 회색과 동일) */
  }
  table[data-table-id] tbody td:first-child {
    position: sticky;
    left: 0;
    z-index: 4;
    background-color: #ffffff; /* 흰색 */
  }
  /* 호버 시 첫 컬럼도 살짝 강조 */
  table[data-table-id] tbody tr:hover td:first-child {
    background-color: #f8fafc; /* slate-50 */
  }
  /* 첫 컬럼 오른쪽 그림자 (구분감) */
  table[data-table-id] thead th:first-child,
  table[data-table-id] tbody td:first-child,
  table[data-table-id] tfoot td:first-child {
    box-shadow: 1px 0 0 0 #e2e8f0;
  }

  /* === 정렬 가능 헤더 === */
  table[data-table-id] thead th.sortable-header {
    cursor: pointer;
    user-select: none;
    transition: background-color 0.15s;
    position: relative;
  }
  table[data-table-id] thead th.sortable-header:hover {
    background-color: #e2e8f0; /* slate-200 */
  }
  table[data-table-id] thead th.sortable-header .sort-icon {
    display: inline-block;
    margin-left: 4px;
    font-size: 10px;
    color: #94a3b8; /* slate-400 */
    vertical-align: middle;
  }
  table[data-table-id] thead th.sortable-header.sort-asc .sort-icon::after {
    content: '▲';
    color: #2563eb; /* blue-600 */
  }
  table[data-table-id] thead th.sortable-header.sort-desc .sort-icon::after {
    content: '▼';
    color: #2563eb; /* blue-600 */
  }
  table[data-table-id] thead th.sortable-header:not(.sort-asc):not(.sort-desc) .sort-icon::after {
    content: '↕';
    opacity: 0.5;
  }
</style>
</head>
<body class="bg-slate-100">
<div id="loading">
  <div class="spinner"></div>
  <div style="margin-top: 16px; color: #475569; font-size: 14px;">대시보드 로딩 중...</div>
  <div style="margin-top: 8px; color: #94a3b8; font-size: 12px;">처음 실행 시 라이브러리 다운로드로 몇 초 걸릴 수 있습니다.</div>
</div>
<div id="error-box"></div>
<div id="root"></div>

<script>
  // 전역 에러 캐치
  window.addEventListener('error', function(e) {
    if (e.message && e.message.indexOf('Script error') === -1) {
      var box = document.getElementById('error-box');
      if (!box) return;
      if (box.style.display !== 'block') {
        box.style.display = 'block';
        box.innerHTML = '<strong>⚠️ 오류 발생</strong><br>' + e.message;
      }
    }
  });

  // CDN 로드 완료 후 호출되는 앱 시작 함수
  // (다중 CDN 폴백 시스템이 모든 라이브러리 로드 후 호출)
  window.__startApp = function() {
    var loading = document.getElementById('loading');
    var babelScript = document.getElementById('app-babel-script');
    if (!babelScript) {
      if (loading) loading.classList.add('hide');
      return;
    }
    try {
      // Babel로 JSX 코드를 변환하여 실행
      var transformed = Babel.transform(babelScript.textContent, {
        presets: ['react']
      }).code;
      var runner = document.createElement('script');
      runner.textContent = transformed;
      document.body.appendChild(runner);
      // 로딩 화면 숨김
      setTimeout(function() {
        if (loading) loading.classList.add('hide');
        // 컬럼 리사이저 시작
        startColumnResizer();
      }, 100);
    } catch (e) {
      var box = document.getElementById('error-box');
      if (box) {
        box.style.display = 'block';
        box.innerHTML = '<strong>⚠️ 앱 시작 실패</strong><br>' + e.message;
      }
      if (loading) loading.classList.add('hide');
    }
  };

  // ===== 컬럼 리사이저 헬퍼 =====
  // 모든 <table>의 <th>에 드래그 핸들을 자동으로 추가합니다.
  // 사용자가 마우스로 끌어서 컬럼 너비를 조절할 수 있습니다.
  // 조절된 너비는 localStorage에 자동 저장되어 새로고침해도 유지됩니다.
  function startColumnResizer() {
    var STORAGE_KEY = 'dashboard_column_widths_v1';

    // 저장된 너비 불러오기
    function loadWidths() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
      catch (e) { return {}; }
    }

    // 너비 저장
    function saveWidths(widths) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(widths)); }
      catch (e) {}
    }

    // 표 식별자 생성 (위치 기반)
    function getTableId(table) {
      // 표의 첫 번째 헤더 텍스트 + 페이지 내 위치로 식별
      var firstTh = table.querySelector('th');
      var firstHeader = firstTh ? firstTh.textContent.trim().slice(0, 20) : '';
      var allTables = Array.from(document.querySelectorAll('table'));
      var idx = allTables.indexOf(table);
      return 'table_' + idx + '_' + firstHeader.replace(/\s+/g, '_');
    }

    // 컬럼 식별자 (표 ID + 헤더 인덱스)
    function getColId(tableId, thIndex) {
      return tableId + '_col_' + thIndex;
    }

    // 단일 <th>에 리사이저 추가
    function attachResizer(th, thIndex, tableId, widths) {
      // 이미 추가됐으면 스킵
      if (th.querySelector('.col-resizer')) return;
      // colspan 있는 경우는 패스 (멀티헤더 1단)
      if (th.colSpan > 1) return;

      // 저장된 너비 복원
      var colKey = getColId(tableId, thIndex);
      if (widths[colKey]) {
        th.style.width = widths[colKey] + 'px';
        th.style.minWidth = widths[colKey] + 'px';
      }

      // 리사이즈 핸들 생성
      var handle = document.createElement('div');
      handle.className = 'col-resizer';
      th.appendChild(handle);

      // 드래그 이벤트
      var startX, startWidth;
      handle.addEventListener('mousedown', function(e) {
        e.preventDefault();
        e.stopPropagation();
        startX = e.clientX;
        startWidth = th.offsetWidth;
        handle.classList.add('dragging');
        document.body.classList.add('col-resizing');

        function onMove(ev) {
          var dx = ev.clientX - startX;
          var newWidth = Math.max(40, startWidth + dx);  // 최소 너비 40px
          th.style.width = newWidth + 'px';
          th.style.minWidth = newWidth + 'px';
        }

        function onUp() {
          handle.classList.remove('dragging');
          document.body.classList.remove('col-resizing');
          // 저장
          var w = loadWidths();
          w[colKey] = th.offsetWidth;
          saveWidths(w);
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });

      // 더블클릭 → 너비 리셋
      handle.addEventListener('dblclick', function(e) {
        e.stopPropagation();
        th.style.width = '';
        th.style.minWidth = '';
        var w = loadWidths();
        delete w[colKey];
        saveWidths(w);
      });
    }

    // 모든 표 처리
    function processAllTables() {
      var widths = loadWidths();
      var tables = document.querySelectorAll('table');
      tables.forEach(function(table) {
        // React ResizableHeader를 쓰는 표는 제외 (자체 너비 저장 사용)
        if (table.getAttribute('data-table-id') === 'bd_customers') return;
        if (table.querySelector('thead .cursor-col-resize')) return;
        var tableId = getTableId(table);
        // 모든 헤더 행을 한 번에 처리 (rowSpan으로 1단에만 있는 셀도 포함)
        var allThs = table.querySelectorAll('thead th');
        if (allThs.length === 0) return;

        // 리사이저는 colspan이 없는 모든 th에 부착 (attachResizer 내부에서 colSpan>1은 자동 스킵)
        allThs.forEach(function(th, idx) {
          attachResizer(th, idx, tableId, widths);
        });
      });
    }

    // 초기 실행
    setTimeout(processAllTables, 500);

    // React가 표를 다시 렌더링할 때마다 재적용
    // MutationObserver로 표 변경 감지
    var observer = new MutationObserver(function(mutations) {
      var needsUpdate = false;
      mutations.forEach(function(m) {
        m.addedNodes.forEach(function(node) {
          if (node.nodeType === 1 && (node.tagName === 'TABLE' || node.querySelector && node.querySelector('table'))) {
            needsUpdate = true;
          }
        });
      });
      if (needsUpdate) {
        clearTimeout(window.__resizerDebounce);
        window.__resizerDebounce = setTimeout(processAllTables, 200);
      }
    });

    var root = document.getElementById('root');
    if (root) {
      observer.observe(root, { childList: true, subtree: true });
    }

    // 메뉴 전환 시 재적용 (페이지 변경 감지)
    document.addEventListener('click', function() {
      setTimeout(processAllTables, 300);
    });

    // 전역 헬퍼: 모든 컬럼 너비 리셋
    window.__resetColumnWidths = function() {
      localStorage.removeItem(STORAGE_KEY);
      document.querySelectorAll('table th').forEach(function(th) {
        th.style.width = '';
        th.style.minWidth = '';
      });

const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyd1IAT6p78Mu9oxZtdfrDdGdzvT5AcvRxzi4OLDPACOBRMezfwbUg1Tz-8B9X47e5Lxw/exec';

// localStorage 키
const LS_SHEETS_DATA = 'dashboard_sheets_data_v1';
const LS_SHEETS_FETCHED_AT = 'dashboard_sheets_fetched_at_v1';
const LS_SHEETS_ERROR = 'dashboard_sheets_last_error_v1';

/**
 * Google Sheets에서 데이터 가져오기 (JSONP 방식 - CORS 우회)
 * 성공 시 localStorage에 캐싱.
 * 실패 시 마지막 캐시 반환. 캐시도 없으면 null.
 */
function fetchSheetsData() {
  return new Promise((resolve, reject) => {
    if (!GOOGLE_SCRIPT_URL) {
      reject(new Error('Google Apps Script URL이 설정되지 않았습니다. dashboard.html 상단의 GOOGLE_SCRIPT_URL을 수정하세요.'));
      return;
    }

    // JSONP 콜백 함수 등록
    const cbName = '__sheetsCallback_' + Date.now();
    const script = document.createElement('script');
    let timer;

    window[cbName] = (data) => {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      if (data && data.error) {
        reject(new Error(data.error));
      } else {
        // 캐싱
        try {
          localStorage.setItem(LS_SHEETS_DATA, JSON.stringify(data));
          localStorage.setItem(LS_SHEETS_FETCHED_AT, new Date().toISOString());
          localStorage.removeItem(LS_SHEETS_ERROR);
        } catch (e) {}
        resolve(data);
      }
    };

    // 타임아웃 30초
    timer = setTimeout(() => {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('Google Sheets API 요청 타임아웃 (30초)'));
    }, 30000);

    const sep = GOOGLE_SCRIPT_URL.includes('?') ? '&' : '?';
    script.src = `${GOOGLE_SCRIPT_URL}${sep}callback=${cbName}`;
    script.onerror = () => {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('Google Sheets API 연결 실패 (네트워크 오류 또는 URL 잘못됨)'));
    };
    document.head.appendChild(script);
  });
}

/** localStorage에서 마지막 캐시 가져오기 */
function loadCachedSheetsData() {
  try {
    const raw = localStorage.getItem(LS_SHEETS_DATA);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

/** 마지막 가져온 시각 */
function getLastFetchedAt() {
  try {
    return localStorage.getItem(LS_SHEETS_FETCHED_AT);
  } catch (e) { return null; }
}

/** weekly_data 행 → 표준화 (필드 타입 강제 변환) */
function normalizeWeeklyRow(r) {
  const num = (v) => {
    const n = parseFloat(v);
    return isNaN(n) ? 0 : n;
  };
  return {
    id: r.id || ('row_' + Math.random().toString(36).slice(2, 10)),
    year: parseInt(r.year) || 0,
    month: parseInt(r.month) || 0,
    week: parseInt(r.week) || 0,
    headquarters: r.headquarters || r.hq || '',
    region: r.region || '',
    sales_category: r.sales_category || r.salesCategory || '',
    sales_system: r.sales_system || r.salesSystem || '',
    prepared_kits: num(r.prepared_kits ?? r.preparedKits),
    sold_kits: num(r.sold_kits ?? r.soldKits),
    revenue_krmb: num(r.revenue_krmb ?? r.revenueKrmb),
    target_people: num(r.target_people ?? r.targetPeople),
    progressed_people: num(r.progressed_people ?? r.progressedPeople),
    updated_at: r.updated_at || r.updatedAt || '',
  };
}

/**
 * weekly_data 필터링 + 기간 집계
 * @param {Array} data - weekly_data 배열 (normalized)
 * @param {Object} filter - { hq, region, salesCategory, salesSystem, year, month, week, periodType }
 *   periodType: 'weekly' | 'monthly' | 'yearly'
 */
function filterAndAggregateWeekly(data, filter) {
  let rows = data.map(normalizeWeeklyRow);

  // 본부 필터
  if (filter.hq && filter.hq !== '전체' && filter.hq !== 'overview') {
    rows = rows.filter(r => r.headquarters === filter.hq);
  }
  // 지역 필터
  if (filter.region && filter.region !== '전체') {
    rows = rows.filter(r => r.region === filter.region);
  }
  // 판매구분 필터
  if (filter.salesCategory && filter.salesCategory !== '전체') {
    rows = rows.filter(r => r.sales_category === filter.salesCategory);
  }
  // 판매시스템 필터
  if (filter.salesSystem && filter.salesSystem !== '전체') {
    rows = rows.filter(r => r.sales_system === filter.salesSystem);
  }
  // 연도 필터 (항상 적용)
  if (filter.year) {
    rows = rows.filter(r => r.year === filter.year);
  }

  // 기간 필터
  if (filter.periodType === 'weekly') {
    // 특정 주차만
    if (filter.week) rows = rows.filter(r => r.week === filter.week);
  } else if (filter.periodType === 'monthly') {
    // 해당 월의 모든 주차
    if (filter.month) rows = rows.filter(r => r.month === filter.month);
  }
  // 'yearly'는 위에서 year만 필터링하면 됨

  return rows;
}

/** 집계 합계 계산 */
function aggregateTotals(rows) {
  const total = {
    prepared_kits: 0,
    sold_kits: 0,
    revenue_krmb: 0,
    target_people: 0,
    progressed_people: 0,
    count: rows.length,
  };
  rows.forEach(r => {
    total.prepared_kits += r.prepared_kits;
    total.sold_kits += r.sold_kits;
    total.revenue_krmb += r.revenue_krmb;
    total.target_people += r.target_people;
    total.progressed_people += r.progressed_people;
  });
  // 계산식
  total.qty_achieve_rate = total.prepared_kits > 0 ? +(total.sold_kits / total.prepared_kits * 100).toFixed(1) : 0;
  total.person_achieve_rate = total.target_people > 0 ? +(total.progressed_people / total.target_people * 100).toFixed(1) : 0;
  return total;
}

/** 행별 자동 계산 (달성률 등) */
function calcRowMetrics(row) {
  const r = normalizeWeeklyRow(row);
  const qtyRate = r.prepared_kits > 0 ? +(r.sold_kits / r.prepared_kits * 100).toFixed(1) : 0;
  const personRate = r.target_people > 0 ? +(r.progressed_people / r.target_people * 100).toFixed(1) : 0;
  const avgRate = (qtyRate + personRate) / 2;
  let status;
  if (avgRate >= 80) status = '양호';
  else if (avgRate >= 60) status = '주의';
  else status = '미달';
  return { qtyRate, personRate, status };
}

const BRAND_BLUE = '#2563eb';

const formatNumber = (n) => typeof n !== 'number' ? n : n.toLocaleString('ko-KR');

// === 주차 옵션 (2026년 1주차 ~ 2028년 52주차, 총 156주) ===
const WEEK_OPTIONS = (() => {
  const opts = [];
  // 52주 → 12개월로 단순 매핑
  // 1~4주: 1월 1~4주차 / 5~8주: 2월 1~4주차 / ... / 49~52주: 12월 1~4주차
  // (5번째 주차는 다음 달의 1주차로 자연스럽게 흘러가도록 일부 월은 5주차 포함)
  for (let year = 2026; year <= 2028; year++) {
    for (let week = 1; week <= 52; week++) {
      // 단순 매핑: week를 4.33으로 나눠서 월 결정 (1~12월)
      const month = Math.min(12, Math.ceil(week / 4.333));
      // 해당 월 안에서 몇 번째 주차인지
      const monthStartWeek = Math.ceil((month - 1) * 4.333) + 1;
      const weekInMonth = week - monthStartWeek + 1;
      opts.push({
        value: `${year}-${String(week).padStart(2, '0')}`,
        label: `${year}년 ${month}월 ${weekInMonth}주차`,
        year,
        week,
        month,
        weekInMonth,
      });
    }
  }
  return opts;
})();

// 주차 값에서 연도/주차 분리
function parseWeekValue(weekStr) {
  if (!weekStr || typeof weekStr !== 'string') return { year: 2026, week: 1 };
  const [y, w] = weekStr.split('-');
  return { year: parseInt(y) || 2026, week: parseInt(w) || 1 };
}

const downloadCSV = (data, filename) => {
  if (!data || data.length === 0) return;
  const keys = Object.keys(data[0]);
  const csv = [keys.join(','), ...data.map(row => keys.map(k => `"${row[k] ?? ''}"`).join(','))].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${filename}.csv`;
  a.click();
  URL.revokeObjectURL(url);
};

const parseCSV = (text) => {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
  return lines.slice(1).map((line, idx) => {
    const values = line.match(/("[^"]*"|[^,]+)/g) || [];
    const obj = { id: Date.now() + idx };
    headers.forEach((h, i) => {
      let v = (values[i] || '').replace(/^"|"$/g, '').trim();
      if (v !== '' && !isNaN(Number(v))) v = Number(v);
      obj[h] = v;
    });
    return obj;
  });
};

/* ================ 공통 컴포넌트 ================ */
function KPICard({ label, value, suffix = '', prev, prevSuffix = '', invertColor = false, onEdit, editable = true }) {
  const [editing, setEditing] = useState(false);
  const [temp, setTemp] = useState(value);
  useEffect(() => { setTemp(value); }, [value]);

  const diff = typeof value === 'number' && typeof prev === 'number' ? +(value - prev).toFixed(1) : null;
  const goodUp = !invertColor;
  const isUp = diff !== null && diff > 0;
  const isDown = diff !== null && diff < 0;
  const colorClass = diff === null || diff === 0 ? 'text-slate-500'
    : (isUp && goodUp) || (isDown && !goodUp) ? 'text-emerald-600' : 'text-rose-600';

  const handleSave = () => {
    const n = parseFloat(temp);
    if (!isNaN(n) && onEdit) onEdit(n);
    setEditing(false);
  };

  return (
    <div className="bg-white border border-slate-200 rounded-md p-3 hover:border-blue-300 transition-colors">
      <div className="text-[12px] text-slate-500 text-center mb-1">{label}</div>
      <div className="flex items-baseline justify-center gap-0.5 min-h-[28px]">
        {editing ? (
          <input type="number" step="0.1" value={temp} autoFocus
            onChange={(e) => setTemp(e.target.value)} onBlur={handleSave}
            onKeyDown={(e) => { if (e.key === 'Enter') handleSave(); if (e.key === 'Escape') { setTemp(value); setEditing(false); }}}
            className="w-20 text-center text-2xl font-bold text-slate-900 border-b border-blue-400 outline-none" />
        ) : (
          <span className={`text-2xl font-bold text-slate-900 ${editable ? 'cursor-pointer hover:text-blue-600' : ''}`}
            onClick={() => editable && setEditing(true)} title={editable ? '클릭하여 수정' : ''}>
            {typeof value === 'number' ? (value % 1 === 0 ? formatNumber(value) : value.toFixed(1)) : value}
          </span>
        )}
        <span className="text-sm font-semibold text-slate-700">{suffix}</span>
      </div>
      {diff !== null && (
        <div className="text-[11px] text-slate-500 text-center mt-1 flex items-center justify-center gap-1">
          전월 대비
          <span className={`font-semibold ${colorClass}`}>
            {diff > 0 ? '▲' : diff < 0 ? '▼' : '—'} {Math.abs(diff).toFixed(1)}{prevSuffix}
          </span>
        </div>
      )}
    </div>
  );
}

function EditableCell({ value, onSave, type = 'text', align = 'left', suffix = '', placeholder = '', className = '' }) {
  const [editing, setEditing] = useState(false);
  const [temp, setTemp] = useState(value);
  useEffect(() => { setTemp(value); }, [value]);

  const handleSave = () => {
    let v = temp;
    if (type === 'number') { v = parseFloat(temp); if (isNaN(v)) v = 0; }
    onSave(v);
    setEditing(false);
  };

  const alignClass = align === 'right' ? 'text-right' : align === 'center' ? 'text-center' : 'text-left';

  if (editing) {
    return <input type={type === 'number' ? 'number' : 'text'} step="0.1" value={temp} autoFocus placeholder={placeholder}
      onChange={(e) => setTemp(e.target.value)} onBlur={handleSave}
      onKeyDown={(e) => { if (e.key === 'Enter') handleSave(); if (e.key === 'Escape') { setTemp(value); setEditing(false); }}}
      className={`w-full px-1 py-0.5 border border-blue-400 rounded outline-none text-slate-900 ${alignClass}`} />;
  }

  const isEmpty = value === '' || value === null || value === undefined;
  // className이 지정되면 커스텀 스타일 사용 (배너 등), 아니면 기본 스타일
  if (className) {
    return (
      <span onClick={() => setEditing(true)}
        className={`cursor-pointer hover:opacity-75 ${className}`} title="클릭하여 수정">
        {isEmpty ? <span className="opacity-60 italic">{placeholder || '입력'}</span> : (typeof value === 'number' ? (value % 1 === 0 ? formatNumber(value) : value.toFixed(1)) : value)}{!isEmpty && suffix}
      </span>
    );
  }
  return (
    <div onClick={() => setEditing(true)}
      className={`cursor-pointer hover:bg-blue-50 px-2 py-1 rounded ${alignClass}`} title="클릭하여 수정">
      {isEmpty ? <span className="text-slate-400 italic">{placeholder || '클릭하여 입력'}</span> : (typeof value === 'number' ? (value % 1 === 0 ? formatNumber(value) : value.toFixed(1)) : value)}{!isEmpty && suffix}
    </div>
  );
}

// 멀티라인 텍스트 입력 (3C 분석 표 등에서 사용)
// - Enter: 줄바꿈
// - Ctrl/Cmd+Enter 또는 외부 클릭: 저장
// - Esc: 취소
// - 자동 높이 조절
function EditableTextarea({ value, onSave, placeholder = '클릭하여 입력' }) {
  const [editing, setEditing] = useState(false);
  const [temp, setTemp] = useState(value || '');
  const textareaRef = React.useRef(null);
  useEffect(() => { setTemp(value || ''); }, [value]);

  // 텍스트에 따라 자동 높이 조절
  useEffect(() => {
    if (editing && textareaRef.current) {
      textareaRef.current.style.height = 'auto';
      textareaRef.current.style.height = Math.max(60, textareaRef.current.scrollHeight) + 'px';
    }
  }, [temp, editing]);

  const handleSave = () => {
    onSave(temp);
    setEditing(false);
  };

  if (editing) {
    return (
      <textarea
        ref={textareaRef}
        value={temp}
        autoFocus
        placeholder={placeholder}
        onChange={(e) => setTemp(e.target.value)}
        onBlur={handleSave}
        onKeyDown={(e) => {
          if (e.key === 'Escape') { setTemp(value || ''); setEditing(false); }
          if ((e.key === 'Enter') && (e.ctrlKey || e.metaKey)) { e.preventDefault(); handleSave(); }
        }}
        className="w-full px-2 py-1 border border-blue-400 rounded outline-none resize-none text-sm"
        style={{ minHeight: '60px', lineHeight: '1.5' }}
      />
    );
  }

  const isEmpty = !value;
  return (
    <div onClick={() => setEditing(true)}
      className="cursor-pointer hover:bg-blue-50 px-2 py-1 rounded whitespace-pre-line"
      title="클릭하여 수정 · Ctrl+Enter로 저장 · Esc로 취소"
      style={{ minHeight: '24px' }}>
      {isEmpty ? <span className="text-slate-400 italic">{placeholder}</span> : value}
    </div>
  );
}

// 드래그로 너비 조절 가능한 표 헤더 셀
// tableId: 표 고유 ID (예: '3c_table')
// colKey: 컬럼 고유 키 (예: 'region')
// defaultWidth: 기본 너비 (px)
// columnWidths/setColumnWidths: App에서 내려주는 state
function ResizableHeader({ tableId, colKey, defaultWidth, columnWidths, setColumnWidths, className = '', children }) {
  const width = (columnWidths[tableId] && columnWidths[tableId][colKey]) || defaultWidth;
  const [dragging, setDragging] = useState(false);
  const startRef = React.useRef({ x: 0, w: 0 });

  const onMouseDown = (e) => {
    e.preventDefault();
    e.stopPropagation();
    setDragging(true);
    startRef.current = { x: e.clientX, w: width };

    const onMove = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const newW = Math.max(40, startRef.current.w + dx); // 최소 40px
      setColumnWidths(prev => ({
        ...prev,
        [tableId]: { ...(prev[tableId] || {}), [colKey]: newW }
      }));
    };
    const onUp = () => {
      setDragging(false);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };

  return (
    <th className={`relative ${className}`} style={{ width: `${width}px`, minWidth: `${width}px`, maxWidth: `${width}px` }}>
      {children}
      {/* 드래그 핸들 (오른쪽 모서리) */}
      <div
        onMouseDown={onMouseDown}
        onDoubleClick={() => {
          // 더블클릭 → 기본 너비로 리셋
          setColumnWidths(prev => {
            const cur = { ...(prev[tableId] || {}) };
            delete cur[colKey];
            return { ...prev, [tableId]: cur };
          });
        }}
        className={`absolute top-0 right-0 h-full w-1.5 cursor-col-resize hover:bg-blue-400 ${dragging ? 'bg-blue-500' : 'bg-transparent'} transition-colors`}
        title="드래그하여 너비 조절 · 더블클릭으로 초기화"
      ></div>
    </th>
  );
}

function DataTable({ columns, data, onUpdate, onDelete, onAdd, addTemplate, exportName }) {
  const [search, setSearch] = useState('');
  const [sortKey, setSortKey] = useState(null);
  const [sortDir, setSortDir] = useState('asc');
  const [pageSize, setPageSize] = useState(15);
  const [page, setPage] = useState(1);
  const fileInputRef = useRef(null);

  const filtered = useMemo(() => {
    let result = data;
    if (search.trim()) {
      const q = search.toLowerCase();
      result = result.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(q)));
    }
    if (sortKey) {
      result = [...result].sort((a, b) => {
        const va = a[sortKey], vb = b[sortKey];
        if (typeof va === 'number' && typeof vb === 'number') return sortDir === 'asc' ? va - vb : vb - va;
        return sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
      });
    }
    return result;
  }, [data, search, sortKey, sortDir]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  const currentPage = Math.min(page, totalPages);
  const paginated = filtered.slice((currentPage - 1) * pageSize, currentPage * pageSize);

  const toggleSort = (key) => {
    if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('asc'); }
  };

  const handleUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const parsed = parseCSV(ev.target.result);
      if (parsed.length > 0 && onAdd) parsed.forEach(row => onAdd(row));
    };
    reader.readAsText(file, 'UTF-8');
    e.target.value = '';
  };

  return (
    <div className="space-y-3">
      <div className="flex items-center justify-between gap-2 flex-wrap">
        <div className="flex items-center gap-2">
          <div className="relative">
            <div className="absolute left-2 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" className="w-4 h-4" /></div>
            <input type="text" placeholder="검색..." value={search}
              onChange={(e) => { setSearch(e.target.value); setPage(1); }}
              className="pl-8 pr-3 py-1.5 text-sm border border-slate-300 rounded-md outline-none focus:border-blue-400 w-48" />
          </div>
          <select value={pageSize} onChange={(e) => { setPageSize(Number(e.target.value)); setPage(1); }}
            className="px-2 py-1.5 text-sm border border-slate-300 rounded-md outline-none">
            <option value={10}>10개씩</option>
            <option value={15}>15개씩</option>
            <option value={20}>20개씩</option>
            <option value={50}>50개씩</option>
          </select>
        </div>
        <div className="flex items-center gap-2">
          {addTemplate && onAdd && (
            <button onClick={() => onAdd({ ...addTemplate, id: Date.now() })}
              className="flex items-center gap-1 px-3 py-1.5 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700">
              <Icon name="plus" className="w-3.5 h-3.5" /> 추가
            </button>
          )}
          <input ref={fileInputRef} type="file" accept=".csv" onChange={handleUpload} className="hidden" />
          <button onClick={() => fileInputRef.current?.click()}
            className="flex items-center gap-1 px-3 py-1.5 text-sm border border-slate-300 rounded-md hover:bg-slate-50">
            <Icon name="upload" className="w-3.5 h-3.5" /> 엑셀 업로드
          </button>
          <button onClick={() => downloadCSV(data, exportName || 'data')}
            className="flex items-center gap-1 px-3 py-1.5 text-sm border border-slate-300 rounded-md hover:bg-slate-50">
            <Icon name="download" className="w-3.5 h-3.5" /> 엑셀 다운로드
          </button>
        </div>
      </div>

      <div className="border border-slate-200 rounded-md overflow-x-auto">
        <table className="w-full text-sm" data-table-id="datatable_generic" style={{ tableLayout: 'fixed' }}>
          <thead className="bg-slate-50 border-b border-slate-200">
            <tr>
              {columns.map(col => (
                <th key={col.key} onClick={() => col.sortable !== false && toggleSort(col.key)}
                  className={`px-3 py-2 font-semibold text-slate-700 ${col.align === 'right' ? 'text-right' : col.align === 'center' ? 'text-center' : 'text-left'} ${col.sortable !== false ? 'cursor-pointer hover:bg-slate-100' : ''}`}>
                  <div className="flex items-center gap-1 justify-center">
                    <span>{col.label}</span>
                    {col.sortable !== false && <Icon name="sort" className="w-3 h-3 text-slate-400" />}
                  </div>
                </th>
              ))}
              {onDelete && <th className="px-3 py-2 w-12"></th>}
            </tr>
          </thead>
          <tbody>
            {paginated.length === 0 ? (
              <tr><td colSpan={columns.length + (onDelete ? 1 : 0)} className="px-3 py-12 text-center text-slate-400">데이터가 없습니다. 추가 버튼을 눌러 데이터를 입력하세요.</td></tr>
            ) : paginated.map((row, idx) => (
              <tr key={row.id || idx} className="border-b border-slate-100 last:border-0 hover:bg-slate-50">
                {columns.map(col => (
                  <td key={col.key} className={col.align === 'right' ? 'text-right' : col.align === 'center' ? 'text-center' : 'text-left'}>
                    {col.render ? col.render(row[col.key], row) : (
                      col.editable !== false ? (
                        <EditableCell value={row[col.key]} type={col.type} align={col.align} suffix={col.suffix}
                          onSave={(v) => onUpdate(row.id, col.key, v)} />
                      ) : (
                        <div className={`px-2 py-1.5 ${col.align === 'right' ? 'text-right' : col.align === 'center' ? 'text-center' : 'text-left'}`}>
                          {typeof row[col.key] === 'number' ? (row[col.key] % 1 === 0 ? formatNumber(row[col.key]) : row[col.key].toFixed(1)) : row[col.key]}{col.suffix}
                        </div>
                      )
                    )}
                  </td>
                ))}
                {onDelete && (
                  <td className="text-center">
                    <button onClick={() => onDelete(row.id)} className="text-slate-400 hover:text-rose-500 p-1" title="삭제">
                      <Icon name="trash" className="w-3.5 h-3.5" />
                    </button>
                  </td>
                )}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="flex items-center justify-between text-sm">
        <div className="text-slate-500">총 {filtered.length}개 중 {filtered.length === 0 ? 0 : (currentPage - 1) * pageSize + 1}-{Math.min(currentPage * pageSize, filtered.length)}</div>
        <div className="flex items-center gap-1">
          <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={currentPage === 1}
            className="px-2 py-1 border border-slate-300 rounded disabled:opacity-40 hover:bg-slate-50">
            <Icon name="chevronLeft" className="w-4 h-4" />
          </button>
          <span className="px-3 py-1">{currentPage} / {totalPages}</span>
          <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={currentPage === totalPages}
            className="px-2 py-1 border border-slate-300 rounded disabled:opacity-40 hover:bg-slate-50">
            <Icon name="chevronRight" className="w-4 h-4" />
          </button>
        </div>
      </div>
    </div>
  );
}

function PageTitle({ children, subtitle }) {
  return <div className="flex items-baseline gap-3 mb-4"><h2 className="text-xl font-bold text-slate-900">{children}</h2>{subtitle && <span className="text-sm text-slate-500">{subtitle}</span>}</div>;
}

function Card({ title, subtitle, action, children, className = '' }) {
  return (
    <div className={`bg-white border border-slate-200 rounded-md p-4 ${className}`}>
      {(title || action) && (
        <div className="flex items-center justify-between mb-3">
          <div>{title && <h3 className="font-semibold text-slate-900">{title} {subtitle && <span className="text-sm text-slate-500 font-normal">{subtitle}</span>}</h3>}</div>
          {action}
        </div>
      )}
      {children}
    </div>
  );
}

function AlertBadge({ level }) {
  const styles = {
    '위험': 'bg-rose-100 text-rose-700 border-rose-200',
    '주의': 'bg-amber-100 text-amber-700 border-amber-200',
    '양호': 'bg-emerald-100 text-emerald-700 border-emerald-200',

  return <span className={`px-2 py-0.5 text-xs font-semibold rounded border ${styles[level] || 'bg-slate-100 text-slate-700'}`}>{level}</span>;

/* ================ 화남본부 연간 월별 실적표 ================ */
const MONTH_LABELS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function AnnualPerfTable({ hq, year, month, weeklyEntries, setWeeklyEntries, logChange }) {
  // 금액/수량 탭 (수량은 빈 데이터 0 시작, 금액과 독립 저장)
  const [metric, setMetric] = React.useState('amount'); // 'amount' | 'qty'
  // 본부별 데이터 소스 (수량은 동일 구조의 빈 데이터)
  const _amountData = ANNUAL_DATA_MAP[hq] || INITIAL_ANNUAL_HN;
  const _makeQtyData = (src) => ({
    headquarter: { ...src.headquarter, kpi: _zero12(), dso: _zero12(), end: _zero12() },
    dealers: src.dealers.map(d => ({ region: d.region, type: d.type, name: d.name, dsoOnly: d.dsoOnly, kpi: _zero12(), dso: _zero12(), end: _zero12() })),
  });
  const annualData = metric === 'amount' ? _amountData : _makeQtyData(_amountData);
  // 본부별 짧은 키 (저장 키 구분용) + 수량 접두어
  const hqKeyBase = hq === '화서본부' ? 'HX' : hq === '화동본부' ? 'HD' : 'HN';
  const hqKey = (metric === 'qty' ? 'Q' : '') + hqKeyBase; // 금액: HN / 수량: QHN (독립)

  // 표 전체 숨김
  const [tableCollapsed, setTableCollapsed] = React.useState(false);
  // 월별 숨김 (12개 boolean, true=보임)
  const [visibleMonths, setVisibleMonths] = React.useState(() => {
    try {
      const s = localStorage.getItem(`dashboard_annual${hqKey}_visMonths_v1`);
      if (s) return JSON.parse(s);
    } catch (e) {}
    return Array(12).fill(true);
  });
  const [monthPickerOpen, setMonthPickerOpen] = React.useState(false);
  const [entPickerOpen, setEntPickerOpen] = React.useState(false);
  // 소팅: { key: 'region'|'name', dir: 'asc'|'desc' } - 본부 행은 항상 맨 위 고정
  const [sortConfig, setSortConfig] = React.useState(null);

  // 업체별 숨김 (업체명 배열, localStorage 저장 - 본부 단위)
  const [hiddenEntities, setHiddenEntities] = React.useState(() => {
    try {
      const s = localStorage.getItem(`dashboard_annual${hqKeyBase}_hidden_v1`);
      if (s) return JSON.parse(s);
    } catch (e) {}
    return [];
  });
  React.useEffect(() => {
    try { localStorage.setItem(`dashboard_annual${hqKeyBase}_hidden_v1`, JSON.stringify(hiddenEntities)); } catch (e) {}
  }, [hiddenEntities, hqKeyBase]);
  const hideEntity = (name) => setHiddenEntities(prev => prev.includes(name) ? prev : [...prev, name]);
  const showEntity = (name) => setHiddenEntities(prev => prev.filter(n => n !== name));
  const showAllEntities = () => setHiddenEntities([]);

  const handleSort = (key) => {
    setSortConfig(prev => {
      if (!prev || prev.key !== key) return { key, dir: 'asc' };
      if (prev.dir === 'asc') return { key, dir: 'desc' };
      return null; // 세 번째 클릭 시 원래 순서로
    });
  };

  // 금액/수량(hqKey) 전환 시 해당 탭의 월표시 설정 재로드
  React.useEffect(() => {
    try {
      const s = localStorage.getItem(`dashboard_annual${hqKey}_visMonths_v1`);
      setVisibleMonths(s ? JSON.parse(s) : Array(12).fill(true));
    } catch (e) { setVisibleMonths(Array(12).fill(true)); }
  }, [hqKey]);

  React.useEffect(() => {
    try { localStorage.setItem(`dashboard_annual${hqKey}_visMonths_v1`, JSON.stringify(visibleMonths)); } catch (e) {}
  }, [visibleMonths, hqKey]);

  // 저장 키: annual{hqKey}|{name}|{field}|{monthIndex}  (field: kpi/dso/end)
  const getCell = (name, field, mi, defaultVal) => {
    const key = `annual${hqKey}|${name}|${field}|${mi}`;
    const stored = weeklyEntries[key];
    if (stored !== undefined && stored !== null && stored !== '') return stored;
    return defaultVal;
  };
  const setCell = (name, field, mi, value) => {
    const key = `annual${hqKey}|${name}|${field}|${mi}`;
    const v = parseFloat(value); 
    setWeeklyEntries(prev => ({ ...prev, [key]: isNaN(v) ? 0 : v }));
    logChange(`연간실적표 ${hq} ${name}`, `${MONTH_LABELS[mi]} ${field} 수정`);
  };

  // 한 업체의 12개월 데이터 계산
  const computeEntity = (ent) => {
    const kpi = ent.kpi.map((d, mi) => getCell(ent.name, 'kpi', mi, d));
    const actual = (ent.kpi).map((_, mi) => getCell(ent.name, 'actual', mi, 0));  // 실적 (새 입력 필드)
    const dso = ent.dso.map((d, mi) => getCell(ent.name, 'dso', mi, d));
    const end = ent.end.map((d, mi) => getCell(ent.name, 'end', mi, d));
    const rate = actual.map((v, mi) => kpi[mi] !== 0 ? Math.round(v / kpi[mi] * 100) : 0); // 달성율 = 실적 ÷ 목표
    const sum = (arr) => arr.reduce((a, b) => a + b, 0);
    const kpiTotal = sum(kpi), actualTotal = sum(actual), dsoTotal = sum(dso), endTotal = sum(end);
    const rateTotal = kpiTotal !== 0 ? Math.round(actualTotal / kpiTotal * 100) : 0;
    return { kpi, actual, dso, end, rate, kpiTotal, actualTotal, dsoTotal, endTotal, rateTotal };
  };

  const hqData = computeEntity(annualData.headquarter);
  let dealersData = annualData.dealers
    .filter(d => !hiddenEntities.includes(d.name))
    .map(d => ({ ent: d, calc: computeEntity(d) }));
  // 숨긴 업체 목록 (복원 바용)
  const hiddenList = annualData.dealers.filter(d => hiddenEntities.includes(d.name));

  // 소팅 적용 (본부는 별도 - 항상 맨 위 고정)
  if (sortConfig) {
    dealersData = [...dealersData].sort((a, b) => {
      const va = a.ent[sortConfig.key] || '';
      const vb = b.ent[sortConfig.key] || '';
      const cmp = va.localeCompare(vb, 'ko');
      return sortConfig.dir === 'asc' ? cmp : -cmp;
    });
  }

  // 숫자 포맷 (음수 빨강, 천단위)
  const fmt = (v) => {
    if (v === 0) return '';
    const s = Math.abs(v).toLocaleString();
    return v < 0 ? `(${s})` : s;
  };
  const rateColor = (r) => r >= 100 ? 'text-blue-600 font-bold' : r >= 70 ? 'text-emerald-600' : r >= 50 ? 'text-amber-600' : r < 0 ? 'text-rose-600 font-bold' : 'text-rose-500';

  const visMonthIdxs = visibleMonths.map((v, i) => v ? i : -1).filter(i => i >= 0);
  const visCount = visMonthIdxs.length;

  // 편집 가능 셀 (작은 인풋)
  const EditCell = ({ name, field, mi, value }) => {
    const [editing, setEditing] = React.useState(false);
    const [temp, setTemp] = React.useState(value);
    React.useEffect(() => { setTemp(value); }, [value]);
    const save = () => { setCell(name, field, mi, temp); setEditing(false); };
    if (editing) {
      return <input type="number" value={temp} autoFocus
        onChange={(e) => setTemp(e.target.value)} onBlur={save}
        onKeyDown={(e) => { if (e.key === 'Enter') save(); if (e.key === 'Escape') setEditing(false); }}
        className="w-full px-1 py-0.5 border border-blue-400 rounded outline-none text-right text-sm" />;
    }
    return <div onClick={() => setEditing(true)}
      className="cursor-pointer hover:bg-blue-50 px-1 py-0.5 rounded text-right min-h-[22px]" title="클릭하여 수정">
      {fmt(value)}</div>;
  };

  return (
    <div className="bg-white border border-slate-200 rounded-md p-4 mt-3">
      {/* 헤더 + 컨트롤 */}
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <div className="flex items-center gap-2">
          <button onClick={() => setTableCollapsed(!tableCollapsed)}
            className="text-slate-500 hover:text-slate-700 w-6 text-sm">
            {tableCollapsed ? '▶' : '▼'}
          </button>
          <h3 className="text-base font-bold text-slate-900">{hq} 연간 월별 실적표 ({year}년)</h3>
          <div className="flex rounded overflow-hidden border border-slate-300 text-xs ml-1">
            <button onClick={() => setMetric('amount')} className={"px-3 py-1 "+(metric==='amount'?'bg-blue-600 text-white':'bg-white text-slate-700 hover:bg-slate-50')}>금액</button>
            <button onClick={() => setMetric('qty')} className={"px-3 py-1 "+(metric==='qty'?'bg-blue-600 text-white':'bg-white text-slate-700 hover:bg-slate-50')}>수량</button>
          </div>
          <span className="text-xs text-slate-500">{metric==='amount'?'단위: 위안':'단위: 수량'}</span>
        </div>
        {!tableCollapsed && (
          <div className="flex items-center gap-2 relative">
            <button onClick={() => setVisibleMonths(Array(12).fill(true))}
              className="px-2 py-1 text-xs border border-slate-300 rounded hover:bg-slate-50">전체 월</button>
            <button onClick={() => setMonthPickerOpen(!monthPickerOpen)}
              className="px-2 py-1 text-xs border border-slate-300 rounded hover:bg-slate-50 flex items-center gap-1">
              월 선택 ({visCount}/12) ▼
            </button>
            {monthPickerOpen && (
              <div className="absolute right-0 top-8 z-50 bg-white border border-slate-300 rounded-md shadow-xl p-2 grid grid-cols-3 gap-1 w-48">
                {MONTH_LABELS.map((m, i) => (
                  <label key={i} className="flex items-center gap-1 text-xs cursor-pointer hover:bg-slate-50 px-1 py-0.5 rounded">
                    <input type="checkbox" checked={visibleMonths[i]}
                      onChange={() => setVisibleMonths(prev => prev.map((v, idx) => idx === i ? !v : v))} />
                    {m}
                  </label>
                ))}
              </div>
            )}
            {/* 숨긴 업체 복원 */}
            <button onClick={() => setEntPickerOpen(!entPickerOpen)}
              className={"px-2 py-1 text-xs border rounded flex items-center gap-1 "+(hiddenEntities.length>0?'border-rose-300 bg-rose-50 text-rose-700 hover:bg-rose-100':'border-slate-300 hover:bg-slate-50')}>
              숨긴 업체 ({hiddenEntities.length}) ▼
            </button>
            {entPickerOpen && (
              <div className="absolute right-0 top-8 z-50 bg-white border border-slate-300 rounded-md shadow-xl p-2 w-60 max-h-72 overflow-y-auto">
                {hiddenList.length === 0 ? (
                  <div className="text-xs text-slate-400 px-1 py-2 text-center">숨긴 업체가 없습니다</div>
                ) : (
                  <>
                    <div className="flex items-center justify-between px-1 pb-1 mb-1 border-b border-slate-200">
                      <span className="text-xs font-semibold text-slate-600">숨긴 업체 목록</span>
                      <button onClick={showAllEntities} className="text-xs text-blue-600 hover:underline">전체 복원</button>
                    </div>
                    {hiddenList.map(d => (
                      <div key={d.name} className="flex items-center justify-between text-xs px-1 py-1 hover:bg-slate-50 rounded">
                        <span className="text-slate-700 truncate mr-2" title={d.name}>{d.name}</span>
                        <button onClick={() => showEntity(d.name)} className="text-blue-600 hover:underline shrink-0">복원</button>
                      </div>
                    ))}
                  </>
                )}
              </div>
            )}
          </div>
        )}
      </div>

      {!tableCollapsed && (

                      <td style={{background:'#94A3B8'}} className="px-2 py-1 text-right text-white font-semibold">{fmt(c.dsoTotal)}</td>

      {!tableCollapsed && (

        const currentBigo = weeklyEntries[bigoKey] ?? '';

                value={currentBigo}

                className="w-full min-h-[160px] px-2 py-1.5 text-sm border border-slate-200 rounded-md outline-none focus:border-slate-400 focus:ring-1 focus:ring-slate-200 resize-y"

/* ================ 3번 메뉴 - 대리상 PSI 연간 월별표 ================ */
function PsiAnnualTable({ hq, year, month, weeklyEntries, setWeeklyEntries, logChange }) {
  const psiData = PSI_DATA_MAP[hq];
  const psiKey = hq === '화서본부' ? 'psiHX' : hq === '화동본부' ? 'psiHD' : 'psiHN';
  const hqRegionName = hq === '화서본부' ? '화서지역' : hq === '화동본부' ? '화동지역' : '화남지역';
  const [tableCollapsed, setTableCollapsed] = React.useState(false);
  const [visibleMonths, setVisibleMonths] = React.useState(() => {
    try { const s = localStorage.getItem(`dashboard_${psiKey}_visMonths_v1`); if (s) return JSON.parse(s); } catch (e) {}
    return Array(12).fill(true);
  });
  const [monthPickerOpen, setMonthPickerOpen] = React.useState(false);
  const [sortConfig, setSortConfig] = React.useState(null);
  // 카피 모달: 본부 실적합계의 목표/실적을 월간 카피
  const [copyModalOpen, setCopyModalOpen] = React.useState(false);
  const [copySrcMonth, setCopySrcMonth] = React.useState(5);    // 소스 월 (1~12)
  const [copyDstMonth, setCopyDstMonth] = React.useState(6);    // 타겟 월 (1~12)
  const [copyField, setCopyField] = React.useState('goal');     // 'goal' | 'actual' | 'both'

  const handleCopyExecute = () => {
    const srcMi = copySrcMonth - 1;
    const dstMi = copyDstMonth - 1;
    if (srcMi === dstMi) { alert('같은 월은 카피할 수 없습니다.'); return; }
    const fields = copyField === 'both' ? ['goal', 'actual'] : [copyField];
    const updates = {};
    fields.forEach(f => {
      // 실적합계(_cum) 블록만 카피 (26년도합계는 삭제됨)
      const srcVal = getCell('_cum', f, srcMi, psiData.hqCumulative[f][srcMi]);
      updates[`${psiKey}|_cum|${f}|${dstMi}`] = srcVal;
    });
    setWeeklyEntries(prev => ({ ...prev, ...updates }));
    logChange(`PSI연간표 ${hq}`, `${copySrcMonth}월 → ${copyDstMonth}월 카피 (${copyField === 'both' ? '목표+실적' : copyField === 'goal' ? '목표' : '실적'})`);
    setCopyModalOpen(false);
  };

  const handleSort = (key) => {
    setSortConfig(prev => {
      if (!prev || prev.key !== key) return { key, dir: 'asc' };
      if (prev.dir === 'asc') return { key, dir: 'desc' };
      return null;
    });
  };

  React.useEffect(() => {
    try { localStorage.setItem(`dashboard_${psiKey}_visMonths_v1`, JSON.stringify(visibleMonths)); } catch (e) {}
  }, [visibleMonths, psiKey]);

  // 데이터 없는 본부는 안내만
  if (!psiData) {
    return (
      <div className="bg-white border border-slate-200 rounded-md p-4 mt-3">
        <h3 className="text-base font-bold text-slate-900">{hq} 대리상 PSI 연간 월별표 ({year}년)</h3>
        <div className="text-sm text-slate-500 mt-2">이 본부의 PSI 연간표 데이터는 준비 중입니다.</div>
      </div>
    );
  }

  const getCell = (name, field, mi, defaultVal) => {
    const key = `${psiKey}|${name}|${field}|${mi}`;
    const stored = weeklyEntries[key];
    if (stored !== undefined && stored !== null && stored !== '') return stored;
    return defaultVal;
  };
  const setCell = (name, field, mi, value) => {
    const key = `${psiKey}|${name}|${field}|${mi}`;
    const v = parseFloat(value);
    setWeeklyEntries(prev => ({ ...prev, [key]: isNaN(v) ? 0 : v }));
    logChange(`PSI연간표 ${hq} ${name}`, `${MONTH_LABELS[mi]} ${field} 수정`);
  };

  const sum = (arr) => arr.reduce((a, b) => a + b, 0);

  // 본부 블록 계산 (목표/실적 + 달성율 자동)
  const computeHqBlock = (blockName, src) => {
    const goal = src.goal.map((d, mi) => getCell(blockName, 'goal', mi, d));
    const actual = src.actual.map((d, mi) => getCell(blockName, 'actual', mi, d));
    const rate = goal.map((g, mi) => g !== 0 ? Math.round(actual[mi] / g * 100) : 0);
    const goalTotal = sum(goal), actualTotal = sum(actual);
    const rateTotal = goalTotal !== 0 ? Math.round(actualTotal / goalTotal * 100) : 0;
    return { goal, actual, rate, goalTotal, actualTotal, rateTotal };
  };

  // 대리상 계산 (먼저 계산해야 본부 실적합계가 대리상 실적 합계로 자동 계산됨)
  const computeEntity = (ent) => {
    const kpi = ent.kpi.map((d, mi) => getCell(ent.name, 'kpi', mi, d));
    // 실적 = 사용자 입력 우선, 없으면 초기 dso+end (마이그레이션)
    const actual = (ent.kpi).map((_, mi) => {
      const stored = getCell(ent.name, 'actual', mi, null);
      if (stored !== null) return stored;
      const initDso = (ent.dso && ent.dso[mi]) || 0;
      const initEnd = (ent.end && ent.end[mi]) || 0;
      return initDso + initEnd;
    });
    const rate = actual.map((v, mi) => kpi[mi] !== 0 ? Math.round(v / kpi[mi] * 100) : 0);
    const kpiTotal = sum(kpi), actualTotal = sum(actual);
    const rateTotal = kpiTotal !== 0 ? Math.round(actualTotal / kpiTotal * 100) : 0;
    return { kpi, actual, rate, kpiTotal, actualTotal, rateTotal };
  };
  let dealersData = psiData.dealers.map(d => ({ ent: d, calc: computeEntity(d) }));

  // 본부 실적합계 (_cum): 목표(KPI)는 사용자 입력, 실적은 대리상 실적의 월별 합계로 자동
  const cumData = (() => {
    const src = psiData.hqCumulative;
    const goal = src.goal.map((d, mi) => getCell('_cum', 'goal', mi, d));
    // 실적 자동 합계 (각 월의 모든 대리상 실적 합)
    const actual = Array(12).fill(0).map((_, mi) =>
      dealersData.reduce((acc, { calc }) => acc + (calc.actual[mi] || 0), 0)
    );
    const rate = goal.map((g, mi) => g !== 0 ? Math.round(actual[mi] / g * 100) : 0);
    const goalTotal = sum(goal), actualTotal = sum(actual);
    const rateTotal = goalTotal !== 0 ? Math.round(actualTotal / goalTotal * 100) : 0;
    return { goal, actual, rate, goalTotal, actualTotal, rateTotal };
  })();
  const monData = computeHqBlock('_mon', psiData.hqMonthly);

  if (sortConfig) {
    dealersData = [...dealersData].sort((a, b) => {
      const va = a.ent[sortConfig.key] || '', vb = b.ent[sortConfig.key] || '';
      const cmp = va.localeCompare(vb, 'ko');
      return sortConfig.dir === 'asc' ? cmp : -cmp;
    });
  }

  const fmt = (v) => { if (v === 0) return ''; const s = Math.abs(v).toLocaleString(); return v < 0 ? `(${s})` : s; };
  const rateColor = (r) => r >= 100 ? 'text-blue-600 font-bold' : r >= 70 ? 'text-emerald-600' : r >= 50 ? 'text-amber-600' : r < 0 ? 'text-rose-600 font-bold' : 'text-rose-500';

  const visMonthIdxs = visibleMonths.map((v, i) => v ? i : -1).filter(i => i >= 0);
  const visCount = visMonthIdxs.length;

  const EditCell = ({ name, field, mi, value }) => {
    const [editing, setEditing] = React.useState(false);
    const [temp, setTemp] = React.useState(value);
    React.useEffect(() => { setTemp(value); }, [value]);
    const save = () => { setCell(name, field, mi, temp); setEditing(false); };
    if (editing) {
      return <input type="number" value={temp} autoFocus
        onChange={(e) => setTemp(e.target.value)} onBlur={save}
        onKeyDown={(e) => { if (e.key === 'Enter') save(); if (e.key === 'Escape') setEditing(false); }}
        className="w-full px-1 py-0.5 border border-blue-400 rounded outline-none text-right text-sm" />;
    }
    return <div onClick={() => setEditing(true)}
      className="cursor-pointer hover:bg-blue-50 px-1 py-0.5 rounded text-right min-h-[22px]" title="클릭하여 수정">
      {fmt(value)}</div>;
  };

  const ROW_H = 33, HEADER_H = 39;
  const stickyRow = (i) => ({ position: 'sticky', top: `${HEADER_H + i * ROW_H}px`, height: `${ROW_H}px`, zIndex: 15 });
  const cellH = { height: `${ROW_H}px` };

  return (
    <div className="bg-white border border-slate-200 rounded-md p-4 mt-3">
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <div className="flex items-center gap-2">

const CORP_DATA_MAP = { amount: CORP_AMOUNT_ROWS, qty: CORP_QTY_ROWS };

// 법인매출 집계 계산 (탭별 총 KPI/실적/달성율/전년도/성장율) - 카드와 표에서 공용
function computeCorpTotals(tab, weeklyEntries, storeKey) {
  const rows = CORP_DATA_MAP[tab];
  const tabKey = tab === 'amount' ? 'AMT' : 'QTY';
  const sk = storeKey || 'corp';
  const sum12 = (arr) => arr.reduce((a,b)=>a+b,0);
  const gc = (name, field, mi, dv) => {
    const stored = weeklyEntries[`${sk}${tabKey}|${name}|${field}|${mi}`];
    if (stored !== undefined && stored !== null && stored !== '') return stored;
    return dv;
  };
  const z=()=>Array(12).fill(0); const kpi=z(),act=z(),y25=z();
  rows.forEach(ent=>{
    for(let mi=0;mi<12;mi++){
      kpi[mi]+=gc(ent.name,'kpi',mi,ent.kpi[mi]);
      act[mi]+=gc(ent.name,'act',mi,(ent.act?ent.act[mi]:0));
      y25[mi]+=gc(ent.name,'y25',mi,ent.y25[mi]);
    }
  });
  const kpiT=sum12(kpi), actT=sum12(act), y25T=sum12(y25);
  // 누계 성장율: 실적 입력된 월만 25년과 비교 (미입력 월 제외)
  const am=act.map((v,mi)=>v!==0?mi:-1).filter(i=>i>=0);
  const aS=am.reduce((s,mi)=>s+act[mi],0), yS=am.reduce((s,mi)=>s+y25[mi],0);
  return {
    kpiT, actT, y25T,
    rateT: kpiT!==0?Math.round(actT/kpiT*100):0,
    growT: yS!==0?Math.round((aS-yS)/yS*100):null,
  };
}

function CorpSalesTable({ tab, variant, weeklyEntries, setWeeklyEntries, logChange, visibleMonths, sortConfig, onSort, storeKey }) {
  const rows = CORP_DATA_MAP[tab];
  const tabKey = tab === 'amount' ? 'AMT' : 'QTY';
  // storeKey: 데이터 격리용 prefix. 없으면 기존 단일 블록과 동일한 'corp' 사용(하위 호환).
  const sk = storeKey || 'corp';

  const fmtCorp = (v) => { if (v===0) return ''; const s=Math.abs(Math.round(v)).toLocaleString(); return v<0?`(${s})`:s; };
  const sum12 = (arr) => arr.reduce((a,b)=>a+b,0);

  const getCell = (name, field, mi, defaultVal) => {
    const key = `${sk}${tabKey}|${name}|${field}|${mi}`;
    const stored = weeklyEntries[key];
    if (stored !== undefined && stored !== null && stored !== '') return stored;
    return defaultVal;
  };
  const setCell = (name, field, mi, value) => {
    const key = `${sk}${tabKey}|${name}|${field}|${mi}`;
    const v = parseFloat(value);
    setWeeklyEntries(prev => ({ ...prev, [key]: isNaN(v) ? 0 : v }));
    logChange(`법인매출(${tab==='amount'?'금액':'수량'}) ${name}`, `${MONTH_LABELS[mi]} ${field} 수정`);
  };

  const computeEntity = (ent) => {
    const kpi = ent.kpi.map((d, mi) => getCell(ent.name, 'kpi', mi, d));
    const act = ent.kpi.map((_, mi) => getCell(ent.name, 'act', mi, (ent.act ? ent.act[mi] : 0)));
    const y25 = ent.y25.map((d, mi) => getCell(ent.name, 'y25', mi, d));
    const rate = act.map((v, mi) => kpi[mi] !== 0 ? Math.round(v / kpi[mi] * 100) : 0);
    // 성장율 = (26년 실적 − 25년 실적) ÷ 25년 실적. 단, 실적 미입력(0)인 월은 계산 제외(null)
    const grow = act.map((v, mi) => (v !== 0 && y25[mi] !== 0) ? Math.round((v - y25[mi]) / y25[mi] * 100) : null);
    const kpiT=sum12(kpi), actT=sum12(act), y25T=sum12(y25);
    // 누계 성장율: 실적이 입력된 월(act>0)의 25년 합과만 비교 (미입력 월 제외)
    const actMonths = act.map((v,mi)=>v!==0?mi:-1).filter(i=>i>=0);
    const actSumForGrow = actMonths.reduce((s,mi)=>s+act[mi],0);
    const y25SumForGrow = actMonths.reduce((s,mi)=>s+y25[mi],0);
    const growT = y25SumForGrow !== 0 ? Math.round((actSumForGrow - y25SumForGrow) / y25SumForGrow * 100) : null;
    return { kpi, act, y25, rate, grow, kpiT, actT, y25T,
      rateT: kpiT!==0?Math.round(actT/kpiT*100):0, growT };
  };

  let dataRows = rows.map(r => ({ ent:r, calc:computeEntity(r) }));
  if (sortConfig) {
    dataRows = [...dataRows].sort((a,b)=>{
      const va=a.ent[sortConfig.key]||'', vb=b.ent[sortConfig.key]||'';
      const cmp=String(va).localeCompare(String(vb),'ko');
      return sortConfig.dir==='asc'?cmp:-cmp;
    });
  }

  const totals = (() => {
    const z=()=>Array(12).fill(0); const kpi=z(),act=z(),y25=z();
    dataRows.forEach(({calc})=>{ for(let mi=0;mi<12;mi++){ kpi[mi]+=calc.kpi[mi]; act[mi]+=calc.act[mi]; y25[mi]+=calc.y25[mi]; }});
    const rate=act.map((v,mi)=>kpi[mi]!==0?Math.round(v/kpi[mi]*100):0);
    const grow=act.map((v,mi)=>(v!==0 && y25[mi]!==0)?Math.round((v-y25[mi])/y25[mi]*100):null);
    const kpiT=sum12(kpi),actT=sum12(act),y25T=sum12(y25);
    // 누계 성장율: 실적 입력된 월만 비교
    const am=act.map((v,mi)=>v!==0?mi:-1).filter(i=>i>=0);
    const aS=am.reduce((s,mi)=>s+act[mi],0), yS=am.reduce((s,mi)=>s+y25[mi],0);
    return { kpi,act,y25,rate,grow,kpiT,actT,y25T,
      rateT:kpiT!==0?Math.round(actT/kpiT*100):0, growT: yS!==0?Math.round((aS-yS)/yS*100):null };
  })();

  const visMonthIdxs = visibleMonths.map((v,i)=>v?i:-1).filter(i=>i>=0);
  // 달성율 색상: 80% 미만 빨강
  const rateCls = (v) => (v===null||v===undefined) ? 'text-slate-400' : (v < 80 ? 'text-rose-600 font-bold' : 'text-slate-800');
  // 성장율 색상: 음수 빨강
  const growCls = (v) => (v===null||v===undefined) ? 'text-slate-400' : (v < 0 ? 'text-rose-600 font-bold' : 'text-slate-800');
  const pctTxt = (v) => (v===null||v===undefined) ? '-' : v+'%';

  // 선택합계: 월 표시로 선택된 월(visMonthIdxs)만 합산
  const selSum = (arr) => visMonthIdxs.reduce((a,i)=>a+(arr[i]||0),0);
  const selRate = (kArr, aArr) => { const k=selSum(kArr), a=selSum(aArr); return k!==0?Math.round(a/k*100):0; };
  // 선택합계 성장율: 선택 월 중 실적이 입력된 월만 비교
  const selGrow = (yArr, aArr) => {
    const idxs = visMonthIdxs.filter(i => (aArr[i]||0) !== 0);
    const y = idxs.reduce((s,i)=>s+(yArr[i]||0),0);
    const a = idxs.reduce((s,i)=>s+(aArr[i]||0),0);
    return y!==0 ? Math.round((a-y)/y*100) : null;
  };

  const EditCell = ({ name, field, mi, value }) => {
    const [editing,setEditing] = React.useState(false);
    const [temp,setTemp] = React.useState(value);
    React.useEffect(()=>{setTemp(value);},[value]);
    const save = () => { setCell(name,field,mi,temp); setEditing(false); };
    if (editing) return <input type="number" value={temp} autoFocus
      onChange={e=>setTemp(e.target.value)} onBlur={save}
      onKeyDown={e=>{ if(e.key==='Enter')save(); if(e.key==='Escape')setEditing(false); }}
      className="w-full px-1 py-0.5 border border-blue-400 rounded outline-none text-right text-sm" />;
    return <div onClick={()=>setEditing(true)} title="클릭하여 수정"
      className="cursor-pointer hover:bg-slate-100 px-1 py-0.5 rounded text-right min-h-[22px]">{fmtCorp(value)}</div>;
  };

  const mainFields = [
    { label:'KPI',   render:(name,c)=> (mi)=> <EditCell name={name} field="kpi" mi={mi} value={c.kpi[mi]} />, total:c=>fmtCorp(c.kpiT), selTotal:c=>fmtCorp(selSum(c.kpi)) },
    { label:'실적',  render:(name,c)=> (mi)=> <EditCell name={name} field="act" mi={mi} value={c.act[mi]} />, total:c=>fmtCorp(c.actT), selTotal:c=>fmtCorp(selSum(c.act)) },
    { label:'달성율',isPct:true, render:(name,c)=> (mi)=> <span className={rateCls(c.rate[mi])}>{c.rate[mi]}%</span>, total:c=> <span className={rateCls(c.rateT)}>{c.rateT}%</span>, selTotal:c=>{ const r=selRate(c.kpi,c.act); return <span className={rateCls(r)}>{r}%</span>; } },
  ];
  const prevFields = [
    { label:'전년도실적', render:(name,c)=> (mi)=> <EditCell name={name} field="y25" mi={mi} value={c.y25[mi]} />, total:c=>fmtCorp(c.y25T), selTotal:c=>fmtCorp(selSum(c.y25)) },
    { label:'성장율', isPct:true, render:(name,c)=> (mi)=> <span className={growCls(c.grow[mi])}>{pctTxt(c.grow[mi])}</span>, total:c=> <span className={growCls(c.growT)}>{pctTxt(c.growT)}</span>, selTotal:c=>{ const g=selGrow(c.y25,c.act); return <span className={growCls(g)}>{pctTxt(g)}</span>; } },
  ];
  const fields = variant==='main' ? mainFields : prevFields;
  const rowCount = fields.length;

  const arrow = (key) => sortConfig?.key===key ? (sortConfig.dir==='asc'?'▲':'▼') : '⇅';

  return (
    <div className="overflow-x-auto border border-slate-300 rounded">
      <table className="text-sm border-collapse" style={{ minWidth:'100%' }}>
        <thead>
          <tr className="bg-slate-100 border-b border-slate-300">
            <th className="px-2 py-2 border-r border-slate-300 font-semibold text-slate-700" style={{ minWidth:'110px' }}>본부</th>
            <th className="px-2 py-2 border-r border-slate-300 font-semibold text-slate-700" style={{ minWidth:'90px' }}>구분</th>
            {visMonthIdxs.map(mi => (
              <th key={mi} className="px-2 py-2 border-r border-slate-300 font-semibold text-slate-700 text-right" style={{ minWidth:'80px' }}>{MONTH_LABELS[mi]}</th>
            ))}
            <th className="px-2 py-2 border-r border-slate-300 font-semibold text-slate-700 text-right bg-slate-200" style={{ minWidth:'90px' }}>합계</th>
            <th className="px-2 py-2 font-semibold text-blue-700 text-right bg-blue-50" style={{ minWidth:'90px' }} title="월 표시로 선택된 월만 합산">선택합계</th>
          </tr>
        </thead>
        <tbody>
          {dataRows.map(({ent, calc:c})=>(
            <React.Fragment key={ent.name}>
              {fields.map((f, ri)=>(
                <tr key={f.label} className="border-b border-slate-200">
                  {ri===0 && <td rowSpan={rowCount} className="px-2 py-1 border-r border-slate-300 text-center font-medium align-middle bg-white">{ent.name}</td>}
                  <td className="px-2 py-1 border-r border-slate-300 text-center text-slate-600 font-semibold bg-white">{f.label}</td>
                  {visMonthIdxs.map(mi=>(
                    <td key={mi} className={`px-1 py-0.5 border-r border-slate-300 bg-white ${f.isPct?'text-right px-2 py-1':''}`}>{f.render(ent.name, c)(mi)}</td>
                  ))}
                  <td className="px-2 py-1 text-right font-bold border-r border-slate-300 bg-white">{f.total(c)}</td>
                  <td className="px-2 py-1 text-right font-bold bg-blue-50 text-blue-800">{f.selTotal(c)}</td>
                </tr>
              ))}
            </React.Fragment>
          ))}
          {/* 총계 */}
          {fields.map((f, ri)=>(
            <tr key={'tot_'+f.label} className={"border-b border-slate-200 "+(ri===0?'border-t-2 border-slate-400':'')}>
              {ri===0 && <td rowSpan={rowCount} colSpan={1} className="px-2 py-1 border-r border-slate-300 text-center font-bold align-middle bg-slate-50">총계</td>}
              <td className="px-2 py-1 border-r border-slate-300 text-center text-slate-700 font-semibold bg-slate-50">{f.label}</td>
              {visMonthIdxs.map(mi=>(
                <td key={mi} className="px-2 py-1 border-r border-slate-300 text-right font-semibold bg-slate-50">
                  {f.isPct ? f.render('총계', totals)(mi) : fmtCorp(variant==='main' ? (f.label==='KPI'?totals.kpi[mi]:totals.act[mi]) : totals.y25[mi])}
                </td>
              ))}
              <td className="px-2 py-1 text-right font-bold border-r border-slate-300 bg-slate-100">{f.total(totals)}</td>
              <td className="px-2 py-1 text-right font-bold bg-blue-100 text-blue-800">{f.selTotal(totals)}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

    return Array(12).fill(true);
  });

  React.useEffect(() => {
    const cleanups = [];
    const handlerKey = '__resizableAttached__';

    const attachToTable = (table) => {
      const tableId = table.getAttribute('data-table-id');
      if (!tableId) return;
      const headRows = table.querySelectorAll('thead tr');
      headRows.forEach((tr, rowIdx) => {
      const ths = tr.querySelectorAll('th');
      ths.forEach((th, idx) => {
        if (th[handlerKey]) return; // 이미 부착됨
        th[handlerKey] = true;

        // 컬럼 키 = data-col-key 또는 위치기반 안정 키 (저장 핸들러와 동일 규칙)
        const colKey = th.getAttribute('data-col-key') || `r${rowIdx}c${idx}`;

        // 저장된 너비 적용
        const savedW = columnWidths[tableId]?.[colKey];
        if (savedW) {
          th.style.width = `${savedW}px`;
          th.style.minWidth = `${savedW}px`;
          th.style.maxWidth = `${savedW}px`;
        }
        th.style.position = th.style.position || 'relative';

        // 드래그 핸들 생성
        const handle = document.createElement('div');
        handle.style.cssText = `
          position: absolute;
          top: 0;
          right: 0;
          width: 6px;
          height: 100%;
          cursor: col-resize;
          background: transparent;
          z-index: 10;
          user-select: none;

        handle.title = '드래그하여 너비 조절 · 더블클릭으로 초기화';

        handle.addEventListener('mouseenter', () => { handle.style.background = 'rgba(96,165,250,0.5)'; });
        handle.addEventListener('mouseleave', () => { handle.style.background = 'transparent'; });

        let startX = 0, startW = 0;
        const onMove = (ev) => {
          const dx = ev.clientX - startX;
          const newW = Math.max(40, startW + dx);
          th.style.width = `${newW}px`;
          th.style.minWidth = `${newW}px`;
          th.style.maxWidth = `${newW}px`;
        };
        const onUp = (ev) => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          handle.style.background = 'transparent';
          // 최종 저장
          const finalW = th.offsetWidth;
          setColumnWidths(prev => ({
            ...prev,
            [tableId]: { ...(prev[tableId] || {}), [colKey]: finalW }
          }));
        };
        const onDown = (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          startX = ev.clientX;
          startW = th.offsetWidth;
          handle.style.background = 'rgba(59,130,246,0.7)';
          window.addEventListener('mousemove', onMove);
          window.addEventListener('mouseup', onUp);
        };
        handle.addEventListener('mousedown', onDown);

        // 더블클릭 → 초기화
        handle.addEventListener('dblclick', (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          th.style.width = '';
          th.style.minWidth = '';
          th.style.maxWidth = '';
          setColumnWidths(prev => {
            const cur = { ...(prev[tableId] || {}) };
            delete cur[colKey];
            return { ...prev, [tableId]: cur };
          });
        });

        th.appendChild(handle);
      });
      });
    };

  React.useLayoutEffect(() => {

        const tableId = table.getAttribute('data-table-id');

            if (savedW) {
              const targetStyle = `${savedW}px`;
              if (th.style.width !== targetStyle) th.style.width = targetStyle;
              if (th.style.minWidth !== targetStyle) th.style.minWidth = targetStyle;
              if (th.style.maxWidth !== targetStyle) th.style.maxWidth = targetStyle;
            }
          });
        });
      });

    applyWidths();
    const raf = requestAnimationFrame(applyWidths);
    const timer = setTimeout(applyWidths, 50);

  // === 모든 표에 정렬 기능 부착 (DOM 직접 조작) ===
  React.useEffect(() => {
    // 정렬 상태 저장 (table별로 { colIdx, dir })
    const sortStates = window.__tableSortStates || (window.__tableSortStates = {});

    const sortTable = (table, colIdx, dir) => {
      // tbody에서 행 가져오기
      const tbody = table.querySelector('tbody');
      if (!tbody) return;
      const rows = Array.from(tbody.querySelectorAll('tr')).filter(tr => {
        // 펼쳐진 상세 행, "데이터 없음" 행 등은 제외 (colSpan 큰 행)
        const cells = tr.querySelectorAll('td');
        if (cells.length === 0) return false;
        // colSpan이 컬럼 수보다 많이 차지하는 행은 제외
        let totalCols = 0;
        cells.forEach(td => { totalCols += (td.colSpan || 1); });
        return totalCols >= 3; // 일반 데이터 행만
      });
      if (rows.length === 0) return;

      // 정렬 키 추출
      const getKey = (tr) => {
        const cells = tr.querySelectorAll('td');
        if (colIdx >= cells.length) return '';
        const cell = cells[colIdx];
        // 셀 안의 input value를 우선 (편집 가능 셀)
        const input = cell.querySelector('input, select');
        let val;
        if (input) {
          val = input.value;
        } else {
          val = cell.textContent.trim();
        }
        return val;
      };

      // 숫자/문자열 판별
      const parseValue = (s) => {
        if (s === '' || s == null || s === '-') return null;
        // 콤마, %, 단위 제거
        const cleaned = String(s).replace(/[,%\s颗개건월명]/g, '').replace(/[a-zA-Z]+$/, '');
        const num = parseFloat(cleaned);
        if (!isNaN(num) && isFinite(num)) return num;
        return String(s).toLowerCase();
      };

      rows.sort((a, b) => {
        const va = parseValue(getKey(a));
        const vb = parseValue(getKey(b));
        // null은 항상 뒤로
        if (va === null && vb === null) return 0;
        if (va === null) return 1;
        if (vb === null) return -1;
        // 둘 다 숫자
        if (typeof va === 'number' && typeof vb === 'number') {
          return dir === 'asc' ? va - vb : vb - va;
        }
        // 문자열 비교
        const sa = String(va);
        const sb = String(vb);
        if (dir === 'asc') return sa.localeCompare(sb, 'ko');
        return sb.localeCompare(sa, 'ko');
      });

      // tbody에 재배치
      rows.forEach(tr => tbody.appendChild(tr));
    };

    const attachSortHandlers = () => {
      const tables = document.querySelectorAll('table[data-table-id]');
      tables.forEach(table => {
        const tableId = table.getAttribute('data-table-id');
        if (!tableId) return;
        // 마지막 헤더 행만 (2단 헤더에서)
        const headerRows = table.querySelectorAll('thead tr');
        if (headerRows.length === 0) return;
        const lastHeaderRow = headerRows[headerRows.length - 1];
        const ths = lastHeaderRow.querySelectorAll('th');
        ths.forEach((th, idx) => {
          // data-no-sort 속성이 있으면 소팅 부착 안 함
          if (th.getAttribute('data-no-sort') === '1') return;
          if (th.__sortAttached) {
            // 이미 부착된 경우 sort-icon만 갱신
            const state = sortStates[tableId];
            th.classList.remove('sort-asc', 'sort-desc');
            if (state && state.colIdx === idx) {
              th.classList.add(state.dir === 'asc' ? 'sort-asc' : 'sort-desc');
            }
            return;
          }
          th.__sortAttached = true;
          th.classList.add('sortable-header');

          const iconSpan = document.createElement('span');
          iconSpan.className = 'sort-icon';
          th.appendChild(iconSpan);

            if (e.target.classList && e.target.classList.contains('resize-handle')) return;
            // 다른 인터랙티브 요소 클릭은 제외
            const tag = (e.target.tagName || '').toLowerCase();
            if (tag === 'input' || tag === 'select' || tag === 'button') return;

            // 현재 상태 확인
            const currentRows = table.querySelectorAll('thead tr');
            const currentLast = currentRows[currentRows.length - 1];
            const currentThs = currentLast.querySelectorAll('th');
            let prevState = sortStates[tableId];

            // 같은 컬럼 → asc → desc → 해제 cycle
            let newDir;
            if (prevState && prevState.colIdx === idx) {
              if (prevState.dir === 'asc') newDir = 'desc';

                // 해제 (정렬 안 함, 페이지 새로고침 시 원래대로)

                currentThs.forEach(otherTh => otherTh.classList.remove('sort-asc', 'sort-desc'));

                // 일단 다음 클릭 시 다시 asc로 정렬하도록 함
                return;

            } else {
