            // 현재 컬럼 표시
            currentThs[idx].classList.add(newDir === 'asc' ? 'sort-asc' : 'sort-desc');
            sortStates[tableId] = { colIdx: idx, dir: newDir };
            sortTable(table, idx, newDir);
          });
        });

        // 정렬 상태가 있으면 자동 재적용 (메뉴/본부 전환 후)
        const state = sortStates[tableId];
        if (state) {
          sortTable(table, state.colIdx, state.dir);
          // 표시 갱신
          const currentRows = table.querySelectorAll('thead tr');
          const currentLast = currentRows[currentRows.length - 1];
          const currentThs = currentLast.querySelectorAll('th');
          currentThs.forEach((th, i) => {
            th.classList.remove('sort-asc', 'sort-desc');
            if (i === state.colIdx) {
              th.classList.add(state.dir === 'asc' ? 'sort-asc' : 'sort-desc');
            }
          });

    const file = event.target.files[0];

      event.target.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array' });

        let restoreCount = 0;

        // 각 시트별 복원 로직
        const restoreSheet = (sheetName, setter, keyExtractor) => {
          if (!wb.Sheets[sheetName]) return;
          const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName]);
          if (rows.length === 0) return;
          const grouped = {};
          rows.forEach(r => {
            const hq = r.본부;
            if (!hq) return;
            const { 본부, ...rest } = r;
            if (!grouped[hq]) grouped[hq] = [];
            grouped[hq].push(rest);
          });
          setter(grouped);
          restoreCount += rows.length;
        };

        restoreSheet('1_5대핵심과제', setCoreTasks);
        restoreSheet('2_M_S달성', setMSGoals);
        restoreSheet('3_대리상판매', setDealers);
        restoreSheet('4_PSI관리', setPSI);
        restoreSheet('5_영업사원판매', setSalesPerson);
        restoreSheet('6_DSO', setDSO);
        restoreSheet('7_BD진입', setBD);
        restoreSheet('7_BD수량관점', setBDQty);
        restoreSheet('7_BD고객별', setBDCustomers);

        // 9번 패키지

          const rows = XLSX.utils.sheet_to_json(wb.Sheets['9_패키지주차별']);
          setWeeklyData(rows);
          restoreCount += rows.length;
        }

        // 주차별 신규 실적

          const rows = XLSX.utils.sheet_to_json(wb.Sheets['주차별신규실적']);

          rows.forEach(r => {
            const key = `${r.메뉴}|${r.본부}|${r.참조ID}|${r.필드}|${r.연도}-${String(r.주차).padStart(2, '0')}`;

        {/* ===== 주요본부대시보드: 본부별 종합 비교표 + 3개 본부 KPI 카드 ===== */}
        {overviewTab === 'main' && (<>
        {/* ① 본부별 종합 비교표 (맨 위로 이동) */}
        <Card title="본부별 종합 비교표">

                    <td className="px-3 py-2 text-right">{kpi[hq].dso.toFixed(1)}</td>
                    <td className="px-3 py-2 text-right">{kpi[hq].dsoA.toFixed(1)}%</td>

                    <td className="px-3 py-2 text-right">{kpi[hq].bdRate.toFixed(1)}%</td>
                    <td className="px-3 py-2 text-right">{kpi[hq].subCustRate.toFixed(1)}%</td>
                    <td className="px-3 py-2 text-right">{formatNumber(kpi[hq].pkgPerson)}</td>
                  </tr>

        </Card>

        {/* ② 본부별 KPI 카드 (3개 본부) */}
        <div className="grid grid-cols-3 gap-4">
          {HQ_LIST.map(hq => {
            const data = kpi[hq];
            return (
              <div key={hq} className="bg-white border border-slate-200 rounded-md p-4">
                <div className="flex items-center justify-between mb-3 pb-3 border-b border-slate-100">
                  <h3 className="font-bold text-lg text-slate-900 flex items-center gap-2">
                    <span className="text-blue-600"><Icon name="building" className="w-5 h-5" /></span>{hq}
                  </h3>
                  <button onClick={() => { setSelectedHQ(hq); setSelectedSubmenu(1); }} className="text-xs text-blue-600 hover:underline">상세보기 →</button>
                </div>
                <div className="grid grid-cols-2 gap-3 text-sm">
                  <div><div className="text-xs text-slate-500">M/S</div><div className="text-xl font-bold text-slate-900">{data.ms.toFixed(1)}%</div></div>
                  <div><div className="text-xs text-slate-500">DSO</div><div className="text-xl font-bold text-slate-900">{data.dso.toFixed(1)}일</div></div>
                  <div><div className="text-xs text-slate-500">목표 달성률</div><div className="text-xl font-bold text-blue-600">{data.goalRate.toFixed(1)}%</div></div>
                  <div><div className="text-xs text-slate-500">BD 진입률</div><div className="text-xl font-bold text-slate-900">{data.bdRate.toFixed(1)}%</div></div>
                  <div><div className="text-xs text-slate-500">하부고객 확대율</div><div className="text-lg font-bold text-slate-900">{data.subCustRate.toFixed(1)}%</div></div>
                  <div><div className="text-xs text-slate-500">패키지 인원</div><div className="text-lg font-bold text-slate-900">{formatNumber(data.pkgPerson)}명</div></div>
                </div>

        </>)}

        {/* ===== 전체대시보드: 법인 매출 관리 ===== */}
        {overviewTab === 'all' && (
        <CorpSalesBlock
          weeklyEntries={weeklyEntries}
          setWeeklyEntries={setWeeklyEntries}
          logChange={logChange}
        />
        )}
      </div>
    );
  };

  /* ===== 메뉴 2: 지역별 M/S 달성현황 (월별 분리) ===== */
  const renderMSDSO = (hq) => {
    const { year: curYearMS } = parseWeekValue(filterWeek);
    const displayMonthMS = filterMonth || 5;
    const yearMonthMS = `${curYearMS}-${displayMonthMS}`;
    const monthLabelMS = `${displayMonthMS}월`;

    // === 월별 데이터 조회 ===
    // 정책: 5월만 기본 데이터 표시, 다른 월은 빈 데이터(또는 사용자 입력 데이터)만
    const is5월 = displayMonthMS === 5;
    
    // 빈 goals 템플릿 (구조 유지하되 수치는 0)
    const emptyGoals = (msGoals[hq] || []).map(g => ({
      id: g.id,
      region: g.region,
      marketSize: 0,
      qty: 0,
      msPercent: 0,
      yoy: 0,
    }));
    // 빈 competitorMS 템플릿
    const emptyComps = {};
    Object.keys(competitorMS[hq] || {}).forEach(region => {
      emptyComps[region] = (competitorMS[hq][region] || []).map(c => ({
        id: c.id, brand: c.brand,
        y25Qty: 0, y25MS: 0, m04Qty: 0, m04MS: 0, ytdQty: 0, ytdMS: 0,
        highlight: c.highlight || false,
      }));
    });
    // 빈 dsoDetail 템플릿
    const emptyDsos = (dsoDetail[hq] || []).map(d => ({
      id: d.id, region: d.region,
      targetQty: 0, dsoCurrent: 0, dsoNew: 0, public: 0, private: 0, bd: 0,
    }));

    const goals = (msGoalsMonth[hq] && msGoalsMonth[hq][yearMonthMS])
      ? msGoalsMonth[hq][yearMonthMS]
      : (is5월 ? (msGoals[hq] || []) : emptyGoals);
    const compsByRegion = (competitorMSMonth[hq] && competitorMSMonth[hq][yearMonthMS])
      ? competitorMSMonth[hq][yearMonthMS]
      : (is5월 ? (competitorMS[hq] || {}) : emptyComps);
    const dsos = (dsoDetailMonth[hq] && dsoDetailMonth[hq][yearMonthMS])
      ? dsoDetailMonth[hq][yearMonthMS]
      : (is5월 ? (dsoDetail[hq] || []) : emptyDsos);

    // === 4. 지역별 달성방안 월별 분리 ===
    const plans = (actionPlansMonth[hq] && actionPlansMonth[hq][yearMonthMS])
      ? actionPlansMonth[hq][yearMonthMS]
      : (is5월 ? (actionPlans[hq] || []) : []);

    // === 합계 계산 ===
    const goalsTotal = {
      marketSize: goals.reduce((s, g) => s + (g.marketSize || 0), 0),
      qty: goals.reduce((s, g) => s + (g.qty || 0), 0),
    };
    goalsTotal.msPercent = goalsTotal.marketSize > 0 ? +(goalsTotal.qty / goalsTotal.marketSize * 100).toFixed(1) : 0;

    const dsoTotal = {
      dsoCurrent: dsos.reduce((s, d) => s + (d.dsoCurrent || 0), 0),
      dsoNew: dsos.reduce((s, d) => s + (d.dsoNew || 0), 0),
      public: dsos.reduce((s, d) => s + (d.public || 0), 0),
      private: dsos.reduce((s, d) => s + (d.private || 0), 0),
      bd: dsos.reduce((s, d) => s + (d.bd || 0), 0),
    };

    // KPI 카드용 - 모든 지역
    const displayRegions = goals;

    // 경쟁현황 표시할 두 지역 (지역 필터가 '전체'면 처음 2개, 특정 지역이면 그 지역과 다음 지역)
    // 지역경쟁현황에 표시할 지역들 - 모든 지역 표시 (filterRegion 적용)
    const competitionRegions = (() => {
      if (filterRegion !== '전체') {
        // 필터된 지역만
        const filtered = goals.filter(g => g.region === filterRegion);
        return filtered.length > 0 ? filtered : goals;
      }
      // 전체일 때 모든 지역 표시
      return goals;
    })();

    // === 업데이트 함수 (월별 분리 저장) ===
    const updateGoal = (id, key, value) => {
      setMSGoalsMonth(prev => {
        const hqData = prev[hq] || {};
        // 이미 월별 데이터가 있으면 그걸 사용,
        // 없으면 5월은 기본 데이터 복사, 다른 월은 빈 템플릿 복사
        const monthData = hqData[yearMonthMS]
          ? hqData[yearMonthMS]
          : (is5월
              ? JSON.parse(JSON.stringify(msGoals[hq] || []))
              : JSON.parse(JSON.stringify(emptyGoals)));
        const updated = monthData.map(g => {
          if (g.id !== id) return g;
          const ng = { ...g, [key]: value };
          if (key === 'marketSize' || key === 'qty') {
            ng.msPercent = ng.marketSize > 0 ? +(ng.qty / ng.marketSize * 100).toFixed(1) : 0;
          }
          return ng;
        });
        return { ...prev, [hq]: { ...hqData, [yearMonthMS]: updated } };
      });
      logChange(`${hq} - 지역별 목표 (${monthLabelMS})`, `${key} 수정`);
    };

    const updateComp = (region, id, key, value) => {
      setCompetitorMSMonth(prev => {
        const hqData = prev[hq] || {};
        const monthData = hqData[yearMonthMS]
          ? hqData[yearMonthMS]
          : (is5월
              ? JSON.parse(JSON.stringify(competitorMS[hq] || {}))
              : JSON.parse(JSON.stringify(emptyComps)));
        const regionList = (monthData[region] || []).map(c => c.id === id ? { ...c, [key]: value } : c);
        return {
          ...prev,
          [hq]: {
            ...hqData,
            [yearMonthMS]: { ...monthData, [region]: regionList }
          }
        };
      });
      logChange(`${hq} - ${region} 경쟁사 (${monthLabelMS})`, `${key} 수정`);
    };

    const updateDSO = (id, key, value) => {
      setDSODetailMonth(prev => {
        const hqData = prev[hq] || {};
        const monthData = hqData[yearMonthMS]
          ? hqData[yearMonthMS]
          : (is5월
              ? JSON.parse(JSON.stringify(dsoDetail[hq] || []))
              : JSON.parse(JSON.stringify(emptyDsos)));
        const updated = monthData.map(d => d.id === id ? { ...d, [key]: value } : d);
        return { ...prev, [hq]: { ...hqData, [yearMonthMS]: updated } };
      });
      logChange(`${hq} - DSO 상세 (${monthLabelMS})`, `${key} 수정`);
    };

    const updatePlan = (id, key, value) => {
      setActionPlansMonth(prev => {
        const hqData = prev[hq] || {};
        const monthData = hqData[yearMonthMS]
          ? hqData[yearMonthMS]
          : (is5월 ? JSON.parse(JSON.stringify(actionPlans[hq] || [])) : []);
        const updated = monthData.map(p => p.id === id ? { ...p, [key]: value } : p);
        return { ...prev, [hq]: { ...hqData, [yearMonthMS]: updated } };
      });
      logChange(`${hq} - 달성방안 (${monthLabelMS})`, `${key} 수정`);
    };

    // === 상단 KPI 데이터 ===
    const hqTotalQty = goalsTotal.qty;
    const hqTotalMarket = goalsTotal.marketSize;
    const hqAvgMS = goalsTotal.msPercent;

    return (
      <div className="space-y-4">
        {/* 페이지 타이틀 */}
        <div className="flex items-baseline justify-between mb-2">

          <div className="flex items-baseline gap-3">

            <h1 className="text-2xl font-bold text-slate-900">{hq}</h1>

            <h2 className="text-2xl font-bold text-slate-900">2. 지역별 M/S 달성현황 ({monthLabelMS})</h2>

          </div>

          <span className="text-xs text-slate-500 flex items-center gap-1">

            <Icon name="refresh" className="w-3 h-3" /> 데이터 기준일: {new Date().toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}

          </span>

        </div>
          {/* 액션 버튼 (필터바는 상단 공통 사용) */}
          <div className="flex items-center justify-end gap-2">
            <button onClick={() => {
              const prevMonth = displayMonthMS - 1;
              if (prevMonth < 1) { alert('이전월이 없습니다 (1월에서는 사용 불가)'); return; }
              const prevYearMonth = `${curYearMS}-${prevMonth}`;

              // 이전월 데이터 가져오기 (월별 저장된 데이터 우선, 5월은 기본 데이터)
              const prevGoals = (msGoalsMonth[hq] && msGoalsMonth[hq][prevYearMonth])
                ? msGoalsMonth[hq][prevYearMonth]
                : (prevMonth === 5 ? msGoals[hq] : null);
              const prevComps = (competitorMSMonth[hq] && competitorMSMonth[hq][prevYearMonth])
                ? competitorMSMonth[hq][prevYearMonth]
                : (prevMonth === 5 ? competitorMS[hq] : null);
              const prevDsos = (dsoDetailMonth[hq] && dsoDetailMonth[hq][prevYearMonth])
                ? dsoDetailMonth[hq][prevYearMonth]
                : (prevMonth === 5 ? dsoDetail[hq] : null);

              if (!prevGoals && !prevComps && !prevDsos) {
                alert(`${prevMonth}월에 데이터가 없습니다.\n복사할 데이터가 없습니다.`);
                return;
              }
              if (!confirm(`${prevMonth}월의 데이터를 ${monthLabelMS}에 복사하시겠습니까?\n현재 ${monthLabelMS}의 데이터는 덮어씌워집니다.`)) return;

              // 깊은 복사로 저장
              if (prevGoals) {
                setMSGoalsMonth(prev => ({
                  ...prev,
                  [hq]: { ...(prev[hq] || {}), [yearMonthMS]: JSON.parse(JSON.stringify(prevGoals)) }
                }));
              }
              if (prevComps) {
                setCompetitorMSMonth(prev => ({
                  ...prev,
                  [hq]: { ...(prev[hq] || {}), [yearMonthMS]: JSON.parse(JSON.stringify(prevComps)) }
                }));
              }
              if (prevDsos) {
                setDSODetailMonth(prev => ({
                  ...prev,
                  [hq]: { ...(prev[hq] || {}), [yearMonthMS]: JSON.parse(JSON.stringify(prevDsos)) }
                }));
              }
              logChange(`2번 지역별 M/S`, `${prevMonth}월 → ${monthLabelMS} 복사`);
              alert(`${prevMonth}월 데이터 → ${monthLabelMS}로 복사 완료!`);
            }}
              className="flex items-center gap-1.5 px-3 py-1.5 text-sm border border-purple-300 bg-purple-50 text-purple-700 rounded-md hover:bg-purple-100 font-semibold">
              <Icon name="copy" className="w-4 h-4" /> 이전월 복사
            </button>
            <button className="flex items-center gap-1.5 px-3 py-1.5 text-sm border border-slate-300 rounded-md hover:bg-slate-50">
              <Icon name="upload" className="w-4 h-4" /> 엑셀 업로드
            </button>
            <button onClick={() => downloadCSV(goals, `${hq}_지역별_목표_${yearMonthMS}`)}
              className="flex items-center gap-1.5 px-3 py-1.5 text-sm border border-slate-300 rounded-md hover:bg-slate-50">
              <Icon name="download" className="w-4 h-4" /> 엑셀 다운로드
            </button>
            <button onClick={handleSync} className="px-4 py-1.5 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 font-semibold">
              저장
            </button>
          </div>
        {/* === 상단 KPI 카드 (통합본부+지역 + 본부 평균 M/S) === */}
        <div className="grid grid-cols-3 gap-3">
          {/* 본부+지역 통합 카드 (한 카드 안에 본부 전체 + 모든 지역) */}
          <div className="bg-white border border-slate-200 rounded-md p-3 col-span-2">
            <div className="text-xs text-slate-500 mb-2 line-clamp-1">{hq} 전체 + 지역별 목표 수량</div>
            <div className="grid grid-cols-4 gap-2">
              {/* 본부 전체 */}
              <div className="border-r border-slate-100 pr-2">
                <div className="text-[10px] text-slate-500 mb-0.5">{hq}</div>
                <div className="text-base font-bold text-blue-600">{formatNumber(hqTotalQty)}<span className="text-[10px] font-normal text-slate-500 ml-0.5">개</span></div>
                <div className="mt-1 h-1 bg-slate-100 rounded-full overflow-hidden">
                  <div className="h-full bg-blue-500" style={{ width: '100%' }}></div>
                </div>
              </div>
              {/* 지역별 */}
              {displayRegions.map((g) => {
                const pct = hqTotalQty > 0 ? (g.qty / hqTotalQty * 100) : 0;
                return (
                  <div key={g.id}>
                    <div className="text-[10px] text-slate-500 mb-0.5">{g.region}</div>
                    <div className="text-base font-bold text-slate-900">{formatNumber(g.qty)}<span className="text-[10px] font-normal text-slate-500 ml-0.5">개</span></div>
                    <div className="mt-1 h-1 bg-slate-100 rounded-full overflow-hidden">
                      <div className="h-full bg-blue-400" style={{ width: `${Math.min(100, pct)}%` }}></div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="text-[10px] text-slate-400 mt-2">전체 시장규모 {formatNumber(hqTotalMarket)}개</div>
          </div>

          {/* 본부 평균 M/S */}
          <div className="bg-white border border-slate-200 rounded-md p-3">
            <div className="text-xs text-slate-500 mb-1 line-clamp-1">{hq} 평균 M/S</div>
            <div className="flex items-baseline gap-1">
              <span className="text-xl font-bold text-slate-900">{hqAvgMS.toFixed(1)}</span>
              <span className="text-xs text-slate-500">%</span>
            </div>
            <div className="mt-2 h-1.5 bg-slate-100 rounded-full overflow-hidden">
              <div className={`h-full ${hqAvgMS >= 30 ? 'bg-emerald-500' : hqAvgMS >= 20 ? 'bg-blue-500' : 'bg-amber-500'}`} style={{ width: `${Math.min(100, hqAvgMS * 2)}%` }}></div>
            </div>
            <div className="text-xs text-slate-500 mt-1.5">목표 ÷ 시장규모</div>
          </div>
        </div>

        {/* === NOTE (2번 메뉴, 단일 메모, 월별 분리, 즉시 저장) === */}
        {(() => {
          const noteKeyMS = `ms_note|${hq}|${yearMonthMS}`;
          const currentNoteMS = weeklyEntries[noteKeyMS] ?? '';
          const updateNoteMS = (value) => {
            setWeeklyEntries(prev => ({ ...prev, [noteKeyMS]: value }));
          };
          return (
            <div className="bg-white border border-slate-200 rounded-md overflow-hidden">
              <div className="bg-slate-200 px-4 py-2 flex items-center justify-between">
                <h4 className="text-sm font-bold text-slate-900">NOTE</h4>
                <span className="text-xs text-slate-700">{monthLabelMS} 메모 · 자동 저장</span>
              </div>
              <div className="p-3">
                <textarea
                  value={currentNoteMS}
                  onChange={(e) => updateNoteMS(e.target.value)}
                  placeholder="이번 달 시장상황, M/S 달성방안, 경쟁사 분석, 다음 액션 등을 자유롭게 입력하세요. 입력 즉시 저장됩니다."
                  className="w-full min-h-[80px] px-2 py-1.5 text-sm border border-slate-200 rounded-md outline-none focus:border-slate-400 focus:ring-1 focus:ring-slate-200 resize-y"
                />
              </div>
            </div>
          );
        })()}

        {/* === 지역별 3C 분석 현황 (월별 분리 + 이전월 복사) === */}
        <div className="bg-white border border-slate-200 rounded-md p-4">
          <h3 className="text-base font-bold text-slate-900 mb-3">지역별 3C 분석 현황</h3>
          <div className="border border-slate-300 rounded overflow-hidden">
            <table className="w-full text-sm" data-table-id="3c_table" style={{ tableLayout: 'fixed' }}>
              <thead>
                <tr className="bg-slate-100 border-b border-slate-300">

                      <button onClick={() => {

                            const updated = monthData.filter(x => x.id !== p.id);

                };
                setActionPlansMonth(prev => {
                  const hqData = prev[hq] || {};
                  const monthData = hqData[yearMonthMS]
                    ? hqData[yearMonthMS]

                });

            </div>

              const prevMonth = displayMonthMS - 1;

                ? actionPlansMonth[hq][prevYearMonth]

              }
              if (!confirm(`${prevMonth}월의 달성방안 데이터(${prevData.length}건)를 ${monthLabelMS}에 복사하시겠습니까?\n현재 ${monthLabelMS}의 데이터는 덮어씌워집니다.`)) return;
              setActionPlansMonth(prev => ({
                ...prev,
                [hq]: { ...(prev[hq] || {}), [yearMonthMS]: JSON.parse(JSON.stringify(prevData)) }

              logChange(`${hq} - 달성방안`, `${prevMonth}월 → ${monthLabelMS} 복사`);
              alert(`${prevMonth}월 데이터 → ${monthLabelMS}로 복사 완료!`);
            }}
              className="flex items-center gap-1 px-2.5 py-1 text-xs border border-slate-300 rounded-md hover:bg-slate-50">

        {/* === 지역별 목표 현황 === */}
        <div className="bg-white border border-slate-200 rounded-md p-4">
          <h3 className="text-base font-bold text-slate-900 mb-3">지역별 목표 현황</h3>
          <div className="border border-slate-300 rounded overflow-hidden">
            <table className="w-full text-sm" data-table-id="region_target" style={{ tableLayout: 'fixed' }}>
              <thead>
                <tr className="bg-slate-100 border-b border-slate-300">

                  <th className="px-3 py-2 border-r border-slate-300 font-semibold text-slate-700">구역</th>
                  <th className="px-3 py-2 border-r border-slate-300 font-semibold text-slate-700">지역</th>
                  <th className="px-3 py-2 border-r border-slate-300 font-semibold text-slate-700">2025년도<br/><span className="text-[10px] font-normal text-slate-500">달성수량</span></th>
                  <th className="px-3 py-2 border-r border-slate-300 font-semibold text-slate-700">2026년도<br/><span className="text-[10px] font-normal text-slate-500">시장규모</span></th>
                  <th className="px-3 py-2 border-r border-slate-300 font-semibold text-slate-700">2026년도<br/><span className="text-[10px] font-normal text-slate-500">목표수량</span></th>
                  <th className="px-3 py-2 border-r border-slate-300 font-semibold text-slate-700">M/S</th>
                  <th className="px-3 py-2 font-semibold text-slate-700">YoY</th>
                </tr>
              </thead>
              <tbody>
                {goals.map((g, idx) => {

                  const isHighlight = filterRegion !== '전체' && g.region === filterRegion;
                  // YoY 자동 계산 = (2026목표 - 2025달성) / 2025달성 × 100
                  const prevQty = g.prevYearQty || 0;
                  const yoy = prevQty > 0 ? +(((g.qty - prevQty) / prevQty) * 100).toFixed(1) : 0;
                  const yoyColor = yoy > 0 ? 'text-emerald-600' : yoy < 0 ? 'text-rose-600' : 'text-slate-400';
                  return (
                    <tr key={g.id} className={`border-b border-slate-200 hover:bg-slate-50 ${isHighlight ? 'bg-blue-50' : ''}`}>
                      <td className="px-3 py-2 border-r border-slate-300 text-center">{hq}</td>
                      <td className="px-3 py-2 border-r border-slate-300 text-center">10</td>
                      <td className="px-3 py-2 border-r border-slate-300 text-center font-semibold">{g.region}</td>
                      <td className="px-2 py-1 border-r border-slate-300 text-right">
                        <EditableCell value={g.prevYearQty || 0} type="number" align="right" onSave={(v) => updateGoal(g.id, 'prevYearQty', v)} />
                      </td>
                      <td className="px-2 py-1 border-r border-slate-300 text-right">
                        <EditableCell value={g.marketSize} type="number" align="right" onSave={(v) => updateGoal(g.id, 'marketSize', v)} />
                      </td>
                      <td className="px-2 py-1 border-r border-slate-300 text-right">
                        <EditableCell value={g.qty} type="number" align="right" onSave={(v) => updateGoal(g.id, 'qty', v)} />
                      </td>
                      <td className="px-3 py-2 border-r border-slate-300 text-right font-semibold text-blue-600">{g.msPercent.toFixed(1)}%</td>
                      <td className={`px-3 py-2 text-right font-semibold ${yoyColor}`} title="(2026목표 - 2025달성) ÷ 2025달성 × 100">
                        {prevQty > 0 ? `${yoy > 0 ? '+' : ''}${yoy}%` : '-'}
                      </td>
                    </tr>
                  );
                })}
                <tr className="bg-slate-100 font-bold border-t-2 border-slate-400">
                  <td className="px-3 py-2 border-r border-slate-300 text-center">합계</td>
                  <td className="px-3 py-2 border-r border-slate-300 text-center">-</td>
                  <td className="px-3 py-2 border-r border-slate-300 text-center">전체</td>
                  <td className="px-3 py-2 border-r border-slate-300 text-right">{formatNumber(goals.reduce((s, g) => s + (g.prevYearQty || 0), 0))}</td>
                  <td className="px-3 py-2 border-r border-slate-300 text-right">{formatNumber(goalsTotal.marketSize)}</td>
                  <td className="px-3 py-2 border-r border-slate-300 text-right">{formatNumber(goalsTotal.qty)}</td>
                  <td className="px-3 py-2 border-r border-slate-300 text-right text-blue-600">{goalsTotal.msPercent.toFixed(1)}%</td>
                  {(() => {
                    const totPrev = goals.reduce((s, g) => s + (g.prevYearQty || 0), 0);
                    const totYoY = totPrev > 0 ? +(((goalsTotal.qty - totPrev) / totPrev) * 100).toFixed(1) : 0;
                    const cls = totYoY > 0 ? 'text-emerald-600' : totYoY < 0 ? 'text-rose-600' : 'text-slate-400';
                    return <td className={`px-3 py-2 text-right ${cls}`}>{totPrev > 0 ? `${totYoY > 0 ? '+' : ''}${totYoY}%` : '-'}</td>;
                  })()}
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        {/* === 지역별 경쟁현황 (지역 필터 + 2개씩 박스 배치) - 월 주차별 입력 === */}
        <div className="bg-white border border-slate-200 rounded-md p-3 flex items-center justify-between gap-3 flex-wrap">
          <div className="flex items-center gap-3 flex-wrap">
            <h3 className="text-base font-bold text-slate-900">지역별 경쟁현황</h3>
            {!competitionCollapsed[hq] && (
              <>
                <div className="flex items-center gap-2">
                  <Icon name="filter" className="w-4 h-4 text-slate-500" />
                  <span className="text-sm font-semibold text-slate-700">지역 필터:</span>
                </div>
                <div className="relative">
                  <select value={filterRegion} onChange={(e) => setFilterRegion(e.target.value)}
                    className="appearance-none pl-3 pr-8 py-1.5 text-sm border border-slate-300 rounded-md bg-white cursor-pointer hover:border-blue-400 focus:outline-none focus:border-blue-500 font-semibold">
                    <option value="전체">전체 ({goals.length}개 지역)</option>
                    {(REGIONS[hq] || []).map(r => <option key={r} value={r}>{r}</option>)}
                  </select>
                  <div className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                    <Icon name="chevronDown" className="w-3.5 h-3.5" />
                  </div>
                </div>
                <span className="text-xs text-slate-500">
                  · 현재 표시: <strong className="text-blue-600">{filterRegion === '전체' ? `전체 ${competitionRegions.length}개` : filterRegion}</strong>
                  {filterRegion !== '전체' && (
                    <button onClick={() => setFilterRegion('전체')}
                      className="ml-2 text-blue-600 hover:underline">↻ 전체 보기</button>
                  )}
                </span>
              </>
            )}
          </div>
          <button
            onClick={() => setCompetitionCollapsed(prev => ({ ...prev, [hq]: !prev[hq] }))}
            className="flex items-center gap-1.5 px-2.5 py-1 text-xs rounded-md border border-slate-300 bg-slate-50 text-slate-600 hover:bg-slate-100 font-semibold transition"
            title={competitionCollapsed[hq] ? '경쟁현황 펼치기' : '경쟁현황 숨기기'}>
            <Icon name={competitionCollapsed[hq] ? 'chevronRight' : 'chevronDown'} className="w-3.5 h-3.5" />
            {competitionCollapsed[hq] ? '경쟁현황 펼치기' : '경쟁현황 숨기기'}
          </button>
        </div>

        {/* 2개씩 한 박스에 그리드로 배치 */}
        {!competitionCollapsed[hq] && (() => {
          // competitionRegions를 2개씩 묶어서 쌍으로 만듦
          const pairs = [];
          for (let i = 0; i < competitionRegions.length; i += 2) {
            pairs.push(competitionRegions.slice(i, i + 2));
          }
          return pairs.map((pair, pairIdx) => (
            <div key={`pair-${pairIdx}`} className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              {pair.map((g) => {
            const regionalComp = compsByRegion[g.region] || [];
            const { year: curYearC } = parseWeekValue(filterWeek);
            const displayMonthC = filterMonth || 5;
            const monthLabelC = `${displayMonthC}월`;

            // === 월별 분리 helper들 ===
            // comp_target|hq|region|compId|qty|year-month  → 26년 당월 목표 수량
            // comp_actual|hq|region|compId|qty|year-month  → 26년 당월 실적 수량
            // comp_cum|hq|region|compId|qty|year-month     → 26년 누적 수량

            const getCompField = (compId, field, defaultVal = 0) => {
              const key = `comp_${field}|${hq}|${g.region}|${compId}|${curYearC}-${displayMonthC}`;
              const stored = weeklyEntries[key];
              if (stored !== undefined && stored !== null) return stored;
              return defaultVal;
            };
            const setCompField = (compId, field, value) => {
              const key = `comp_${field}|${hq}|${g.region}|${compId}|${curYearC}-${displayMonthC}`;
              setWeeklyEntries(prev => ({ ...prev, [key]: parseFloat(value) || 0 }));
              logChange(`경쟁사 ${g.region} - ${monthLabelC}`, `${field} 수정`);
            };

            // 25년 데이터 (월 무관, 본부 데이터의 y25Qty 그대로 사용)
            // 26년 당월 목표 수량 (월별 분리)
            const getMonthTargetQty = (c) => getCompField(c.id, 'target_qty', c.monthTargetQty || 0);
            // 26년 당월 실적 수량 (월별 분리, 신규)
            const getMonthActualQty = (c) => getCompField(c.id, 'actual_qty', 0);
            // 26년 누적 수량 (월별 분리, 폴백: c.ytdQty)
            const getYtdQty = (c) => getCompField(c.id, 'cum_qty', c.ytdQty || 0);

            // 합계 계산
            const totMonthTarget = regionalComp.reduce((s, c) => s + getMonthTargetQty(c), 0);
            const totMonthActual = regionalComp.reduce((s, c) => s + getMonthActualQty(c), 0);
            const totYtd = regionalComp.reduce((s, c) => s + getYtdQty(c), 0);
            const totY25 = regionalComp.reduce((s, c) => s + (c.y25Qty || 0), 0);

            // M/S 자동 계산 (수량 ÷ 합계 × 100)
            const calcMS = (qty, total) => total > 0 ? +(qty / total * 100).toFixed(1) : 0;

            // 한자 → 영문 브랜드 매핑 (병기용)
            const BRAND_KO = {
              '奥齿泰': 'Osstem', '登腾': 'Dentium', '士卓曼': 'Straumann',
              '迪奥': 'DIO', '美格真': '메가젠', '纽白特': 'NewBitec',
              '诺贝尔': 'Nobel', '皓圣': 'IDS', '安卓健': 'Anthogyr',
              '登士柏': 'Dentsply', '科美勒': 'Cowellmedi', '仕诺康': 'SNUCONE',
              '中科安齿': 'Anstetic', '百康特': 'Bicon', '易普莱': 'Iplant',
              '其他': '기타', '기타': '기타',
            };
            const brandLabel = (brand) => BRAND_KO[brand] || '';

            // 합계
            const compTotal = {
              y25Qty: totY25,
              monthTarget: totMonthTarget,
              monthActual: totMonthActual,
              ytdQty: totYtd,
            };

            return (
              <div key={g.id} className="bg-white border border-slate-200 rounded-md p-4">
                <div className="flex items-center justify-between mb-3 flex-wrap gap-1">
                  <h3 className="text-base font-bold text-slate-900">{g.region} 지역 경쟁현황 <span className="text-xs font-normal text-slate-500">(전월 · {monthLabelC})</span></h3>
                  <span className="text-[11px] text-slate-500">전체 시장 {formatNumber(totMonthActual)}개</span>
                </div>

                {/* === 카드형 행 (브랜드 + 진행률 바 + 수량/M/S) === */}
                <div className="border border-slate-200 rounded overflow-hidden">
                  {/* 헤더 */}
                  <div className="grid items-center bg-slate-50 border-b border-slate-200 px-3 py-2 text-xs font-semibold text-slate-600"
                       style={{ gridTemplateColumns: '32px 1fr 2fr 90px' }}>
                    <span className="text-center">No</span>
                    <span>브랜드</span>
                    <span className="px-2">M/S 비율</span>
                    <span className="text-right">수량 / M/S</span>
                  </div>

                  {regionalComp.length === 0 ? (
                    <div className="px-3 py-8 text-center text-sm text-slate-400">데이터가 없습니다.</div>
                  ) : regionalComp.map((c, idx) => {
                    const isMega = c.highlight;
                    const monthActual = getMonthActualQty(c);
                    const actualMS = calcMS(monthActual, totMonthActual);
                    const enLabel = brandLabel(c.brand);
                    return (
                      <div key={c.id}
                        className={`grid items-center px-3 py-2 border-b border-slate-100 hover:bg-slate-50 last:border-b-0 ${isMega ? 'bg-blue-50 hover:bg-blue-100' : ''}`}
                        style={{ gridTemplateColumns: '32px 1fr 2fr 90px' }}>
                        {/* No */}
                        <span className={`text-center text-sm ${isMega ? 'font-bold text-blue-700' : 'text-slate-600'}`}>{idx + 1}</span>

                        {/* 브랜드명 (영문 + 한자) */}
                        <div className="text-sm leading-tight">
                          {enLabel && <div className={`${isMega ? 'font-bold text-blue-700' : 'font-semibold text-slate-800'}`}>{enLabel}</div>}
                          <div className={isMega ? 'text-xs text-blue-600' : 'text-xs text-slate-500'}>
                            <EditableCell value={c.brand} onSave={(v) => updateComp(g.region, c.id, 'brand', v)} />
                          </div>
                        </div>

                        {/* 진행률 바 */}
                        <div className="px-2">
                          <div className={`relative h-4 rounded-sm overflow-hidden ${isMega ? 'bg-blue-200' : 'bg-slate-100'}`}>
                            <div className={`h-full transition-all ${isMega ? 'bg-blue-600' : 'bg-slate-500'}`}
                                 style={{ width: `${Math.min(100, actualMS)}%` }}></div>
                          </div>
                        </div>

                        {/* 수량(편집) + M/S (자동) */}
                        <div className="text-right">
                          <div className={`text-sm font-semibold ${isMega ? 'text-blue-700' : 'text-slate-800'}`}>
                            <EditableCell value={monthActual} type="number" align="right" onSave={(v) => setCompField(c.id, 'actual_qty', v)} />
                          </div>
                          <div className={`text-[11px] ${isMega ? 'text-blue-600 font-semibold' : 'text-slate-500'}`}>{actualMS}%</div>
                        </div>
                      </div>
                    );
                  })}

                  {/* 합계 행 */}
                  {regionalComp.length > 0 && (
                    <div className="grid items-center px-3 py-2 bg-slate-100 border-t-2 border-slate-300 font-bold"
                         style={{ gridTemplateColumns: '32px 1fr 2fr 90px' }}>
                      <span className="text-center text-sm text-slate-700">-</span>
                      <span className="text-sm text-slate-700">합계</span>
                      <span className="px-2 text-xs text-slate-500">전체 100%</span>
                      <div className="text-right">
                        <div className="text-sm text-slate-800">{formatNumber(totMonthActual)}</div>
                        <div className="text-[11px] text-slate-600">{totMonthActual > 0 ? '100.0%' : '0.0%'}</div>
                      </div>
                    </div>

            const getDealerMonthGoal = (dealer) => {
              const key = `dealer-monthly|${hq}|${dealer.id}|goal|${curYear}-${displayMonth}`;
              const stored = weeklyEntries[key];
              if (stored !== undefined && stored !== null) return stored;
              // 폴백: 기본값을 그대로 사용 (5월 첫 진입 시 표시만)
              return dealer.goal || 0;

              const key = `dealer-monthly|${hq}|${dealerId}|goal|${curYear}-${displayMonth}`;
              setWeeklyEntries(prev => ({ ...prev, [key]: parseFloat(value) || 0 }));

              const monthGoal = getDealerMonthGoal(dealer);

              const cumActual = w1 + w2 + w3 + w4 + w5;

              let status;

              return { monthGoal, w1, w2, w3, w4, w5, cumActual, achRate, status };

                '주의': 'bg-amber-50 text-amber-700 border-amber-200',
                '위험': 'bg-rose-50 text-rose-700 border-rose-200',

                          <div>계약 전체수량</div>

                            <EditableCell value={row.name} onSave={(v) => updateRow(row.id, 'name', v)} />

                          <td className="px-2 py-1 border-r border-slate-300 text-right bg-emerald-50/30">

                ) : insights.nextActions.map((item, idx) => (

  };

  // 4번 PSI - 펼침 상태 관리
  const [psiExpandedRow, setPSIExpandedRow] = useState(null);
  const [psiFocusExpandedRow, setPSIFocusExpandedRow] = useState(null);
  // 6번 메뉴 - DSO 상세 행 펼침 (id를 키로) [Deprecated: 사이드 패널로 변경됨]
  const [dsoExpandedRow, setDSOExpandedRow] = useState(null);
  // 6번 메뉴 - DSO 사이드 패널 (선택된 DSO row 전체)
  const [dsoDetailPanel, setDsoDetailPanel] = useState(null); // { hq, dsoId, dsoRow }
  // 6번 메뉴 - DSO 월별 실적 행별 펼침 상태 (rowId → true/false)
  const [dsoMonthlyExpanded, setDsoMonthlyExpanded] = useState({});
  // 중점관리 대리상 숨김 행 (본부별 id 목록)
  const [hiddenFocusRows, setHiddenFocusRows] = useState(() => {
    try { const s = localStorage.getItem('dashboard_hiddenFocusRows_v1'); return s ? JSON.parse(s) : {}; } catch (e) { return {}; }
  });
  React.useEffect(() => {
    try { localStorage.setItem('dashboard_hiddenFocusRows_v1', JSON.stringify(hiddenFocusRows)); } catch (e) {}
  }, [hiddenFocusRows]);
  // 숨김 행 보기 토글 (본부별)
  const [showHiddenFocus, setShowHiddenFocus] = useState({});
  // 중점 관리 대리상 표 접기/펼치기 (본부별)
  const [coreDealerCollapsed, setCoreDealerCollapsed] = useState(() => {
    try { const s = localStorage.getItem('dashboard_coreDealerCollapsed_v1'); return s ? JSON.parse(s) : {}; } catch (e) { return {}; }
  });
  React.useEffect(() => {
    try { localStorage.setItem('dashboard_coreDealerCollapsed_v1', JSON.stringify(coreDealerCollapsed)); } catch (e) {}
  }, [coreDealerCollapsed]);
  // 주차별 실적 추이 차트 접기/펼치기 (본부별)
  const [weeklyChartCollapsed, setWeeklyChartCollapsed] = useState(() => {
    try { const s = localStorage.getItem('dashboard_weeklyChartCollapsed_v1'); return s ? JSON.parse(s) : {}; } catch (e) { return {}; }
  });
  React.useEffect(() => {
    try { localStorage.setItem('dashboard_weeklyChartCollapsed_v1', JSON.stringify(weeklyChartCollapsed)); } catch (e) {}
  }, [weeklyChartCollapsed]);
  // 2번 메뉴 - 지역별 경쟁현황 접기/펼치기 (본부별)
  const [competitionCollapsed, setCompetitionCollapsed] = useState(() => {
    try { const s = localStorage.getItem('dashboard_competitionCollapsed_v1'); return s ? JSON.parse(s) : {}; } catch (e) { return {}; }
  });
  React.useEffect(() => {
    try { localStorage.setItem('dashboard_competitionCollapsed_v1', JSON.stringify(competitionCollapsed)); } catch (e) {}
  }, [competitionCollapsed]);

  /* ===== 메뉴 4: 대리상 PSI 관리 (월별 분리) ===== */
  // 4번 표 (영업사원 진도 현황) - 정렬 상태
  const [empSortKey, setEmpSortKey] = useState(null); // 'rate' | 'status' | null
  const [empSortDir, setEmpSortDir] = useState('asc');
  // 영업사원 진도 현황 - 금액/수량 탭 (탭별 독립 저장)
  const [empMetric, setEmpMetric] = useState('qty'); // 'amount' | 'qty'
  // 3번 표 (대리상 PSI 관리) - 숨김 행 + 정렬 상태
  const [hiddenPSIRows, setHiddenPSIRows] = useState(() => {
    try { const s = localStorage.getItem('dashboard_hiddenPSIRows_v1'); return s ? JSON.parse(s) : {}; } catch (e) { return {}; }
  });
  React.useEffect(() => {
    try { localStorage.setItem('dashboard_hiddenPSIRows_v1', JSON.stringify(hiddenPSIRows)); } catch (e) {}
  }, [hiddenPSIRows]);
  const [showHiddenPSI, setShowHiddenPSI] = useState({});
  const [psiSortKey, setPsiSortKey] = useState(null); // 'purchaseRate' | 'avgBase' | null
  const [psiSortDir, setPsiSortDir] = useState('asc'); // 'asc' | 'desc'

  const renderPSI = (hq) => {
    const { year: curYearP } = parseWeekValue(filterWeek);
    const displayMonthP = filterMonth || 5;
    const yearMonthP = `${curYearP}-${displayMonthP}`;
    const monthLabelP = `${displayMonthP}월`;
    const is5월P = displayMonthP === 5;

    // 주요 문제 / 달성방안 / 다음 액션 관련 (3번 메뉴에서 이관)
    const insights = dealerInsights[hq] || { problems: [], plans: [], nextActions: [] };

    // === NOTE (단일 메모) - 월별 분리, 즉시 저장 ===
    const noteKey = `psi_note|${hq}|${yearMonthP}`;
    const currentNote = weeklyEntries[noteKey] ?? '';
    const updateNote = (value) => {
      setWeeklyEntries(prev => ({ ...prev, [noteKey]: value }));
    };

    const updateInsight = (type, idx, value) => {
      setDealerInsights(prev => ({
        ...prev,
        [hq]: {
          ...(prev[hq] || { problems: [], plans: [], nextActions: [] }),
          [type]: (prev[hq]?.[type] || []).map((v, i) => i === idx ? value : v)
        }
      }));
      logChange(`${hq} - ${type}`, `${idx + 1}번 항목 수정`);
    };
    const addInsight = (type) => {
      setDealerInsights(prev => ({
        ...prev,
        [hq]: {
          ...(prev[hq] || { problems: [], plans: [], nextActions: [] }),
          [type]: [...(prev[hq]?.[type] || []), '새 항목']
        }
      }));
    };
    const removeInsight = (type, idx) => {
      setDealerInsights(prev => ({
        ...prev,
        [hq]: {
          ...(prev[hq] || { problems: [], plans: [], nextActions: [] }),
          [type]: (prev[hq]?.[type] || []).filter((_, i) => i !== idx)
        }
      }));
    };

    // 빈 템플릿 (구조 유지, 수치 0)
    const emptyPSI = (psi[hq] || []).map(d => ({
      id: d.id, dealerName: d.dealerName, region: d.region,
      purchaseGoal: 0, purchaseActual: 0, salesGoal: 0, salesActual: 0, currentStock: 0,
    }));
    const emptyFocus = (psiFocus[hq] || []).map(d => ({
      id: d.id, dealer: d.dealer, region: d.region,
      stockYE: 0, monthlyAvg: 0,
      ytdP: 0, ytdS: 0, apr_P: 0, apr_S: 0, apr_I: 0, apr_ratio: 0, apr_base: 0,
      mayPurchaseGoal: 0, mayPurchaseActual: 0, mayPurchaseRate: 0,
      maySalesGoal: 0, maySalesActual: 0, maySalesRate: 0,
      mayEndStock: 0, mayRatio: 0, mayBase: 0,
      stock_I: 0, turnoverRatio: 0, contractBase: 0,
      issue: '',
    }));

    // 월별 데이터 조회 (5월만 기본, 다른 월은 빈)
    const data = (psiMonth[hq] && psiMonth[hq][yearMonthP])
      ? psiMonth[hq][yearMonthP]
      : (is5월P ? (psi[hq] || []) : emptyPSI);
    const focusData = (psiFocusMonth[hq] && psiFocusMonth[hq][yearMonthP])
      ? psiFocusMonth[hq][yearMonthP]
      : (is5월P ? (psiFocus[hq] || []) : emptyFocus);

    // 지역 필터 적용
    const filteredData = filterRegion === '전체' ? data : data.filter(d => d.region === filterRegion);
    const _focusFiltered = filterRegion === '전체' ? focusData : focusData.filter(d => d.region === filterRegion);
    // 숨김 행 분리 (본부별)
    const hiddenIds = hiddenFocusRows[hq] || [];
    const isShowingHidden = showHiddenFocus[hq] || false;
    const visibleFocus = _focusFiltered.filter(d => !hiddenIds.includes(d.id));
    const hiddenFocus = _focusFiltered.filter(d => hiddenIds.includes(d.id));
    // 표에 표시할 행 (숨김 보기 토글에 따라)
    const filteredFocus = isShowingHidden ? _focusFiltered : visibleFocus;

    // 행 숨기기/보이기 토글
    const toggleHideFocusRow = (id) => {
      setHiddenFocusRows(prev => {
        const cur = prev[hq] || [];
        return {
          ...prev,
          [hq]: cur.includes(id) ? cur.filter(x => x !== id) : [...cur, id]
        };
      });
    };

    // 합계 계산
    const totalPurchaseGoal = filteredData.reduce((s, d) => s + (d.purchaseGoal || 0), 0);
    const totalPurchaseActual = filteredData.reduce((s, d) => s + (d.purchaseActual || 0), 0);
    const totalSalesGoal = filteredData.reduce((s, d) => s + (d.salesGoal || 0), 0);
    const totalSalesActual = filteredData.reduce((s, d) => s + (d.salesActual || 0), 0);
    const totalStock = filteredData.reduce((s, d) => s + (d.currentStock || 0), 0);
    const purchaseRate = totalPurchaseGoal > 0 ? +(totalPurchaseActual / totalPurchaseGoal * 100).toFixed(0) : 0;
    const salesRate = totalSalesGoal > 0 ? +(totalSalesActual / totalSalesGoal * 100).toFixed(0) : 0;

    // 목표 월말재고 = 구매목표 + 시작재고(추정 = 현재재고) - 판매목표
    const targetEndStock = totalStock + (totalPurchaseGoal - totalPurchaseActual) - (totalSalesGoal - totalSalesActual);
    const totalRatio = totalSalesActual > 0 ? +(totalStock / totalSalesActual).toFixed(1) : 0;

    // 행별 진행률 및 상태 계산
    const calcRow = (row) => {
      const pRate = (row.purchaseGoal || 0) > 0 ? (row.purchaseActual || 0) / row.purchaseGoal * 100 : 0;
      const sRate = (row.salesGoal || 0) > 0 ? (row.salesActual || 0) / row.salesGoal * 100 : 0;
      const ratio = (row.salesActual || 0) > 0 ? (row.currentStock || 0) / row.salesActual : 0;
      let status;
      if (sRate < 10 || ratio > 5 || ratio < 0) status = '위험';
      else if (sRate < 25 || ratio > 3) status = '주의';
      else status = '정상';
      return { pRate, sRate, ratio, status };
    };

    const calcFocusStatus = (ratio) => {
      if (ratio < 0 || ratio > 5) return '위험';
      if (ratio > 3) return '주의';
      return '정상';
    };

    const statusStyle = (status) => {
      switch (status) {
        case '위험': return 'bg-rose-500 text-white';
        case '주의': return 'bg-amber-400 text-white';
        case '정상': return 'bg-emerald-500 text-white';
        case '관리 필요': return 'bg-blue-500 text-white';
        default: return 'bg-slate-300 text-white';
      }
    };

    // 본부 전체 상태 (합계 행)
    const totalStatus = (() => {
      if (salesRate < 20 || totalRatio > 5 || totalRatio < 0) return '관리 필요';
      if (salesRate < 50 || totalRatio > 3) return '관리 필요';
      return '정상';
    })();

    // 진행률 막대 (블루)
    const ProgressBar = ({ rate }) => (
      <div className="flex items-center gap-2 w-full">
        <span className="text-xs font-semibold text-slate-700 min-w-[28px]">{rate.toFixed(0)}%</span>
        <div className="flex-1 h-1.5 bg-slate-200 rounded-full overflow-hidden">
          <div className="h-full bg-blue-600 rounded-full transition-all" style={{ width: `${Math.min(100, rate)}%` }}></div>
        </div>
      </div>
    );

    // 업데이트 함수 (월별 분리)
    const updateRow = (id, key, value) => {
      setPSIMonth(prev => {
        const hqData = prev[hq] || {};
        const monthData = hqData[yearMonthP]
          ? hqData[yearMonthP]
          : (is5월P
              ? JSON.parse(JSON.stringify(psi[hq] || []))
              : JSON.parse(JSON.stringify(emptyPSI)));
        const updated = monthData.map(d => d.id === id ? { ...d, [key]: value } : d);
        return { ...prev, [hq]: { ...hqData, [yearMonthP]: updated } };
      });
      logChange(`${hq} - PSI 관리 (${monthLabelP})`, `${key} 수정`);
    };

    const updateFocus = (id, key, value) => {
      setPSIFocusMonth(prev => {
        const hqData = prev[hq] || {};
        const monthData = hqData[yearMonthP]
          ? hqData[yearMonthP]
          : (is5월P
              ? JSON.parse(JSON.stringify(psiFocus[hq] || []))
              : JSON.parse(JSON.stringify(emptyFocus)));
        const updated = monthData.map(d => d.id === id ? { ...d, [key]: value } : d);
        return { ...prev, [hq]: { ...hqData, [yearMonthP]: updated } };
      });
      // 5월일 때는 원본 psiFocus도 동기화 (대리상 PSI 관리 표가 psiFocus[hq] 사용)
      if (is5월P) {
        setPSIFocus(prev => ({
          ...prev,
          [hq]: (prev[hq] || []).map(d => d.id === id ? { ...d, [key]: value } : d)
        }));
      }
      logChange(`${hq} - 중점 관리 (${monthLabelP})`, `${key} 수정`);
    };

    // 이전월 데이터 복사
    const handleCopyPrevMonthPSI = () => {
      const prevMonth = displayMonthP - 1;
      if (prevMonth < 1) { alert('이전월이 없습니다 (1월에서는 사용 불가)'); return; }
      const prevYearMonth = `${curYearP}-${prevMonth}`;

      const prevPSI = (psiMonth[hq] && psiMonth[hq][prevYearMonth])
        ? psiMonth[hq][prevYearMonth]
        : (prevMonth === 5 ? psi[hq] : null);
      const prevFocus = (psiFocusMonth[hq] && psiFocusMonth[hq][prevYearMonth])
        ? psiFocusMonth[hq][prevYearMonth]
        : (prevMonth === 5 ? psiFocus[hq] : null);

      if (!prevPSI && !prevFocus) {
        alert(`${prevMonth}월에 데이터가 없습니다.`);
        return;
      }
      if (!confirm(`${prevMonth}월의 PSI 데이터를 ${monthLabelP}에 복사하시겠습니까?\n현재 ${monthLabelP}의 데이터는 덮어씌워집니다.`)) return;

      if (prevPSI) {
        setPSIMonth(prev => ({
          ...prev,
          [hq]: { ...(prev[hq] || {}), [yearMonthP]: JSON.parse(JSON.stringify(prevPSI)) }
        }));
      }
      if (prevFocus) {
        setPSIFocusMonth(prev => ({
          ...prev,
          [hq]: { ...(prev[hq] || {}), [yearMonthP]: JSON.parse(JSON.stringify(prevFocus)) }
        }));
      }
      logChange(`4번 PSI 관리`, `${prevMonth}월 → ${monthLabelP} 복사`);
      alert(`${prevMonth}월 데이터 → ${monthLabelP}로 복사 완료!`);
    };

    return (
      <div className="space-y-4">
        {/* 페이지 타이틀 */}
        <div className="flex items-baseline justify-between mb-2">

          <div className="flex items-baseline gap-3">

            <h1 className="text-2xl font-bold text-slate-900">{hq}</h1>

            <h2 className="text-2xl font-bold text-slate-900">3. 대리상 PSI 관리 ({monthLabelP})</h2>


          </div>

          <span className="text-xs text-slate-500 flex items-center gap-1">

            <Icon name="refresh" className="w-3 h-3" /> 데이터 기준일: {new Date().toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}

          </span>

        </div>
          {/* 액션 버튼 (필터바는 상단 공통 사용) */}
          <div className="flex items-center justify-end gap-2">
            <button onClick={handleCopyPrevMonthPSI}
              className="flex items-center gap-1.5 px-3 py-1.5 text-sm border border-purple-300 bg-purple-50 text-purple-700 rounded-md hover:bg-purple-100 font-semibold">
              <Icon name="copy" className="w-4 h-4" /> 이전월 복사
            </button>
            <button className="flex items-center gap-1.5 px-3 py-1.5 text-sm border border-slate-300 rounded-md hover:bg-slate-50">
              <Icon name="upload" className="w-4 h-4" /> 엑셀 업로드
            </button>
            <button onClick={() => downloadCSV(filteredData, `${hq}_PSI_관리_${yearMonthP}`)}
              className="flex items-center gap-1.5 px-3 py-1.5 text-sm border border-slate-300 rounded-md hover:bg-slate-50">
              <Icon name="download" className="w-4 h-4" /> 엑셀 다운로드
            </button>
            <button onClick={handleSync} className="px-4 py-1.5 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 font-semibold">
              저장
            </button>
          </div>

        {/* === NOTE (단일 메모, 월별 분리, 즉시 저장) === */}
        <div className="bg-white border border-slate-200 rounded-md overflow-hidden">
          <div className="bg-slate-200 px-4 py-2 flex items-center justify-between">

              {filteredEmps.length > 16 && (

  /* ===== 메뉴 6: DSO 판매목표 (월별 분리) ===== */
  const renderDSONotEntered = (hq) => {
    const { year: curYearD6 } = parseWeekValue(filterWeek);
    const displayMonthD6 = filterMonth || 5;
    const yearMonthD6 = `${curYearD6}-${displayMonthD6}`;
    const monthLabelD6 = `${displayMonthD6}월`;
    const is5월D6 = displayMonthD6 === 5;

    // 빈 템플릿
    const emptyDSO = (dso[hq] || []).map(d => ({
      ...d,
      annualQty: 0, annualRev: 0, yearTarget: 0, monthSales: 0, cumQty: 0,
      monthQty: 0, monthRev: 0, monthForecast: 0,
    }));

    const allData = (dsoMonth[hq] && dsoMonth[hq][yearMonthD6])
      ? dsoMonth[hq][yearMonthD6]
      : (is5월D6 ? (dso[hq] || []) : emptyDSO);

    // 이전월 데이터 복사 (표 1, 2, 3 모두)
    const handleCopyPrevMonthDSO = () => {
      const prevMonth = displayMonthD6 - 1;
      if (prevMonth < 1) { alert('이전월이 없습니다 (1월에서는 사용 불가)'); return; }
      const prevYearMonth = `${curYearD6}-${prevMonth}`;

      const prevData = (dsoMonth[hq] && dsoMonth[hq][prevYearMonth])
        ? dsoMonth[hq][prevYearMonth]
        : (prevMonth === 5 ? dso[hq] : null);
      const prevEnter = (dsoEnterMonth[hq] && dsoEnterMonth[hq][prevYearMonth]) || null;
      const prevRev = (dsoRevMonth[hq] && dsoRevMonth[hq][prevYearMonth]) || null;

      if (!prevData && !prevEnter && !prevRev) { alert(`${prevMonth}월에 데이터가 없습니다.`); return; }
      if (!confirm(`${prevMonth}월의 DSO 데이터(표 1/2/3)를 ${monthLabelD6}에 복사하시겠습니까?\n현재 ${monthLabelD6}의 데이터는 덮어씌워집니다.`)) return;

      if (prevData) {
        setDSOMonth(prev => ({
          ...prev,
          [hq]: { ...(prev[hq] || {}), [yearMonthD6]: JSON.parse(JSON.stringify(prevData)) }
        }));
      }
      if (prevEnter) {
        setDSOEnterMonth(prev => ({
          ...prev,
          [hq]: { ...(prev[hq] || {}), [yearMonthD6]: JSON.parse(JSON.stringify(prevEnter)) }
        }));
      }
      if (prevRev) {
        setDSORevMonth(prev => ({
          ...prev,
          [hq]: { ...(prev[hq] || {}), [yearMonthD6]: JSON.parse(JSON.stringify(prevRev)) }
        }));
      }
      logChange(`6번 DSO`, `${prevMonth}월 → ${monthLabelD6} 복사 (표 1/2/3)`);
      alert(`${prevMonth}월 데이터 → ${monthLabelD6}로 복사 완료! (표 1/2/3 모두)`);
    };

    // 업데이트 (월별 분리)
    const updateRow = (id, key, value) => {
      setDSOMonth(prev => {
        const hqData = prev[hq] || {};
        const monthData = hqData[yearMonthD6]
          ? hqData[yearMonthD6]
          : (is5월D6
              ? JSON.parse(JSON.stringify(dso[hq] || []))
              : JSON.parse(JSON.stringify(emptyDSO)));
        const updated = monthData.map(d => d.id === id ? { ...d, [key]: value } : d);
        return { ...prev, [hq]: { ...hqData, [yearMonthD6]: updated } };
      });
      logChange(`${hq} - DSO 판매목표 (${monthLabelD6})`, `${key} 수정`);
    };

    const filteredData = allData;
    const regionList = REGIONS[hq] || [];

    // === 표 1: 지역별 DSO 진입 현황 (직접 수정 가능, 표3 집계 기본값) ===
    // 표 3에서 자동 집계한 값 (기본값)
    const tbl1AutoData = regionList.map(region => {
      const rows = filteredData.filter(d => d.region === region);
      const dsoCount = rows.length;
      const entered = rows.filter(d => d.enter).length;
      const notEntered = dsoCount - entered;
      const monthGoal = rows.reduce((s, d) => s + (d.enterGoalMonth || 0), 0);
      const monthEnter = rows.reduce((s, d) => s + (d.enterActualMonth || 0), 0);
      return { region, dsoCount, entered, notEntered, monthGoal, monthEnter };
    });
    // 사용자가 직접 입력한 값 우선, 없으면 자동 집계
    const tbl1SavedData = (dsoEnterMonth[hq] && dsoEnterMonth[hq][yearMonthD6]) || {};
    const tbl1Data = tbl1AutoData.map(auto => {
      const saved = tbl1SavedData[auto.region] || {};
      const row = {
        region: auto.region,
        dsoCount: saved.dsoCount !== undefined ? saved.dsoCount : auto.dsoCount,
        entered: saved.entered !== undefined ? saved.entered : auto.entered,
        notEntered: saved.notEntered !== undefined ? saved.notEntered : auto.notEntered,
        monthGoal: saved.monthGoal !== undefined ? saved.monthGoal : auto.monthGoal,
        monthEnter: saved.monthEnter !== undefined ? saved.monthEnter : auto.monthEnter,
      };
      row.enterRate = row.dsoCount > 0 ? +(row.entered / row.dsoCount * 100).toFixed(1) : 0;
      return row;
    });
    const tbl1Total = {
      dsoCount: tbl1Data.reduce((s, r) => s + r.dsoCount, 0),
      entered: tbl1Data.reduce((s, r) => s + r.entered, 0),
      notEntered: tbl1Data.reduce((s, r) => s + r.notEntered, 0),
      monthGoal: tbl1Data.reduce((s, r) => s + r.monthGoal, 0),
      monthEnter: tbl1Data.reduce((s, r) => s + r.monthEnter, 0),
    };
    tbl1Total.enterRate = tbl1Total.dsoCount > 0 ? +(tbl1Total.entered / tbl1Total.dsoCount * 100).toFixed(1) : 0;
    tbl1Total.monthRate = tbl1Total.monthGoal > 0 ? +(tbl1Total.monthEnter / tbl1Total.monthGoal * 100).toFixed(1) : 0;

    // 표 1 업데이트 함수 - 즉시 저장 + 자동 연동
    const updateTbl1 = (region, key, value) => {
      const numValue = parseFloat(value) || 0;
      setDSOEnterMonth(prev => {
        const hqData = prev[hq] || {};
        const monthData = hqData[yearMonthD6] || {};
        const regionData = { ...(monthData[region] || {}), [key]: numValue };
        // entered가 변경되면 notEntered 자동 계산
        if (key === 'entered' || key === 'dsoCount') {
          const dsoCount = key === 'dsoCount' ? numValue : (regionData.dsoCount !== undefined ? regionData.dsoCount : tbl1AutoData.find(r => r.region === region)?.dsoCount || 0);
          const entered = key === 'entered' ? numValue : (regionData.entered !== undefined ? regionData.entered : 0);
          regionData.notEntered = Math.max(0, dsoCount - entered);
        }
        return {
          ...prev,
          [hq]: { ...hqData, [yearMonthD6]: { ...monthData, [region]: regionData } }
        };
      });
      logChange(`${hq} - DSO 진입현황 (${monthLabelD6})`, `${region} ${key} 수정`);
    };

    // === 표 2: 지역별 DSO 매출 현황 (직접 수정 가능, 표3 집계 기본값) ===
    const tbl2AutoData = regionList.map(region => {
      const rows = filteredData.filter(d => d.region === region);
      const monthGoal = rows.reduce((s, d) => s + (d.monthSales || 0), 0);
      const monthActual = rows.reduce((s, d) => s + (d.monthRev || 0), 0);
      const cumSellOut = rows.reduce((s, d) => s + (d.cumSellOut || d.cumShip * 5 || 0), 0);
      const cumDSO = rows.reduce((s, d) => s + (d.cumShip || 0), 0);
      return { region, monthGoal, monthActual, cumSellOut, cumDSO };
    });
    const tbl2SavedData = (dsoRevMonth[hq] && dsoRevMonth[hq][yearMonthD6]) || {};
    const tbl2Data = tbl2AutoData.map(auto => {
      const saved = tbl2SavedData[auto.region] || {};
      const row = {
        region: auto.region,
        monthGoal: saved.monthGoal !== undefined ? saved.monthGoal : auto.monthGoal,
        monthActual: saved.monthActual !== undefined ? saved.monthActual : auto.monthActual,
        cumSellOut: saved.cumSellOut !== undefined ? saved.cumSellOut : auto.cumSellOut,
        cumDSO: saved.cumDSO !== undefined ? saved.cumDSO : auto.cumDSO,
      };
      row.rate = row.monthGoal > 0 ? +(row.monthActual / row.monthGoal * 100).toFixed(1) : 0;
      row.ratio = row.cumSellOut > 0 ? +(row.cumDSO / row.cumSellOut * 100).toFixed(1) : 0;
      return row;
    });
    const tbl2Total = {
      monthGoal: tbl2Data.reduce((s, r) => s + r.monthGoal, 0),
      monthActual: tbl2Data.reduce((s, r) => s + r.monthActual, 0),
      cumSellOut: tbl2Data.reduce((s, r) => s + r.cumSellOut, 0),
      cumDSO: tbl2Data.reduce((s, r) => s + r.cumDSO, 0),
    };
    tbl2Total.rate = tbl2Total.monthGoal > 0 ? +(tbl2Total.monthActual / tbl2Total.monthGoal * 100).toFixed(1) : 0;
    tbl2Total.ratio = tbl2Total.cumSellOut > 0 ? +(tbl2Total.cumDSO / tbl2Total.cumSellOut * 100).toFixed(1) : 0;

    // 표 2 업데이트 함수
    const updateTbl2 = (region, key, value) => {
      const numValue = parseFloat(value) || 0;
      setDSORevMonth(prev => {
        const hqData = prev[hq] || {};
        const monthData = hqData[yearMonthD6] || {};
        const regionData = { ...(monthData[region] || {}), [key]: numValue };
        return {
          ...prev,
          [hq]: { ...hqData, [yearMonthD6]: { ...monthData, [region]: regionData } }
        };
      });
      logChange(`${hq} - DSO 매출현황 (${monthLabelD6})`, `${region} ${key} 수정`);
    };

    // === KPI 카드 5개 (DSO 상세 현황 + 월간 요약과 자동 연동) ===
    // 표 2 (DSO 상세 현황) 데이터 = filteredData (이미 useMemo로 계산됨)
    // 월간 요약 수동값 키
    const dsoOverviewKey = `dso_overview|${hq}`;
    let manualOverviewKPI = {};
    try {
      const raw = weeklyEntries[dsoOverviewKey];
      manualOverviewKPI = raw ? (typeof raw === 'string' ? JSON.parse(raw) : raw) : {};
    } catch(e) { manualOverviewKPI = {}; }
    const isManKPI = (k) => manualOverviewKPI[k] !== undefined && manualOverviewKPI[k] !== null && manualOverviewKPI[k] !== '';
    const getOvKPI = (k, autoVal) => isManKPI(k) ? Number(manualOverviewKPI[k]) : autoVal;

    // 자동 집계 - 표 2 (filteredData) 기준
    const kpiAutoTotalDSO = (filteredData || []).length;
    const kpiAutoEnterCount = (filteredData || []).filter(r => r.enter).length;
    const kpiAutoEnterRate = kpiAutoTotalDSO > 0 ? +(kpiAutoEnterCount / kpiAutoTotalDSO * 100).toFixed(1) : 0;
    
    // 당월 목표/실적 (월간 요약과 동기화)
    const kpiAutoMonthSales = (filteredData || []).reduce((s, r) => s + (Number(r.monthSales) || 0), 0);
    const kpiAutoMonthRev = (filteredData || []).reduce((s, r) => s + (Number(r.monthRev) || 0), 0);
    const kpiMonthSales = getOvKPI('monthSales', kpiAutoMonthSales);
    const kpiMonthRev = getOvKPI('monthRev', kpiAutoMonthRev);
    const kpiMonthRate = kpiMonthSales > 0 ? +(kpiMonthRev / kpiMonthSales * 100).toFixed(1) : 0;

    // 26년 누적 실적 (월간 요약과 동기화)
    const kpiAutoCumQty = (filteredData || []).reduce((s, r) => s + (Number(r.cumQty) || 0), 0);
    const kpiAutoYearTarget = (filteredData || []).reduce((s, r) => s + (Number(r.yearTarget) || 0), 0);
    const kpiCumQty = getOvKPI('cumQty', kpiAutoCumQty);
    const kpiYearTarget = getOvKPI('yearTarget', kpiAutoYearTarget);
    const kpiProgRate = kpiYearTarget > 0 ? +(kpiCumQty / kpiYearTarget * 100).toFixed(1) : 0;

    // 5개 KPI 값 (실제 사용)
    const kpiTotalDSO = kpiAutoTotalDSO;                  // 총 DSO 수
    const kpiEnterRate = kpiAutoEnterRate;                // 진입률
    const kpiMonthGoalRate = kpiMonthRate;                // 당월 목표 달성률
    const kpiCumDSOSales = kpiCumQty;                     // 26년 누적 실적
    const kpiDSORatio = kpiProgRate;                      // 진도율

    // 상태 판정
    const statusByRate = (rate) => {
      if (rate >= 80) return { label: '양호', cls: 'bg-emerald-100 text-emerald-700 border border-emerald-200' };
      if (rate >= 50) return { label: '정상', cls: 'bg-blue-100 text-blue-700 border border-blue-200' };
      if (rate >= 30) return { label: '주의', cls: 'bg-amber-100 text-amber-700 border border-amber-200' };
      return { label: '위험', cls: 'bg-rose-100 text-rose-700 border border-rose-200' };
    };

    return (
      <div className="space-y-4">
        {/* 페이지 타이틀 */}
        <div className="flex items-baseline justify-between mb-2">
          <div className="flex items-baseline gap-3">
            <h1 className="text-2xl font-bold text-slate-900">{hq}</h1>
            <h2 className="text-2xl font-bold text-slate-900">6. DSO 판매목표 ({monthLabelD6})</h2>
          </div>
          <span className="text-xs text-slate-500 flex items-center gap-1">
            <Icon name="refresh" className="w-3 h-3" /> 데이터 기준일: {new Date().toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}
          </span>
        </div>

        {/* 액션 버튼 */}
        <div className="flex items-center justify-end gap-2">
          <button onClick={handleCopyPrevMonthDSO}
            className="flex items-center gap-1.5 px-3 py-1.5 text-sm border border-purple-300 bg-purple-50 text-purple-700 rounded-md hover:bg-purple-100 font-semibold">
            <Icon name="copy" className="w-4 h-4" /> 이전월 복사
          </button>
          <button className="flex items-center gap-1.5 px-3 py-1.5 text-sm border border-slate-300 rounded-md hover:bg-slate-50">
            <Icon name="upload" className="w-4 h-4" /> 엑셀 업로드
          </button>
          <button onClick={() => downloadCSV(filteredData, `${hq}_DSO_판매목표_${yearMonthD6}`)}
            className="flex items-center gap-1.5 px-3 py-1.5 text-sm border border-slate-300 rounded-md hover:bg-slate-50">
            <Icon name="download" className="w-4 h-4" /> 엑셀 다운로드
          </button>
          <button onClick={handleSync} className="px-4 py-1.5 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700 font-semibold">
            저장
          </button>
        </div>

        {/* KPI 카드 5개 */}
        <div className="grid grid-cols-5 gap-3">
          <div className="bg-white border border-slate-200 rounded-md p-3">
            <div className="text-xs text-slate-500 mb-1">총 DSO 수</div>
            <div className="flex items-baseline gap-1">
              <span className="text-2xl font-bold text-slate-900">{kpiTotalDSO}</span>
              <span className="text-xs text-slate-500">개</span>
            </div>
            <div className="h-1 bg-slate-100 rounded-full mt-2 overflow-hidden">
              <div className="h-full bg-blue-500" style={{ width: '100%' }}></div>
            </div>
          </div>
          <div className="bg-white border border-slate-200 rounded-md p-3">
            <div className="text-xs text-slate-500 mb-1">진입률 (진입/DSO수)</div>
            <div className="flex items-baseline gap-1">
              <span className="text-2xl font-bold text-slate-900">{kpiEnterRate}</span>
              <span className="text-xs text-slate-500">%</span>
            </div>
            <div className="h-1 bg-slate-100 rounded-full mt-2 overflow-hidden">
              <div className="h-full bg-emerald-500" style={{ width: `${Math.min(kpiEnterRate, 100)}%` }}></div>
            </div>
          </div>
          <div className="bg-white border border-slate-200 rounded-md p-3">
            <div className="text-xs text-slate-500 mb-1">당월 목표 달성률</div>
            <div className="flex items-baseline gap-1">
              <span className="text-2xl font-bold text-slate-900">{kpiMonthGoalRate}</span>
              <span className="text-xs text-slate-500">%</span>
            </div>
            <div className="h-1 bg-slate-100 rounded-full mt-2 overflow-hidden">
              <div className="h-full bg-violet-500" style={{ width: `${Math.min(kpiMonthGoalRate, 100)}%` }}></div>
            </div>
          </div>
          <div className="bg-white border border-slate-200 rounded-md p-3">
            <div className="text-xs text-slate-500 mb-1">26년 누적 실적</div>
            <div className="flex items-baseline gap-1">
              <span className="text-2xl font-bold text-slate-900">{formatNumber(kpiCumDSOSales)}</span>
              <span className="text-xs text-slate-500">개</span>
            </div>
            <div className="h-1 bg-slate-100 rounded-full mt-2 overflow-hidden">
              <div className="h-full bg-amber-500" style={{ width: '85%' }}></div>
            </div>
          </div>
          <div className="bg-white border border-slate-200 rounded-md p-3">
            <div className="text-xs text-slate-500 mb-1">진도율 (누적/26년목표)</div>
            <div className="flex items-baseline gap-1">
              <span className="text-2xl font-bold text-slate-900">{kpiDSORatio}</span>
              <span className="text-xs text-slate-500">%</span>
            </div>
            <div className="h-1 bg-slate-100 rounded-full mt-2 overflow-hidden">
              <div className="h-full bg-rose-500" style={{ width: `${Math.min(kpiDSORatio, 100)}%` }}></div>
            </div>
          </div>
        </div>

        {/* === 월간 요약 / 진입 현황 / 등급 분포 (자동 계산 + 수동 수정 가능) === */}
        {(() => {
          // 저장 키
          const k월간 = `dso_overview|${hq}`;
          const k진입 = `dso_enter_status|${hq}`;
          const k등급 = `dso_grade|${hq}`;

          // 수동값 로드 (객체)
          const parseObj = (raw) => {
            try { return raw ? (typeof raw === 'string' ? JSON.parse(raw) : raw) : {}; } catch (e) { return {}; }
          };
          const manualOverview = parseObj(weeklyEntries[k월간]);
          const manualEnter = parseObj(weeklyEntries[k진입]);
          const manualGrade = parseObj(weeklyEntries[k등급]);

          const updateOverview = (key, value) => {
            const newVal = { ...manualOverview, [key]: value };
            // 빈값은 키 제거 (자동으로 복귀)
            if (value === null || value === undefined || value === '') delete newVal[key];
            setWeeklyEntries(prev => ({ ...prev, [k월간]: JSON.stringify(newVal) }));
          };
          const updateEnter = (key, value) => {
            const newVal = { ...manualEnter, [key]: value };
            if (value === null || value === undefined || value === '') delete newVal[key];
            setWeeklyEntries(prev => ({ ...prev, [k진입]: JSON.stringify(newVal) }));
          };
          const updateGrade = (key, value) => {
            const newVal = { ...manualGrade, [key]: value };
            if (value === null || value === undefined || value === '') delete newVal[key];
            setWeeklyEntries(prev => ({ ...prev, [k등급]: JSON.stringify(newVal) }));
          };

          // 표 3의 데이터를 기준으로 자동 집계
          const rows = filteredData || [];
          // 자동 계산 값
          const autoMonthSales = rows.reduce((s, r) => s + (Number(r.monthSales) || 0), 0);
          const autoMonthRev = rows.reduce((s, r) => s + (Number(r.monthRev) || 0), 0);
          const autoAchRate = autoMonthSales > 0 ? +(autoMonthRev / autoMonthSales * 100).toFixed(1) : 0;
          const autoYearTarget = rows.reduce((s, r) => s + (Number(r.yearTarget) || 0), 0);
          const autoCumQty = rows.reduce((s, r) => s + (Number(r.cumQty) || 0), 0);
          const autoProgRate = autoYearTarget > 0 ? +(autoCumQty / autoYearTarget * 100).toFixed(1) : 0;

          const autoEnterCount = rows.filter(r => r.enter).length;
          const autoNotEnterCount = rows.filter(r => !r.enter && r.status !== '검토중').length;
          const autoReviewCount = rows.filter(r => r.status === '검토중').length;

          const autoGradeCount = { S: 0, A: 0, B: 0, C: 0 };
          rows.forEach(r => {
            const g = r.grade || 'C';
            if (autoGradeCount[g] !== undefined) autoGradeCount[g]++;
          });

          // 실제 표시값 (수동값 우선, 없으면 자동)
          const isManualOV = (k) => manualOverview[k] !== undefined && manualOverview[k] !== null && manualOverview[k] !== '';
          const getOV = (k, autoVal) => isManualOV(k) ? Number(manualOverview[k]) : autoVal;
          const monthSales = getOV('monthSales', autoMonthSales);
          const monthRev = getOV('monthRev', autoMonthRev);
          const yearTarget = getOV('yearTarget', autoYearTarget);
          const cumQty = getOV('cumQty', autoCumQty);
          // 달성률/진도율은 위 4개 값(수동값이 반영된 최종값) 기준으로 자동 재계산
          // 사용자가 수동 입력하지 않은 경우에만 자동값을 사용
          const computedAchRate = monthSales > 0 ? +(monthRev / monthSales * 100).toFixed(1) : 0;
          const computedProgRate = yearTarget > 0 ? +(cumQty / yearTarget * 100).toFixed(1) : 0;
          const achRate = getOV('achRate', computedAchRate);
          const progRate = getOV('progRate', computedProgRate);

          const isManualEN = (k) => manualEnter[k] !== undefined && manualEnter[k] !== null && manualEnter[k] !== '';
          const getEN = (k, autoVal) => isManualEN(k) ? Number(manualEnter[k]) : autoVal;
          const enterCount = getEN('enter', autoEnterCount);
          const notEnterCount = getEN('notEnter', autoNotEnterCount);
          const reviewCount = getEN('review', autoReviewCount);
          const totalCount = enterCount + notEnterCount + reviewCount;
          const enterPct = totalCount > 0 ? (enterCount / totalCount * 100) : 0;
          const notEnterPct = totalCount > 0 ? (notEnterCount / totalCount * 100) : 0;
          const reviewPct = totalCount > 0 ? (reviewCount / totalCount * 100) : 0;

          const isManualGR = (k) => manualGrade[k] !== undefined && manualGrade[k] !== null && manualGrade[k] !== '';
          const getGR = (k, autoVal) => isManualGR(k) ? Number(manualGrade[k]) : autoVal;

          // 지역×등급 표 (dso_grade_byregion)와 막대 그래프 동기화
          // 표에서 입력한 값이 있으면 표 합계를 우선, 없으면 자동 집계 사용
          const kGradeByRegionForBar = `dso_grade_byregion|${hq}`;
          const manualGrRegForBar = parseObj(weeklyEntries[kGradeByRegionForBar]);
          const autoBCByRegion = {}; // 지역별 B+C
          (REGIONS[hq] || []).forEach(r => { autoBCByRegion[r] = 0; });
          (filteredData || []).forEach(d => {
            const g = d.grade || 'C';
            if (g !== 'S' && g !== 'A' && autoBCByRegion[d.region] !== undefined) autoBCByRegion[d.region]++;
          });
          const autoSByRegion = {}, autoAByRegion = {};
          (REGIONS[hq] || []).forEach(r => { autoSByRegion[r] = 0; autoAByRegion[r] = 0; });
          (filteredData || []).forEach(d => {
            if (d.grade === 'S' && autoSByRegion[d.region] !== undefined) autoSByRegion[d.region]++;
            else if (d.grade === 'A' && autoAByRegion[d.region] !== undefined) autoAByRegion[d.region]++;
          });
          // 지역별 합계 (수동값 우선)
          let barSumS = 0, barSumA = 0, barSumBC = 0;
          (REGIONS[hq] || []).forEach(r => {
            const m = manualGrRegForBar[r] || {};
            barSumS += (m.S !== undefined && m.S !== null && m.S !== '') ? Number(m.S) : autoSByRegion[r];
            barSumA += (m.A !== undefined && m.A !== null && m.A !== '') ? Number(m.A) : autoAByRegion[r];
            barSumBC += (m.BC !== undefined && m.BC !== null && m.BC !== '') ? Number(m.BC) : autoBCByRegion[r];
          });

          // gradeCount: S/A/BC 3개로 통합 (B/C 막대 통합)
          const gradeCount = {
            S: barSumS,
            A: barSumA,
            BC: barSumBC,
          };
          const totalGrade = gradeCount.S + gradeCount.A + gradeCount.BC;
          const maxGrade = Math.max(gradeCount.S, gradeCount.A, gradeCount.BC, 1);

          // 작은 ✎ + ↻ 표시 헬퍼
          const ManualMarker = ({ isManual, onReset }) => (
            <span className="inline-flex items-center gap-0.5 ml-1">
              {isManual && (
                <>
                  <span className="text-[9px] text-slate-500" title="수동 입력값">✎</span>
                  <button onClick={onReset} className="text-[10px] text-slate-400 hover:text-slate-700 leading-none" title="자동값으로 복귀">↻</button>
                </>
              )}
            </span>
          );

          return (
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
              {/* 1. 월간 요약 (표 형식) */}
              <div className="bg-white border border-slate-200 rounded-md p-4">
                <div className="flex items-center gap-2 mb-3">
                  <h4 className="text-sm font-bold text-slate-900">월간 요약 ({monthLabelD6} 수량)</h4>
                  <span className="text-xs text-slate-400" title="DSO 상세 현황 자동 집계 · 셀 클릭하여 수동 수정 가능">ⓘ</span>
                </div>
                <div className="border border-slate-300 rounded overflow-hidden">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="bg-slate-100 border-b border-slate-300">
                        <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700 text-left">항목</th>
                        <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700 text-right">목표</th>
                        <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700 text-right">실적</th>
                        <th className="px-2 py-1.5 font-semibold text-slate-700 text-right">진도율</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr className="border-b border-slate-200 hover:bg-slate-50">
                        <td className="px-2 py-1.5 border-r border-slate-200 font-semibold text-slate-700">{monthLabelD6}</td>
                        <td className="px-2 py-1.5 border-r border-slate-200 text-right">
                          <div className="flex items-center justify-end gap-0.5">
                            <EditableCell value={monthSales} type="number" align="right" onSave={(v) => updateOverview('monthSales', v === '' || v === null ? null : (parseFloat(v) || 0))} />
                            <ManualMarker isManual={isManualOV('monthSales')} onReset={() => updateOverview('monthSales', null)} />
                          </div>
                        </td>
                        <td className="px-2 py-1.5 border-r border-slate-200 text-right">
                          <div className="flex items-center justify-end gap-0.5">
                            <EditableCell value={monthRev} type="number" align="right" onSave={(v) => updateOverview('monthRev', v === '' || v === null ? null : (parseFloat(v) || 0))} />
                            <ManualMarker isManual={isManualOV('monthRev')} onReset={() => updateOverview('monthRev', null)} />
                          </div>
                        </td>
                        <td className="px-2 py-1.5 text-right">
                          <div className="flex items-baseline justify-end gap-0.5">
                            <EditableCell value={achRate} type="number" align="right" onSave={(v) => updateOverview('achRate', v === '' || v === null ? null : (parseFloat(v) || 0))} />
                            <span className="text-xs">%</span>
                            <ManualMarker isManual={isManualOV('achRate')} onReset={() => updateOverview('achRate', null)} />
                          </div>
                        </td>
                      </tr>
                      <tr className="border-b border-slate-200 hover:bg-slate-50">
                        <td className="px-2 py-1.5 border-r border-slate-200 font-semibold text-slate-700">26년</td>
                        <td className="px-2 py-1.5 border-r border-slate-200 text-right">
                          <div className="flex items-center justify-end gap-0.5">
                            <EditableCell value={yearTarget} type="number" align="right" onSave={(v) => updateOverview('yearTarget', v === '' || v === null ? null : (parseFloat(v) || 0))} />
                            <ManualMarker isManual={isManualOV('yearTarget')} onReset={() => updateOverview('yearTarget', null)} />
                          </div>
                        </td>
                        <td className="px-2 py-1.5 border-r border-slate-200 text-right">
                          <div className="flex items-center justify-end gap-0.5">
                            <EditableCell value={cumQty} type="number" align="right" onSave={(v) => updateOverview('cumQty', v === '' || v === null ? null : (parseFloat(v) || 0))} />
                            <ManualMarker isManual={isManualOV('cumQty')} onReset={() => updateOverview('cumQty', null)} />
                          </div>
                        </td>
                        <td className="px-2 py-1.5 text-right">
                          <div className="flex items-baseline justify-end gap-0.5">
                            <EditableCell value={progRate} type="number" align="right" onSave={(v) => updateOverview('progRate', v === '' || v === null ? null : (parseFloat(v) || 0))} />
                            <span className="text-xs">%</span>
