  /* ===== 메뉴 7: BD 진입현황 ===== */
  // 7번 BD - 펼침 상태 관리 (행 클릭 시 주차 정보 표시)
  const [bdExpandedRow, setBDExpandedRow] = useState(null);

  const renderBD = (hq) => {
    const { year: curYearBD } = parseWeekValue(filterWeek);
    const displayMonthBD = filterMonth || 5;
    const yearMonthBD = `${curYearBD}-${displayMonthBD}`;
    const monthLabelBD = `${displayMonthBD}월`;
    const is5월BD = displayMonthBD === 5;

    // 빈 템플릿
    const emptyBD = (bd[hq] || []).map(d => ({
      ...d,
      targetCust: 0, progCust: 0, entered: 0, notEntered: 0,
      monthRevenue: 0, cumRevenue: 0, crmUsed: 0, crmNew: 0, prevDiff: 0,
    }));
    const emptyBDQty = (bdQty[hq] || []).map(d => ({
      ...d,
      qtyGoal: 0, monthQtyActual: 0, monthAmtActual: 0,
      cumQtyActual: 0, cumAmtActual: 0, cumQtyRate: 0, cumAmtRate: 0,
    }));
    const emptyBDCustomers = (bdCustomers[hq] || []).map(d => ({ ...d }));

    const data = (bdMonth[hq] && bdMonth[hq][yearMonthBD])
      ? bdMonth[hq][yearMonthBD]
      : (is5월BD ? (bd[hq] || []) : emptyBD);
    const qtyData = (bdQtyMonth[hq] && bdQtyMonth[hq][yearMonthBD])
      ? bdQtyMonth[hq][yearMonthBD]
      : (is5월BD ? (bdQty[hq] || []) : emptyBDQty);
    const customers = (bdCustomersMonth[hq] && bdCustomersMonth[hq][yearMonthBD])
      ? bdCustomersMonth[hq][yearMonthBD]
      : (is5월BD ? (bdCustomers[hq] || []) : emptyBDCustomers);

    // 누계실적 계산 헬퍼 (1~12월 weeklyEntries 합산) - KPI/구조분석/표 모두 공통
    const _curYearBC0 = parseWeekValue(filterWeek).year;
    const getCustMonthQty = (cId, mNum) => {
      const k = `bdcust|${hq}|${cId}|m${mNum}|${_curYearBC0}`;
      return weeklyEntries[k] ?? 0;
    };
    const getCustCumQty = (cId) => {
      let sum = 0;
      for (let m = 1; m <= 12; m++) sum += (getCustMonthQty(cId, m) || 0);
      return sum;
    };

    // 이전월 복사
    const handleCopyPrevMonthBD = () => {
      const prevMonth = displayMonthBD - 1;
      if (prevMonth < 1) { alert('이전월이 없습니다 (1월에서는 사용 불가)'); return; }
      const prevYearMonth = `${curYearBD}-${prevMonth}`;
      const prevBD = (bdMonth[hq] && bdMonth[hq][prevYearMonth]) ? bdMonth[hq][prevYearMonth] : (prevMonth === 5 ? bd[hq] : null);
      const prevQty = (bdQtyMonth[hq] && bdQtyMonth[hq][prevYearMonth]) ? bdQtyMonth[hq][prevYearMonth] : (prevMonth === 5 ? bdQty[hq] : null);
      const prevCust = (bdCustomersMonth[hq] && bdCustomersMonth[hq][prevYearMonth]) ? bdCustomersMonth[hq][prevYearMonth] : (prevMonth === 5 ? bdCustomers[hq] : null);
      // 1번 표(bdDevMonth) - 5월은 INITIAL_BD_DEV에서 가져옴
      const prevDev = (bdDevMonth[hq] && bdDevMonth[hq][prevYearMonth])
        ? bdDevMonth[hq][prevYearMonth]
        : ((INITIAL_BD_DEV[hq] && INITIAL_BD_DEV[hq][prevYearMonth]) || null);
      // 주차별 weeklyEntries 복사 (3번 표 데이터)
      const prevWeekPrefix = `bd-target|${hq}|`;
      const prevWeekSuffix = `|${curYearBD}-${prevMonth}`;
      const curWeekSuffix = `|${curYearBD}-${displayMonthBD}`;
      const prevWeekEntries = {};
      Object.entries(weeklyEntries).forEach(([k, v]) => {
        if (k.startsWith(prevWeekPrefix) && k.endsWith(prevWeekSuffix)) {
          const newKey = k.slice(0, -prevWeekSuffix.length) + curWeekSuffix;
          prevWeekEntries[newKey] = v;
        }
      });
      const hasWeekData = Object.keys(prevWeekEntries).length > 0;

      if (!prevBD && !prevQty && !prevCust && !prevDev && !hasWeekData) { alert(`${prevMonth}월에 데이터가 없습니다.`); return; }
      if (!confirm(`${prevMonth}월의 BD 데이터를 ${monthLabelBD}에 복사하시겠습니까?\n(1번 표, 2번 표 기준, 3번 표 주차별, BD 상세 모두 포함)\n현재 ${monthLabelBD}의 데이터는 덮어씌워집니다.`)) return;

      if (prevBD) setBDMonth(prev => ({ ...prev, [hq]: { ...(prev[hq] || {}), [yearMonthBD]: JSON.parse(JSON.stringify(prevBD)) } }));
      if (prevQty) setBDQtyMonth(prev => ({ ...prev, [hq]: { ...(prev[hq] || {}), [yearMonthBD]: JSON.parse(JSON.stringify(prevQty)) } }));
      if (prevCust) setBDCustomersMonth(prev => ({ ...prev, [hq]: { ...(prev[hq] || {}), [yearMonthBD]: JSON.parse(JSON.stringify(prevCust)) } }));
      if (prevDev) setBDDevMonth(prev => ({ ...prev, [hq]: { ...(prev[hq] || {}), [yearMonthBD]: JSON.parse(JSON.stringify(prevDev)) } }));
      if (hasWeekData) setWeeklyEntries(prev => ({ ...prev, ...prevWeekEntries }));

      logChange(`7번 BD`, `${prevMonth}월 → ${monthLabelBD} 복사 (1번/2번/3번/상세 전체)`);
      alert(`${prevMonth}월 데이터 → ${monthLabelBD}로 복사 완료!`);
    };

    // 현재 선택된 주차 (상단 공통 필터바)
    const { year: curYear, week: curWeek } = parseWeekValue(filterWeek);
    const curMonth = Math.min(12, Math.ceil(curWeek / 4.333));
    const curWeekLabel = (WEEK_OPTIONS.find(o => o.value === filterWeek) || {}).label || `${curYear}년 ${curWeek}주차`;

    // 지역 필터
    const filteredData = filterRegion === '전체' ? data : data.filter(d => d.region === filterRegion);
    const filteredQty = filterRegion === '전체' ? qtyData : qtyData.filter(d => d.region === filterRegion);

    // 합계
    const sum = (arr, key) => arr.reduce((s, d) => s + (d[key] || 0), 0);
    const total = {
      targetCust: sum(filteredData, 'targetCust'),
      progCust: sum(filteredData, 'progCust'),
      entered: sum(filteredData, 'entered'),
      notEntered: sum(filteredData, 'notEntered'),
      monthRevenue: sum(filteredData, 'monthRevenue'),
      cumRevenue: sum(filteredData, 'cumRevenue'),
      crmUsed: sum(filteredData, 'crmUsed'),
      crmNew: sum(filteredData, 'crmNew'),
      prevDiff: sum(filteredData, 'prevDiff'),
    };
    total.enteredRate = total.targetCust > 0 ? +(total.entered / total.targetCust * 100).toFixed(1) : 0;
    total.notEnteredRate = total.targetCust > 0 ? +(total.notEntered / total.targetCust * 100).toFixed(1) : 0;
    total.crmRate = total.progCust > 0 ? +(total.crmUsed / total.progCust * 100).toFixed(1) : 0;

    // Funnel 단계 데이터 (실제 데이터 기반 계산)
    const enteredCustCount = customers.filter(c => c.stage === '진입').length;
    const notEnteredCustCount = customers.filter(c => c.stage === '미진입').length;
    const revenueCustCount = customers.filter(c => getCustCumQty(c.id) > 0).length;
    const settledCustCount = customers.filter(c => c.stage === '진입' && getCustCumQty(c.id) > 0).length;

    const funnel = {
      goal: total.targetCust,

  /* ===== 메뉴 7: 하부고객 확대현황 (6번 카드형 구조 + subCustomer 데이터) ===== */
  const renderSubCustomer = (hq) => {
    const { year: curYearSC } = parseWeekValue(filterWeek);
    const displayMonthSC = filterMonth || 5;
    const yearMonthSC = `${curYearSC}-${displayMonthSC}`;
    const monthLabelSC = `${displayMonthSC}월`;
    const is5월SC = displayMonthSC === 5;

    // 빈 템플릿 (구조 유지하되 수치 0)
    const emptySubCustomer = (subCustomer[hq] || []).map(d => ({
      ...d,
      baseCustomers: 0, target: 0, crmUsed: 0, crmNew: 0, prevDiff: 0,
      psiCount: 0, newCustomer: 0, visitGoal: 0, visitActual: 0,
      crmRate: 0, newRate: 0,
      target5Cust: 0, target5NewBiz: 0, actual5NewBiz: 0,
    }));

    // 월별 데이터 조회
    const rows = (subCustomerMonth[hq] && subCustomerMonth[hq][yearMonthSC])
      ? subCustomerMonth[hq][yearMonthSC]
      : (is5월SC ? (subCustomer[hq] || []) : emptySubCustomer);

    // 셀 업데이트 (월별 분리 자동)
    const updateSCCell = (idx, field, value) => {
      const numVal = parseFloat(value) || 0;
      setSubCustomerMonth(prev => {
        const cur = (prev[hq] && prev[hq][yearMonthSC])
          ? JSON.parse(JSON.stringify(prev[hq][yearMonthSC]))
          : JSON.parse(JSON.stringify(rows));
        cur[idx] = { ...cur[idx], [field]: numVal };
        return { ...prev, [hq]: { ...(prev[hq] || {}), [yearMonthSC]: cur } };
      });
      logChange(`하부고객 ${rows[idx].region} - ${monthLabelSC}`, `${field}: ${numVal}`);
    };

    // 각 행의 자동 계산값 (6번과 동일 패턴)
    const rowsWithCalc = rows.map(r => {
      // crmUsed = 26년 누계 실적 (수동), target = 26년 목표 (수동)
      const rate26Cum = (r.target || 0) > 0 ? Math.round((r.crmUsed || 0) / r.target * 100) : 0;
      // crmNew = 5월 신규 고객 실적, target5Cust = 5월 고객 목표
      const rate5Cust = (r.target5Cust || 0) > 0 ? Math.round((r.crmNew || 0) / r.target5Cust * 100) : 0;
      // newCustomer = 5월 신규업무 실적, target5NewBiz = 5월 신규업무 목표
      const rate5NewBiz = (r.target5NewBiz || 0) > 0 ? Math.round((r.actual5NewBiz || r.newCustomer || 0) / r.target5NewBiz * 100) : 0;
      // visitActual = 5월 방문 실적, visitGoal = 5월 방문 목표
      const rate5Visit = (r.visitGoal || 0) > 0 ? Math.round((r.visitActual || 0) / r.visitGoal * 100) : 0;
      return { ...r, rate26Cum, rate5Cust, rate5NewBiz, rate5Visit };
    });

    // 합계
    const tot = {
      baseCustomers: rowsWithCalc.reduce((s, r) => s + (r.baseCustomers || 0), 0),
      target: rowsWithCalc.reduce((s, r) => s + (r.target || 0), 0),
      crmUsed: rowsWithCalc.reduce((s, r) => s + (r.crmUsed || 0), 0),
      target5Cust: rowsWithCalc.reduce((s, r) => s + (r.target5Cust || 0), 0),
      crmNew: rowsWithCalc.reduce((s, r) => s + (r.crmNew || 0), 0),
      target5NewBiz: rowsWithCalc.reduce((s, r) => s + (r.target5NewBiz || 0), 0),
      actual5NewBiz: rowsWithCalc.reduce((s, r) => s + (r.actual5NewBiz || r.newCustomer || 0), 0),
      visitGoal: rowsWithCalc.reduce((s, r) => s + (r.visitGoal || 0), 0),
      visitActual: rowsWithCalc.reduce((s, r) => s + (r.visitActual || 0), 0),
    };
    tot.rate26Cum = tot.target > 0 ? Math.round(tot.crmUsed / tot.target * 100) : 0;
    tot.rate5Cust = tot.target5Cust > 0 ? Math.round(tot.crmNew / tot.target5Cust * 100) : 0;
    tot.rate5NewBiz = tot.target5NewBiz > 0 ? Math.round(tot.actual5NewBiz / tot.target5NewBiz * 100) : 0;
    tot.rate5Visit = tot.visitGoal > 0 ? Math.round(tot.visitActual / tot.visitGoal * 100) : 0;

    const rateColor = (v) => v >= 70 ? 'text-emerald-600' : v >= 40 ? 'text-blue-600' : v > 0 ? 'text-amber-600' : 'text-rose-600';
    const barColor = (v) => v >= 70 ? 'bg-emerald-500' : v >= 40 ? 'bg-blue-500' : v > 0 ? 'bg-amber-500' : 'bg-rose-400';

    // 메인 지역 = CRM 고객수(baseCustomers) 가장 큰 지역
    const mainRegion = rowsWithCalc.reduce((acc, r) => (r.baseCustomers || 0) > (acc?.baseCustomers || 0) ? r : acc, null);

    return (
      <div className="space-y-4">
        <div className="flex items-center justify-between flex-wrap gap-2">
          <h2 className="text-2xl font-bold text-slate-900">8. 하부고객 확대현황</h2>
          <div className="flex items-center gap-2">
            <button onClick={() => {
              const prevMonth = displayMonthSC - 1;
              if (prevMonth < 1) { alert('이전월이 없습니다 (1월에서는 사용 불가)'); return; }
              const prevYearMonth = `${curYearSC}-${prevMonth}`;
              const prevData = (subCustomerMonth[hq] && subCustomerMonth[hq][prevYearMonth])
                ? subCustomerMonth[hq][prevYearMonth]
                : (prevMonth === 5 ? subCustomer[hq] : null);
              if (!prevData) { alert(`${prevMonth}월에 데이터가 없습니다.`); return; }
              if (!confirm(`${prevMonth}월의 하부고객 데이터를 ${monthLabelSC}에 복사하시겠습니까?\n현재 ${monthLabelSC}의 데이터는 덮어씌워집니다.`)) return;
              setSubCustomerMonth(prev => ({
                ...prev,
                [hq]: { ...(prev[hq] || {}), [yearMonthSC]: JSON.parse(JSON.stringify(prevData)) }
              }));
              logChange(`7번 하부고객`, `${prevMonth}월 → ${monthLabelSC} 복사`);
              alert(`${prevMonth}월 데이터 → ${monthLabelSC}로 복사 완료!`);
            }}
              className="px-3 py-1.5 text-xs border border-slate-300 rounded hover:bg-slate-50 flex items-center gap-1">
              <Icon name="copy" className="w-3.5 h-3.5" /> 이전월 복사
            </button>
          </div>
        </div>

        {/* === NOTE (단일 메모, 월별 분리, 즉시 저장) === */}
        {(() => {
          const noteKeySC = `sc_note|${hq}|${yearMonthSC}`;
          const currentNoteSC = weeklyEntries[noteKeySC] ?? '';
          const updateNoteSC = (value) => {
            setWeeklyEntries(prev => ({ ...prev, [noteKeySC]: value }));
          };
          return (
            <div className="bg-white border border-slate-200 rounded-md overflow-hidden">

        {/* === 메인 카드 === */}
        <div className="bg-white border border-slate-200 rounded-md p-4">

          {rowsWithCalc.length === 0 ? (

                    <div className="mb-1.5">
                      <div className="text-[10px] text-amber-700 font-semibold mb-0.5">26년 누계 진척률</div>
                      <div className="flex items-center justify-between gap-2 mb-0.5">
                        <div className="flex items-center gap-1 whitespace-nowrap" style={{ fontSize: '20px', lineHeight: '1.1' }}>
                          <span className="font-bold text-amber-700 cursor-pointer hover:bg-amber-50 px-1 rounded transition" title="누계 실적 (클릭 수정)">
                            <EditableCell value={row.crmUsed || 0} type="number" onSave={(v) => updateSCCell(idx, 'crmUsed', v)} />

                      </div>
                      <div className="h-1 bg-slate-100 rounded-full overflow-hidden">

                    <div className="mb-1.5">
                      <div className="text-[10px] text-blue-700 font-semibold mb-0.5">{monthLabelSC} 고객 달성률</div>
                      <div className="flex items-center justify-between gap-2 mb-0.5">
                        <div className="flex items-center gap-1 whitespace-nowrap" style={{ fontSize: '20px', lineHeight: '1.1' }}>

                      </div>
                      <div className="h-1 bg-slate-100 rounded-full overflow-hidden">

                    <div className="border-t border-slate-200 pt-1.5 mt-1">
                      <div className="text-[10px] text-slate-600 font-semibold mb-0.5">{monthLabelSC} 진척</div>
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <div className="text-[10px] text-emerald-700">신규업무</div>
                          <div className="flex items-center justify-between gap-1 whitespace-nowrap">

                                <EditableCell value={row.actual5NewBiz ?? row.newCustomer ?? 0} type="number" onSave={(v) => updateSCCell(idx, 'actual5NewBiz', v)} />

                                <EditableCell value={row.target5NewBiz || 0} type="number" onSave={(v) => updateSCCell(idx, 'target5NewBiz', v)} />
                              </span>
                            </div>
                            <span className={`font-bold ${rateColor(row.rate5NewBiz)}`} style={{ fontSize: '15px', lineHeight: '1.1' }}>{row.rate5NewBiz}%</span>
                          </div>
                        </div>
                        <div>
                          <div className="text-[10px] text-pink-700">방문횟수</div>
                          <div className="flex items-center justify-between gap-1 whitespace-nowrap">
                            <div className="flex items-center gap-1" style={{ fontSize: '20px', lineHeight: '1.1' }}>
                              <span className="font-bold text-pink-700 cursor-pointer hover:bg-pink-50 px-1 rounded transition" title="실적 (클릭 수정)">
                                <EditableCell value={row.visitActual || 0} type="number" onSave={(v) => updateSCCell(idx, 'visitActual', v)} />
                              </span>
                              <span className="text-slate-400">/</span>
                              <span className="text-slate-600 cursor-pointer hover:bg-pink-50 px-1 rounded transition" title="목표 (클릭 수정)">
                                <EditableCell value={row.visitGoal || 0} type="number" onSave={(v) => updateSCCell(idx, 'visitGoal', v)} />
                              </span>
                            </div>
                            <span className={`font-bold ${rateColor(row.rate5Visit)}`} style={{ fontSize: '15px', lineHeight: '1.1' }}>{row.rate5Visit}%</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          <div className="mt-3 text-[11px] text-slate-500 flex items-center gap-2 flex-wrap">
            <span>밑줄 친 숫자 클릭하여 직접 입력 · 모든 % 자동 계산 · 월별 분리 자동</span>
          </div>
        </div>
      </div>
    );
  };

  /* ===== 메뉴 9: 패키지 판매인원 (월별 분리 + 깔끔한 단일 표) ===== */
  const renderPackage = (hq) => {
    const { year: curYear } = parseWeekValue(filterWeek);
    const displayMonth = filterMonth || 5;
    const monthLabel = `${displayMonth}월`;
    const yearMonth = `${curYear}-${displayMonth}`;

    // === 월별 분리 헬퍼 ===
    // 키 구조: pkg|hq|rowId|field|year-month  (값은 객체 안의 한 필드)
    // 단순화: weeklyEntries에 직접 row 객체 통째 저장
    // pkg_row|hq|year-month|rowId  → 한 row의 모든 필드를 JSON으로 (간단)
    // 더 단순하게: packagePerson state에 hq별로 보관, 행마다 yearMonth 필드 추가

    // === 현재 hq + 월 데이터 ===
    // 마이그레이션: yearMonth 필드 없는 옛 데이터는 '2026-5'로 간주 (한 번만)
    const allRows = (packagePerson[hq] || []).map(r => ({
      ...r,
      yearMonth: r.yearMonth || '2026-5'
    }));
    let monthRows = allRows.filter(r => r.yearMonth === yearMonth);
    console.log('[패키지 렌더링]', { hq, yearMonth, 전체행: allRows.length, 월별행: monthRows.length, 첫번째: monthRows[0] });

    // === 정렬 적용 ===
    if (pkgSortKey) {
      monthRows = [...monthRows].sort((a, b) => {
        const av = (a[pkgSortKey] || '').toString();
        const bv = (b[pkgSortKey] || '').toString();
        const cmp = av.localeCompare(bv, 'ko');
        return pkgSortOrder === 'asc' ? cmp : -cmp;
      });
    }

    // === 정렬 헬퍼 ===
    const handleSort = (key) => {
      if (pkgSortKey !== key) {
        setPkgSortKey(key);
        setPkgSortOrder('asc');
      } else if (pkgSortOrder === 'asc') {
        setPkgSortOrder('desc');
      } else {
        setPkgSortKey(null);
        setPkgSortOrder('asc');
      }
    };
    const sortIcon = (key) => {
      if (pkgSortKey !== key) return '↕';
      return pkgSortOrder === 'asc' ? '↑' : '↓';
    };

    // === KPI 합계 (당월) ===
    const total = monthRows.reduce((acc, r) => ({
      preparedKits: acc.preparedKits + (r.preparedKits || 0),
      soldKits: acc.soldKits + (r.soldKits || 0),
      revenueKrmb: acc.revenueKrmb + (r.revenueKrmb || 0),
      targetPeople: acc.targetPeople + (r.targetPeople || 0),
      progressedPeople: acc.progressedPeople + (r.progressedPeople || 0),
    }), { preparedKits: 0, soldKits: 0, revenueKrmb: 0, targetPeople: 0, progressedPeople: 0 });
    total.qtyRate = total.preparedKits > 0 ? +(total.soldKits / total.preparedKits * 100).toFixed(1) : 0;
    total.personRate = total.targetPeople > 0 ? +(total.progressedPeople / total.targetPeople * 100).toFixed(1) : 0;

    // === 신규 등록 ===
    const addNewRow = () => {
      const newRow = {
        id: 'pkg_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
        yearMonth: yearMonth,
        region: (REGIONS[hq] || ['지역'])[0],
        eventMonth: `${displayMonth}월`,
        dealerName: '',
        eventName: '',
        salesSystem: 'AR',
        preparedKits: 0,
        salesGoal: 0,
        soldKits: 0,
        revenueKrmb: 0,
        updatedAt: new Date().toISOString().slice(0, 10),
      };
      setPackagePerson(prev => ({
        ...prev,
        [hq]: [...(prev[hq] || []), newRow]
      }));
      logChange(`9번 패키지 - 신규`, `${monthLabel} / ${hq}`);
    };

    // === 행 삭제 ===
    const deleteRow = (id) => {
      if (!confirm('이 행을 삭제하시겠습니까?')) return;
      setPackagePerson(prev => ({
        ...prev,
        [hq]: (prev[hq] || []).filter(r => r.id !== id)
      }));
      logChange(`9번 패키지 - 삭제`, id);
    };

    // === 직접 수정 ===
    const updateRowField = (id, field, value) => {
      const numericFields = ['preparedKits', 'soldKits', 'revenueKrmb', 'salesGoal', 'targetPeople', 'progressedPeople'];
      const finalValue = numericFields.includes(field) ? (parseFloat(value) || 0) : value;
      console.log('[패키지 updateRowField]', { id, field, value, finalValue, hq, yearMonth });
      setPackagePerson(prev => {
        const result = {
          ...prev,
          [hq]: (prev[hq] || []).map(r =>
            r.id === id ? { ...r, yearMonth: r.yearMonth || yearMonth, [field]: finalValue, updatedAt: new Date().toISOString().slice(0, 10) } : r
          )
        };
        console.log('[패키지 updateRowField] 저장 후', { 갱신된행: result[hq].find(r => r.id === id) });
        return result;
      });
    };

    // 행별 자동 계산
    const calcRow = (row) => {
      const qtyRate = row.preparedKits > 0 ? +(row.soldKits / row.preparedKits * 100).toFixed(1) : 0;
      const personRate = row.targetPeople > 0 ? +(row.progressedPeople / row.targetPeople * 100).toFixed(1) : 0;
      return { qtyRate, personRate };
    };

    // === 이전월 데이터 복사 ===
    const handleCopyPrevMonthPkg = () => {
      const prevMonth = displayMonth - 1;
      if (prevMonth < 1) { alert('이전월이 없습니다 (1월에서는 사용 불가)'); return; }
      const prevYearMonth = `${curYear}-${prevMonth}`;

      // 이전월의 패키지 데이터
      const allHqRows = packagePerson[hq] || [];
      const prevMonthRows = allHqRows.filter(r => r.yearMonth === prevYearMonth);

      if (prevMonthRows.length === 0) {
        alert(`${prevMonth}월에 패키지 데이터가 없습니다.`);
        return;
      }
      // 현재 월에 데이터 있으면 확인
      const currentCount = monthRows.length;
      let msg = `${prevMonth}월의 ${prevMonthRows.length}개 행을 ${monthLabel}로 복사하시겠습니까?`;
      if (currentCount > 0) {
        msg += `\n\n주의: ${monthLabel}에 현재 ${currentCount}개 행이 있습니다.\n복사하면 기존 데이터에 추가됩니다.`;
      }
      if (!confirm(msg)) return;

      // 새 ID 생성하여 추가
      const newRows = prevMonthRows.map(r => ({
        ...r,
        id: 'pkg_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
        yearMonth: yearMonth,
        updatedAt: new Date().toISOString().slice(0, 10),
      }));

      setPackagePerson(prev => ({
        ...prev,
        [hq]: [...(prev[hq] || []), ...newRows]
      }));
      logChange(`9번 패키지`, `${prevMonth}월 → ${monthLabel} 복사 (${newRows.length}개 행)`);
      alert(`${prevMonth}월 데이터 → ${monthLabel}로 복사 완료! (${newRows.length}개 행)`);
    };

    // === 엑셀 다운로드 (당월 데이터만) ===
    const handleExcelDownload = () => {
      if (typeof XLSX === 'undefined') { alert('엑셀 라이브러리 로딩 실패'); return; }
      const wb = XLSX.utils.book_new();
      const UNIT_PRICE = { AO: 431, AR: 567, BD: 650 };
      // 전체 판매매출 합계 (판매비중 계산용)
      const totalRev = monthRows.reduce((s, r) => {
        const sysQ = r.preparedKits || 0;
        const up = r.salesGoal && r.salesGoal > 0 ? r.salesGoal : (UNIT_PRICE[r.salesSystem] || 0);
        const soldQ = r.soldKits || 0;
        return s + (sysQ * up * soldQ);
      }, 0);
      const dataForExcel = monthRows.map((r, idx) => {
        const sysQ = r.preparedKits || 0;
        const up = r.salesGoal && r.salesGoal > 0 ? r.salesGoal : (UNIT_PRICE[r.salesSystem] || 0);
        const soldQ = r.soldKits || 0;
        const rev = sysQ * up * soldQ;
        const share = totalRev > 0 ? +(rev / totalRev * 100).toFixed(1) : 0;
        return {
          'No': idx + 1,
          '지역': r.region || '',
          '행사월': r.eventMonth || '',
          '대리상명': r.dealerName || '',
          '행사명칭': r.eventName || '',
          '판매시스템': r.salesSystem || 'AR',
          '시스템수량': sysQ,
          '판매단가(위안)': up,
          '판매수량': soldQ,
          '판매매출(위안)': rev,
          '판매비중(%)': share,
        };
      });
      const ws = XLSX.utils.json_to_sheet(dataForExcel);
      XLSX.utils.book_append_sheet(wb, ws, `${monthLabel}_패키지판매`);
      XLSX.writeFile(wb, `${hq}_패키지판매_${yearMonth}.xlsx`);
      logChange(`8번 패키지`, `엑셀 다운로드 (${monthLabel})`);
    };

    // === 엑셀 업로드 ===
    const handleExcelUpload = (event) => {
      const file = event.target.files[0];
      if (!file) return;
      if (typeof XLSX === 'undefined') { alert('엑셀 라이브러리 로딩 실패'); return; }
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = new Uint8Array(e.target.result);
          const wb = XLSX.read(data, { type: 'array' });
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
          if (rows.length === 0) { alert('엑셀에 데이터가 없습니다.'); return; }
          if (!confirm(`${rows.length}건의 데이터를 ${monthLabel} 데이터에 추가하시겠습니까?\n(기존 데이터는 유지됩니다)`)) return;
          const newRows = rows.map(r => ({
            id: 'pkg_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
            yearMonth: yearMonth,
            region: r['지역'] || (REGIONS[hq] || ['지역'])[0],
            eventMonth: r['행사월'] || `${displayMonth}월`,
            dealerName: r['대리상명'] || '',
            eventName: r['행사명칭'] || '',
            salesSystem: r['판매시스템'] || 'AR',
            preparedKits: parseFloat(r['시스템수량'] || 0) || 0,
            salesGoal: parseFloat(r['판매목표'] || 0) || 0,
            soldKits: parseFloat(r['판매수량'] || 0) || 0,
            revenueKrmb: parseFloat(r['매출(K RMB)'] || r['매출'] || 0) || 0,
            updatedAt: new Date().toISOString().slice(0, 10),
          }));
          setPackagePerson(prev => ({
            ...prev,
            [hq]: [...(prev[hq] || []), ...newRows]
          }));
          logChange(`9번 패키지`, `엑셀 업로드 ${newRows.length}건 (${monthLabel})`);
          alert(`${newRows.length}건 추가 완료!`);
        } catch (err) {
          alert('엑셀 읽기 실패: ' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
      event.target.value = '';
    };

    return (
      <div className="space-y-4">
        {/* 페이지 타이틀 */}
        <div className="flex items-baseline justify-between mb-2">
          <div className="flex items-baseline gap-3">
            <h1 className="text-2xl font-bold text-slate-900">{hq}</h1>
            <h2 className="text-2xl font-bold text-slate-900">5. 패키지 활동보고</h2>
          </div>
          <span className="text-xs text-slate-500 flex items-center gap-1">

        {/* === KPI 카드 5개 (당월) === */}
        {(() => {
          const UNIT_PRICE_KPI = { AO: 431, AR: 567, BD: 650 };
          const kpiPrep = monthRows.reduce((s, r) => s + (r.preparedKits || 0), 0);
          const kpiGoal = monthRows.reduce((s, r) => s + (r.salesGoal || 0), 0);
          const kpiSold = monthRows.reduce((s, r) => s + (r.soldKits || 0), 0);
          // 매출(자동) = 각 행의 (시스템수량 × 판매단가 × 판매수량) 합계, 위안 단위
          const kpiRevYuan = monthRows.reduce((s, r) => {
            const sysQ = r.preparedKits || 0;
            const up = r.salesGoal && r.salesGoal > 0 ? r.salesGoal : (UNIT_PRICE_KPI[r.salesSystem] || 0);
            const soldQ = r.soldKits || 0;
            return s + (sysQ * up * soldQ);
          }, 0);
          const kpiRev = +(kpiRevYuan / 1000).toFixed(1); // K RMB로 변환
          return (
            <div className="grid grid-cols-5 gap-3">
              <div className="bg-white border border-slate-200 rounded-md p-3">
                <div className="text-xs text-slate-500 mb-1">{monthLabel} 시스템수량</div>
                <div className="flex items-baseline gap-1">
                  <span className="text-xl font-bold text-slate-900">{formatNumber(kpiPrep)}</span>
                  <span className="text-xs text-slate-500">개</span>
                </div>
              </div>
              <div className="bg-white border border-slate-200 rounded-md p-3">
                <div className="text-xs text-slate-500 mb-1">{monthLabel} 판매목표</div>
                <div className="flex items-baseline gap-1">
                  <span className="text-xl font-bold text-slate-900">{formatNumber(kpiGoal)}</span>
                  <span className="text-xs text-slate-500">개</span>
                </div>
              </div>
              <div className="bg-white border border-slate-200 rounded-md p-3">
                <div className="text-xs text-slate-500 mb-1">{monthLabel} 판매수량</div>
                <div className="flex items-baseline gap-1">
                  <span className="text-xl font-bold text-slate-900">{formatNumber(kpiSold)}</span>
                  <span className="text-xs text-slate-500">개</span>
                </div>
                <div className="text-[10px] text-slate-500 mt-1">목표 {formatNumber(kpiGoal)}개 · 합계 100%</div>
              </div>
              <div className="bg-white border border-slate-200 rounded-md p-3">
                <div className="text-xs text-slate-500 mb-1">{monthLabel} 매출</div>
                <div className="flex items-baseline gap-1">
                  <span className="text-xl font-bold text-slate-900">{formatNumber(kpiRev)}</span>
                  <span className="text-xs text-slate-500">K RMB</span>
                </div>
              </div>
              <div className="bg-white border border-slate-200 rounded-md p-3">
                <div className="text-xs text-slate-500 mb-1">{monthLabel} 등록 건수</div>
                <div className="flex items-baseline gap-1">
                  <span className="text-xl font-bold text-slate-900">{monthRows.length}</span>
                  <span className="text-xs text-slate-500">건</span>
                </div>
              </div>
            </div>
          );
        })()}

        {/* === NOTE (단일 메모, 월별 분리, 즉시 저장) === */}
        {(() => {
          const noteKeyPK = `pkg_note|${hq}|${yearMonth}`;
          const currentNotePK = weeklyEntries[noteKeyPK] ?? '';
          const updateNotePK = (value) => {
            setWeeklyEntries(prev => ({ ...prev, [noteKeyPK]: value }));
          };
          return (

                  className="w-full min-h-[80px] px-2 py-1.5 text-sm border border-slate-200 rounded-md outline-none focus:border-slate-400 focus:ring-1 focus:ring-slate-200 resize-y"
                />
              </div>
            </div>
          );
        })()}

        {/* === 표 === */}
        <div className="bg-white border border-slate-200 rounded-md p-4">
          <div className="flex items-center justify-between mb-3">

          <div className="border border-slate-300 rounded overflow-x-auto">
            <table className="w-full text-sm" data-table-id="package_sales" style={{ tableLayout: 'fixed' }}>
              <thead>
                <tr className="bg-slate-100 border-b border-slate-300">
                  <th onClick={() => handleSort('region')} className="px-3 py-2 border-r border-slate-300 font-semibold text-slate-700 w-[90px] cursor-pointer hover:bg-slate-200 select-none">
                    <span className="inline-flex items-center gap-1">지역 <span className="text-[10px] text-slate-400">{sortIcon('region')}</span></span>
                  </th>
                  <th onClick={() => handleSort('eventMonth')} className="px-3 py-2 border-r border-slate-300 font-semibold text-slate-700 w-[80px] cursor-pointer hover:bg-slate-200 select-none">

                  <th className="px-3 py-2 border-r border-slate-300 font-semibold text-slate-700 w-[90px]">판매수량</th>
                  <th className="px-3 py-2 border-r border-slate-300 font-semibold text-slate-700 w-[110px]">판매매출<br/><span className="text-xs font-normal text-slate-500">(위안, 자동)</span></th>
                  <th className="px-3 py-2 font-semibold text-slate-700 w-[100px]">판매비중<br/><span className="text-xs font-normal text-slate-500">(전체 대비)</span></th>
                </tr>
              </thead>
              <tbody>
                {monthRows.length === 0 ? (
                  <tr><td colSpan={10} className="px-3 py-12 text-center text-slate-400">{monthLabel}에 등록된 패키지 판매 데이터가 없습니다. [행 추가] 버튼을 클릭하세요.</td></tr>
                ) : (() => {
                  // ===== 전체 판매매출 합계 미리 계산 (판매비중용) =====
                  const UNIT_PRICE = { AO: 431, AR: 567, BD: 650 };
                  const totalRevenue = monthRows.reduce((sum, r) => {
                    const sysQty = r.preparedKits || 0;
                    const price = r.salesGoal && r.salesGoal > 0 ? r.salesGoal : (UNIT_PRICE[r.salesSystem] || 0);
                    const soldQ = r.soldKits || 0;
                    return sum + (sysQty * price * soldQ);
                  }, 0);
                  return monthRows.map((row) => {
                  // 판매단가: 사용자가 입력했으면 그 값, 아니면 시스템 기본값
                  const unitPrice = row.salesGoal && row.salesGoal > 0 ? row.salesGoal : (UNIT_PRICE[row.salesSystem] || 0);
                  // 판매매출 = 시스템수량 × 판매단가 × 판매수량 (자동 계산)
                  const preparedQty = row.preparedKits || 0;
                  const soldQty = row.soldKits || 0;
                  const autoRevenue = preparedQty * unitPrice * soldQty;
                  // 판매비중 = 이 행 판매매출 ÷ 전체 판매매출 × 100
                  const salesShare = totalRevenue > 0 ? +(autoRevenue / totalRevenue * 100).toFixed(1) : 0;
                  // 판매시스템 변경 시 → 판매단가도 시스템 기본값으로 자동 설정
                  const onChangeSystem = (newSystem) => {
                    updateRowField(row.id, 'salesSystem', newSystem);
                    // 시스템 변경 시 판매단가도 자동 업데이트
                    setTimeout(() => updateRowField(row.id, 'salesGoal', UNIT_PRICE[newSystem] || 0), 0);
                  };
                  return (
                    <tr key={row.id} className="border-b border-slate-200 hover:bg-slate-50 group">
                      {/* 지역 (드롭다운) */}
                      <td className="px-2 py-1 border-r border-slate-300 text-center">
                        <select value={row.region || (REGIONS[hq] || ['지역'])[0]}
                          onChange={(e) => updateRowField(row.id, 'region', e.target.value)}
                          className="px-1 py-0.5 text-sm border-0 bg-transparent outline-none cursor-pointer hover:bg-blue-50 rounded w-full text-center font-semibold">
                          {(REGIONS[hq] || []).map(r => <option key={r} value={r}>{r}</option>)}
                        </select>
                      </td>
                      {/* 행사월 */}
                      <td className="px-2 py-1 border-r border-slate-300 text-center">
                        <EditableCell value={row.eventMonth || ''} align="center" onSave={(v) => updateRowField(row.id, 'eventMonth', v)} />
                      </td>
                      {/* 대리상명 */}
                      <td className="px-2 py-1 border-r border-slate-300">
                        <EditableCell value={row.dealerName || ''} onSave={(v) => updateRowField(row.id, 'dealerName', v)} />
                      </td>
                      {/* 행사명칭 */}
                      <td className="px-2 py-1 border-r border-slate-300">
                        <EditableCell value={row.eventName || ''} onSave={(v) => updateRowField(row.id, 'eventName', v)} />
                      </td>
                      {/* 판매시스템 (드롭다운: AR/AO/BD) - 변경 시 판매단가 자동 적용 */}
                      <td className="px-2 py-1 border-r border-slate-300 text-center">
                        <select value={row.salesSystem || 'AR'}
                          onChange={(e) => onChangeSystem(e.target.value)}
                          className="px-1 py-0.5 text-sm border-0 bg-transparent outline-none cursor-pointer hover:bg-blue-50 rounded w-full text-center font-semibold">
                          <option value="AR">AR</option>
                          <option value="AO">AO</option>
                          <option value="BD">BD</option>
                        </select>
                      </td>
                      {/* 시스템수량 */}
                      <td className="px-2 py-1 border-r border-slate-300 text-right">
                        <EditableCell value={row.preparedKits || 0} type="number" align="right" onSave={(v) => updateRowField(row.id, 'preparedKits', v)} />
                      </td>
                      {/* 판매단가 (위안) - 수동 수정 가능, 비워두면 시스템 기본값 사용 */}
                      <td className="px-2 py-1 border-r border-slate-300 text-right">
                        <EditableCell value={unitPrice} type="number" align="right" onSave={(v) => updateRowField(row.id, 'salesGoal', parseFloat(v) || 0)} />
                      </td>
                      {/* 판매수량 */}
                      <td className="px-2 py-1 border-r border-slate-300 text-right">
                        <EditableCell value={row.soldKits || 0} type="number" align="right" onSave={(v) => updateRowField(row.id, 'soldKits', v)} />
                      </td>
                      {/* 판매매출 (자동 계산: 판매수량 × 판매단가) */}
                      <td className="px-3 py-2 border-r border-slate-300 text-right font-semibold bg-slate-50" title="시스템수량 × 판매단가 × 판매수량 (자동 계산)">
                        {formatNumber(autoRevenue)}
                      </td>
                      {/* 판매비중 (전체 대비, 자동 계산) + 호버 시 삭제 버튼 */}
                      <td className={`px-3 py-2 text-right font-semibold relative bg-blue-50/30 ${salesShare >= 30 ? 'text-emerald-600' : salesShare >= 15 ? 'text-blue-600' : salesShare >= 5 ? 'text-amber-600' : 'text-rose-600'}`} title="이 행 판매매출 ÷ 전체 판매매출 × 100">
                        {salesShare}%
                        <button onClick={() => deleteRow(row.id)}
                          className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-rose-400 hover:text-rose-600 transition"
                          title="행 삭제">
                          <Icon name="x" className="w-3.5 h-3.5" />
                        </button>
                      </td>
                    </tr>
                  );
                });
                })()}

                {/* 합계 행 */}
                {monthRows.length > 0 && (() => {
                  const UNIT_PRICE = { AO: 431, AR: 567, BD: 650 };
                  const sumSold = monthRows.reduce((s, r) => s + (r.soldKits || 0), 0);
                  const sumPrep = monthRows.reduce((s, r) => s + (r.preparedKits || 0), 0);
                  // 판매매출 합계 = 각 행별로 (시스템수량 × 판매단가 × 판매수량) 계산해서 합산
                  const sumRev = monthRows.reduce((s, r) => {
                    const sysQ = r.preparedKits || 0;
                    const up = r.salesGoal && r.salesGoal > 0 ? r.salesGoal : (UNIT_PRICE[r.salesSystem] || 0);
                    const soldQ = r.soldKits || 0;
                    return s + (sysQ * up * soldQ);
                  }, 0);
                  return (
                    <tr className="bg-slate-100 font-bold border-t-2 border-slate-400">
                      <td colSpan={5} className="px-3 py-2 border-r border-slate-300 text-center">{monthLabel} 합계</td>
                      <td className="px-3 py-2 border-r border-slate-300 text-right">{formatNumber(sumPrep)}</td>
                      <td className="px-3 py-2 border-r border-slate-300 text-right text-slate-400">-</td>
                      <td className="px-3 py-2 border-r border-slate-300 text-right">{formatNumber(sumSold)}</td>
                      <td className="px-3 py-2 border-r border-slate-300 text-right bg-blue-50/30">{formatNumber(sumRev)}</td>
                      <td className="px-3 py-2 text-right bg-blue-100 text-emerald-700">100%</td>
                    </tr>
                  );
                })()}
              </tbody>
            </table>
          </div>

          <div className="mt-2 text-[11px] text-slate-500">
            * {monthLabel} 데이터만 표시됩니다. 월을 변경하면 해당 월의 데이터가 별도로 표시됩니다 (월별 분리 저장).
          </div>

          {/* === PKG 판매정책 안내 박스 === */}
          <div className="mt-4 bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-200 rounded-md p-4">
            <div className="flex items-center gap-2 mb-3">
              <span className="inline-flex items-center justify-center w-7 h-7 rounded-full bg-blue-600 text-white text-xs font-bold">PKG</span>
              <h4 className="text-base font-bold text-slate-900">패키지 판매정책 안내</h4>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 text-sm">
              {/* AO */}
              <div className="bg-white border border-blue-200 rounded-md p-3">
                <div className="flex items-center justify-between mb-2">
                  <span className="px-2 py-0.5 bg-emerald-100 text-emerald-700 text-xs font-bold rounded">AO</span>
                  <span className="text-lg font-bold text-slate-900">431 <span className="text-xs font-normal text-slate-500">위안</span></span>
                </div>
                <div className="text-slate-700">
                  <div className="font-semibold mb-1">구성: 10 + 3</div>
                  <div className="text-xs text-slate-600">대리상 공급가격 <strong className="text-emerald-700">431위안</strong></div>
                </div>
              </div>
              {/* AR */}
              <div className="bg-white border border-blue-200 rounded-md p-3">
                <div className="flex items-center justify-between mb-2">
                  <span className="px-2 py-0.5 bg-blue-100 text-blue-700 text-xs font-bold rounded">AR</span>
                  <span className="text-lg font-bold text-slate-900">567 <span className="text-xs font-normal text-slate-500">위안</span></span>
                </div>
                <div className="text-slate-700">
                  <div className="font-semibold mb-1">구성: 10 + 3.5</div>
                  <div className="text-xs text-slate-600">대리상 공급가격 <strong className="text-blue-700">567위안</strong></div>
                </div>
              </div>
              {/* BD */}
              <div className="bg-white border border-blue-200 rounded-md p-3">
                <div className="flex items-center justify-between mb-2">
                  <span className="px-2 py-0.5 bg-purple-100 text-purple-700 text-xs font-bold rounded">BD</span>
                  <span className="text-lg font-bold text-slate-900">650 <span className="text-xs font-normal text-slate-500">위안</span></span>
                </div>
                <div className="text-slate-700">
                  <div className="font-semibold mb-1">구성: 10 + 3</div>
                  <div className="text-xs text-slate-600">대리상 공급가격 <strong className="text-purple-700">650위안</strong></div>
                </div>
              </div>
            </div>
            <div className="mt-3 text-xs text-slate-600 bg-amber-50 border border-amber-200 rounded p-2">
              <strong>※ 자동 계산 안내:</strong> 판매시스템을 선택하면 위 기본 단가가 판매단가에 자동 적용됩니다. 단가는 직접 수정 가능하며, <strong>판매매출은 판매수량 × 판매단가</strong>로 자동 계산됩니다.
            </div>
          </div>
        </div>
      </div>
    );
  };

  /* ===== 라우팅 ===== */
  const renderContent = () => {
    if (selectedHQ === 'overview') return renderOverview();
    const hq = selectedHQ;
    switch (selectedSubmenu) {
      case 1: return renderCoreTasks(hq);
      case 2: return renderMSDSO(hq);
      case 3: return renderPSI(hq);
      case 4: return renderSalesPerson(hq);
      case 5: return renderPackage(hq);
      case 6: return renderDSONotEntered(hq);
      case 7: return renderBD(hq);
      case 8: return renderSubCustomer(hq);
      default: return renderMSDSO(hq);
    }
  };

  return (
    <div className="flex h-screen bg-slate-100 text-slate-900">
      {renderSidebar()}
      <div className="flex-1 flex flex-col overflow-hidden">
        {renderTopBar()}
        <main className="flex-1 overflow-y-auto p-6">
          {/* Sheets 연동 상태 배너 */}
          {sheetsError && (
            <div className="mb-4 px-4 py-3 bg-rose-50 border border-rose-200 rounded-md flex items-start gap-3">
              <Icon name="alert" className="w-5 h-5 text-rose-500 flex-shrink-0 mt-0.5" />
              <div className="flex-1">
                <div className="text-sm font-semibold text-rose-700 mb-1">Google Sheets 연결 실패</div>
                <div className="text-xs text-rose-600 whitespace-pre-wrap">{sheetsError}</div>
                {sheetsData && (
                  <div className="text-xs text-slate-600 mt-1">
                    💾 최근 캐시 데이터({sheetsFetchedAt ? new Date(sheetsFetchedAt).toLocaleString('ko-KR') : '시점 미상'})를 표시합니다.
                  </div>
                )}
              </div>
              <button onClick={() => setSheetsError(null)} className="text-rose-400 hover:text-rose-700">
                <Icon name="x" className="w-4 h-4" />
              </button>
            </div>
          )}
          {sheetsLoading && (
            <div className="mb-4 px-4 py-2 bg-blue-50 border border-blue-200 rounded-md flex items-center gap-2 text-sm text-blue-700">
              <Icon name="refresh" className="w-4 h-4 animate-spin" /> Google Sheets에서 데이터를 가져오는 중…
            </div>
          )}
          {sheetsData && sheetsFetchedAt && !sheetsError && !sheetsLoading && (
            <div className="mb-4 px-3 py-1.5 bg-emerald-50 border border-emerald-100 rounded text-xs text-emerald-700 inline-flex items-center gap-2">

              {sheetsData._meta && sheetsData._meta.sheets && (
                <span className="text-emerald-600">· {sheetsData._meta.sheets.length}개 시트</span>
              )}
            </div>
          )}
          {renderContent()}
        </main>
      </div>

      {/* === DSO 상세 사이드 패널 === */}
      {dsoDetailPanel && (() => {
        const { hq: panelHQ, dsoId, dsoRow } = dsoDetailPanel;
        // 키 형식: dso_*|hq|dsoId  (월별 분리 안 함 - DSO는 영구 데이터)
        const k업체현황 = `dso_업체현황|${panelHQ}|${dsoId}`;
        const k대응방안 = `dso_대응방안|${panelHQ}|${dsoId}`;
        const k메모 = `dso_메모|${panelHQ}|${dsoId}`;
        const k시스템 = `dso_시스템|${panelHQ}|${dsoId}`;
        const k활동 = `dso_활동|${panelHQ}|${dsoId}`;
        // 데이터 추출
        const text업체 = weeklyEntries[k업체현황] ?? '';
        const text대응 = weeklyEntries[k대응방안] ?? '';
        const text메모 = weeklyEntries[k메모] ?? '';
        let systems = [];
        try {
          const raw = weeklyEntries[k시스템];
          systems = raw ? (typeof raw === 'string' ? JSON.parse(raw) : raw) : [];
        } catch (e) { systems = []; }
        let activities = [];
        try {
          const raw = weeklyEntries[k활동];
          activities = raw ? (typeof raw === 'string' ? JSON.parse(raw) : raw) : [];
        } catch (e) { activities = []; }

        const updateText = (key, value) => {
          setWeeklyEntries(prev => ({ ...prev, [key]: value }));
        };
        const updateSystems = (newArr) => {
          setWeeklyEntries(prev => ({ ...prev, [k시스템]: JSON.stringify(newArr) }));
        };
        const updateActivities = (newArr) => {
          setWeeklyEntries(prev => ({ ...prev, [k활동]: JSON.stringify(newArr) }));
        };

        // 시스템 합계 계산
        const sysSumQty = systems.reduce((s, r) => s + (Number(r.qty) || 0), 0);
        const sysSumPrice = systems.reduce((s, r) => s + ((Number(r.qty) || 0) * (Number(r.price) || 0)), 0);
        const sysSumPatients = systems.reduce((s, r) => s + (Number(r.patients) || 0), 0);

        // 활동 합계
        const actSumCost = activities.reduce((s, r) => s + (Number(r.cost) || 0), 0);
        const actSumSales = activities.reduce((s, r) => s + (Number(r.sales) || 0), 0);
        const actRate = actSumCost > 0 ? +(actSumSales / actSumCost * 100).toFixed(1) : 0;

        // 표 3 요약 (이미지 1 상단)
        const achRate = (dsoRow.monthSales || 0) > 0 ? +((dsoRow.monthRev || 0) / dsoRow.monthSales * 100).toFixed(1) : 0;
        const progRate = (dsoRow.yearTarget || 0) > 0 ? +((dsoRow.cumQty || 0) / dsoRow.yearTarget * 100).toFixed(1) : 0;

        return (

            <div className="absolute inset-0 bg-black/30"></div>
            {/* 패널 본체 (오른쪽 슬라이드) */}
            <div className="relative bg-white w-full max-w-[1100px] h-full overflow-y-auto shadow-2xl" onClick={(e) => e.stopPropagation()}>
              {/* 헤더 */}
              <div className="sticky top-0 z-10 bg-white border-b border-slate-200 px-5 py-3 flex items-center justify-between">
                <div>
                  <h3 className="text-base font-bold text-slate-900">DSO 상세 - {dsoRow.customer}</h3>
                  <div className="text-xs text-slate-500 mt-0.5">{panelHQ} · {dsoRow.region} · 등급 {dsoRow.grade || 'C'} · 자동 저장</div>
                </div>
                <button onClick={() => setDsoDetailPanel(null)}
                  className="text-slate-400 hover:text-slate-700 p-1">
                  <Icon name="x" className="w-5 h-5" />
                </button>
              </div>

              <div className="p-5 space-y-4">
                {/* === 1. 상단 행 요약 (이미지 1 상단) === */}
                <div className="border border-slate-200 rounded overflow-hidden">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="bg-slate-100">
                        <th className="px-2 py-2 border-r border-slate-300 font-semibold text-slate-700 text-xs">지역</th>
                        <th className="px-2 py-2 border-r border-slate-300 font-semibold text-slate-700 text-xs">등급</th>
                        <th className="px-2 py-2 border-r border-slate-300 font-semibold text-slate-700 text-xs">DSO 명칭</th>
                        <th className="px-2 py-2 border-r border-slate-300 font-semibold text-slate-700 text-xs">지점수</th>
                        <th className="px-2 py-2 border-r border-slate-300 font-semibold text-slate-700 text-xs">년수량</th>
                        <th className="px-2 py-2 border-r border-slate-300 font-semibold text-slate-700 text-xs">당월목표</th>
                        <th className="px-2 py-2 border-r border-slate-300 font-semibold text-slate-700 text-xs">당월실적</th>
                        <th className="px-2 py-2 border-r border-slate-300 font-semibold text-slate-700 text-xs">달성율</th>
                        <th className="px-2 py-2 border-r border-slate-300 font-semibold text-slate-700 text-xs">26년목표</th>
                        <th className="px-2 py-2 border-r border-slate-300 font-semibold text-slate-700 text-xs">누적실적</th>
                        <th className="px-2 py-2 border-r border-slate-300 font-semibold text-slate-700 text-xs">진도율</th>
                        <th className="px-2 py-2 font-semibold text-slate-700 text-xs">진입/미진입</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td className="px-2 py-2 border-r border-slate-300 text-center text-xs">{dsoRow.region}</td>
                        <td className="px-2 py-2 border-r border-slate-300 text-center text-xs font-bold">{dsoRow.grade || 'C'}</td>
                        <td className="px-2 py-2 border-r border-slate-300 text-left text-xs text-blue-600 font-semibold">{dsoRow.customer}</td>
                        <td className="px-2 py-2 border-r border-slate-300 text-right text-xs">{formatNumber(dsoRow.branchCount || 0)}</td>
                        <td className="px-2 py-2 border-r border-slate-300 text-right text-xs">{formatNumber(dsoRow.annualQty || 0)}</td>
                        <td className="px-2 py-2 border-r border-slate-300 text-right text-xs">{formatNumber(dsoRow.monthSales || 0)}</td>
                        <td className="px-2 py-2 border-r border-slate-300 text-right text-xs">{formatNumber(dsoRow.monthRev || 0)}</td>
                        <td className={`px-2 py-2 border-r border-slate-300 text-right text-xs font-semibold ${achRate >= 80 ? 'text-emerald-600' : achRate >= 50 ? 'text-blue-600' : achRate >= 30 ? 'text-amber-600' : 'text-rose-600'}`}>{achRate}%</td>
                        <td className="px-2 py-2 border-r border-slate-300 text-right text-xs">{formatNumber(dsoRow.yearTarget || 0)}</td>
                        <td className="px-2 py-2 border-r border-slate-300 text-right text-xs">{formatNumber(dsoRow.cumQty || 0)}</td>
                        <td className={`px-2 py-2 border-r border-slate-300 text-right text-xs font-semibold ${progRate >= 70 ? 'text-emerald-600' : progRate >= 40 ? 'text-blue-600' : 'text-slate-600'}`}>{progRate}%</td>
                        <td className="px-2 py-2 text-center text-xs">
                          <span className={`inline-block px-2 py-0.5 rounded text-xs font-semibold ${dsoRow.enter ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : 'bg-slate-100 text-slate-600 border border-slate-200'}`}>{dsoRow.enter ? '진입' : '미진입'}</span>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>

                {/* === 2. 업체현황 + 주요 시스템 (좌우 분할) === */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
                  {/* 업체현황 */}
                  <div className="border border-slate-200 rounded p-3">
                    <div className="flex items-center justify-between mb-2">
                      <h4 className="text-sm font-bold text-slate-900">업체현황</h4>
                      <Icon name="edit" className="w-3.5 h-3.5 text-slate-400" />
                    </div>
                    <textarea value={text업체} onChange={(e) => updateText(k업체현황, e.target.value)}
                      placeholder="내용을 입력하세요."

                  </div>

                      <button onClick={() => {
                        const newRow = { id: Date.now(), system: '신규 시스템', qty: 0, price: 0, patients: 0, ratio: 0, note: '' };
                        updateSystems([...systems, newRow]);
                      }}
                        className="text-xs text-blue-600 hover:text-blue-800 font-semibold">
                        + 추가
                      </button>
                    </div>
                    <div className="border border-slate-200 rounded overflow-hidden text-xs">
                      <table className="w-full">
                        <thead>
                          <tr className="bg-slate-100">
                            <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700 text-left">시스템</th>
                            <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700">수량</th>
                            <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700">공급가격</th>
                            <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700">환자수</th>
                            <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700">비중</th>
                            <th className="px-2 py-1.5 font-semibold text-slate-700">비고</th>
                          </tr>
                        </thead>
                        <tbody>
                          {systems.length === 0 ? (
                            <tr><td colSpan={6} className="px-2 py-4 text-center text-slate-400">데이터 없음. + 추가 버튼을 누르세요.</td></tr>
                          ) : systems.map((s, idx) => {
                            const subTotal = (Number(s.qty) || 0) * (Number(s.price) || 0);
                            const subTotalForRatio = systems.reduce((sum, x) => sum + ((Number(x.qty) || 0) * (Number(x.price) || 0)), 0);
                            const ratio = subTotalForRatio > 0 ? +(subTotal / subTotalForRatio * 100).toFixed(1) : 0;
                            return (
                              <tr key={s.id || idx} className="border-t border-slate-200 hover:bg-slate-50 group">
                                <td className="px-2 py-1 border-r border-slate-200">
                                  <EditableCell value={s.system || ''} onSave={(v) => {
                                    const newArr = systems.map((x, i) => i === idx ? { ...x, system: v } : x);
                                    updateSystems(newArr);
                                  }} />
                                </td>
                                <td className="px-2 py-1 border-r border-slate-200 text-right">
                                  <EditableCell value={s.qty || 0} type="number" align="right" onSave={(v) => {
                                    const newArr = systems.map((x, i) => i === idx ? { ...x, qty: parseFloat(v) || 0 } : x);
                                    updateSystems(newArr);
                                  }} />
                                </td>
                                <td className="px-2 py-1 border-r border-slate-200 text-right">
                                  <EditableCell value={s.price || 0} type="number" align="right" onSave={(v) => {
                                    const newArr = systems.map((x, i) => i === idx ? { ...x, price: parseFloat(v) || 0 } : x);
                                    updateSystems(newArr);
                                  }} />
                                </td>
                                <td className="px-2 py-1 border-r border-slate-200 text-right">
                                  <EditableCell value={s.patients || 0} type="number" align="right" onSave={(v) => {
                                    const newArr = systems.map((x, i) => i === idx ? { ...x, patients: parseFloat(v) || 0 } : x);
                                    updateSystems(newArr);
                                  }} />
                                </td>
                                <td className="px-2 py-1 border-r border-slate-200 text-right">{ratio}%</td>
                                <td className="px-2 py-1 relative">
                                  <EditableCell value={s.note || ''} onSave={(v) => {
                                    const newArr = systems.map((x, i) => i === idx ? { ...x, note: v } : x);
                                    updateSystems(newArr);
                                  }} />
                                  <button onClick={() => {
                                    if (confirm('이 행을 삭제할까요?')) {
                                      updateSystems(systems.filter((_, i) => i !== idx));
                                    }
                                  }}
                                    className="absolute right-1 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 text-rose-400 hover:text-rose-600 transition">
                                    <Icon name="x" className="w-3 h-3" />
                                  </button>
                                </td>
                              </tr>
                            );
                          })}
                          {systems.length > 0 && (
                            <tr className="bg-slate-100 font-bold border-t-2 border-slate-400">
                              <td className="px-2 py-1.5 border-r border-slate-200 text-center">합계</td>
                              <td className="px-2 py-1.5 border-r border-slate-200 text-right">{formatNumber(sysSumQty)}</td>
                              <td className="px-2 py-1.5 border-r border-slate-200 text-right">{formatNumber(sysSumPrice)}</td>
                              <td className="px-2 py-1.5 border-r border-slate-200 text-right">{formatNumber(sysSumPatients)}</td>
                              <td className="px-2 py-1.5 border-r border-slate-200 text-right">100.0%</td>
                              <td className="px-2 py-1.5 text-center text-slate-500">-</td>
                            </tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

                {/* === 3. 대응 방안 + 메모 (좌우 분할) === */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
                  <div className="border border-slate-200 rounded p-3">
                    <div className="flex items-center justify-between mb-2">
                      <h4 className="text-sm font-bold text-slate-900">대응 방안</h4>
                      <Icon name="edit" className="w-3.5 h-3.5 text-slate-400" />
                    </div>
                    <textarea value={text대응} onChange={(e) => updateText(k대응방안, e.target.value)}
                      placeholder="내용을 입력하세요."
                      className="w-full min-h-[100px] px-2 py-1.5 text-sm border border-slate-200 rounded outline-none focus:border-slate-400 focus:ring-1 focus:ring-slate-200 resize-y" />
                  </div>
                  <div className="border border-slate-200 rounded p-3">
                    <div className="flex items-center justify-between mb-2">
                      <h4 className="text-sm font-bold text-slate-900">메모</h4>
                      <Icon name="edit" className="w-3.5 h-3.5 text-slate-400" />
                    </div>
                    <textarea value={text메모} onChange={(e) => updateText(k메모, e.target.value)}
                      placeholder="내용을 입력하세요."
                      className="w-full min-h-[100px] px-2 py-1.5 text-sm border border-slate-200 rounded outline-none focus:border-slate-400 focus:ring-1 focus:ring-slate-200 resize-y" />
                  </div>
                </div>

                {/* === 4. 활동 현황 === */}
                <div className="border border-slate-200 rounded p-3">
                  <div className="flex items-center justify-between mb-2">
                    <h4 className="text-sm font-bold text-slate-900">활동 현황</h4>
                    <button onClick={() => {
                      const today = new Date().toISOString().slice(0, 10);
                      const newRow = {
                        id: Date.now(),
                        activity: '신규 활동',
                        month: today.slice(0, 7),
                        period: today,
                        content: '',
                        result: '',
                        cost: 0,
                        sales: 0,
                        note: ''
                      };
                      updateActivities([...activities, newRow]);
                    }}
                      className="text-xs text-blue-600 hover:text-blue-800 font-semibold">
                      + 활동 추가
                    </button>
                  </div>
                  <div className="border border-slate-200 rounded overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="bg-slate-100">
                          <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700 text-left min-w-[120px]">활동명</th>
                          <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700 min-w-[80px]">활동월</th>
                          <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700 min-w-[140px]">활동일정</th>
                          <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700 text-left min-w-[180px]">주요내용</th>
                          <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700 text-left min-w-[140px]">성과현황</th>
                          <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700 min-w-[90px]">비용</th>
                          <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700 min-w-[100px]">판매금액</th>
                          <th className="px-2 py-1.5 border-r border-slate-300 font-semibold text-slate-700 min-w-[80px]">성과%</th>
                          <th className="px-2 py-1.5 font-semibold text-slate-700 text-left min-w-[100px]">비고</th>
                        </tr>
                      </thead>
                      <tbody>
                        {activities.length === 0 ? (
                          <tr><td colSpan={9} className="px-2 py-4 text-center text-slate-400">활동 없음. + 활동 추가 버튼을 누르세요.</td></tr>
                        ) : activities.map((a, idx) => {
                          const cost = Number(a.cost) || 0;
                          const sales = Number(a.sales) || 0;
                          const rate = cost > 0 ? +(sales / cost * 100).toFixed(1) : 0;
                          const updateField = (field, value) => {
                            const newArr = activities.map((x, i) => i === idx ? { ...x, [field]: value } : x);
                            updateActivities(newArr);
                          };
                          return (
                            <tr key={a.id || idx} className="border-t border-slate-200 hover:bg-slate-50 group">
                              <td className="px-2 py-1 border-r border-slate-200">
                                <EditableCell value={a.activity || ''} onSave={(v) => updateField('activity', v)} />
                              </td>
                              <td className="px-2 py-1 border-r border-slate-200 text-center">
                                <EditableCell value={a.month || ''} onSave={(v) => updateField('month', v)} />
                              </td>
                              <td className="px-2 py-1 border-r border-slate-200 text-center">
                                <EditableCell value={a.period || ''} onSave={(v) => updateField('period', v)} />
                              </td>
                              <td className="px-2 py-1 border-r border-slate-200">
                                <EditableCell value={a.content || ''} onSave={(v) => updateField('content', v)} />
                              </td>
                              <td className="px-2 py-1 border-r border-slate-200">
                                <EditableCell value={a.result || ''} onSave={(v) => updateField('result', v)} />
                              </td>
                              <td className="px-2 py-1 border-r border-slate-200 text-right">
                                <EditableCell value={cost} type="number" align="right" onSave={(v) => updateField('cost', parseFloat(v) || 0)} />
                              </td>
                              <td className="px-2 py-1 border-r border-slate-200 text-right">
                                <EditableCell value={sales} type="number" align="right" onSave={(v) => updateField('sales', parseFloat(v) || 0)} />
                              </td>
                              <td className={`px-2 py-1 border-r border-slate-200 text-right font-semibold ${rate >= 100 ? 'text-blue-600' : 'text-slate-700'}`}>{rate}%</td>

                                  if (confirm('이 활동을 삭제할까요?')) {
                                    updateActivities(activities.filter((_, i) => i !== idx));
                                  }

                                  <Icon name="x" className="w-3 h-3" />
                                </button>
                              </td>
                            </tr>
                          );

                            <td className="px-2 py-1.5 border-r border-slate-200 text-right">{formatNumber(actSumCost)}</td>
                            <td className="px-2 py-1.5 border-r border-slate-200 text-right">{formatNumber(actSumSales)}</td>
                            <td className={`px-2 py-1.5 border-r border-slate-200 text-right ${actRate >= 100 ? 'text-blue-600' : 'text-slate-700'}`}>{actRate}%</td>
                            <td className="px-2 py-1.5 text-center text-slate-500">-</td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {showChangeLog && (
        <div className="fixed inset-0 bg-black/30 flex items-center justify-center z-50" onClick={() => setShowChangeLog(false)}>
          <div className="bg-white rounded-lg w-[600px] max-h-[80vh] flex flex-col" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center justify-between p-4 border-b border-slate-200">
              <h3 className="font-bold text-slate-900">변경 이력 ({changeLog.length}건)</h3>
              <button onClick={() => setShowChangeLog(false)} className="text-slate-400 hover:text-slate-600"><Icon name="x" className="w-5 h-5" /></button>
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-1 text-sm">
              {changeLog.length === 0 ? (
                <div className="text-center text-slate-400 py-8">변경 이력이 없습니다.</div>
              ) : (
                changeLog.map((log, idx) => (
                  <div key={idx} className="flex items-start gap-3 py-2 border-b border-slate-100">
                    <span className="text-xs text-slate-400 whitespace-nowrap mt-0.5">{log.time}</span>
                    <span className="text-xs font-semibold text-blue-600 whitespace-nowrap">{log.page}</span>
                    <span className="text-xs text-slate-700">{log.detail}</span>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      )}

      {showSyncMsg && (
        <div className="fixed bottom-4 right-4 bg-emerald-600 text-white px-4 py-2 rounded-md shadow-lg flex items-center gap-2 z-50">
          <Icon name="check" className="w-4 h-4" /><span className="text-sm">데이터 동기화 완료</span>
        </div>
      )}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  setTimeout(function(){
    var loading = document.getElementById('loading');
    if (loading) loading.classList.add('hide');
  }, 100);
} catch (err) {
  var box = document.getElementById('error-box');
  box.style.display = 'block';
  box.innerHTML = '<strong>⚠️ 렌더 오류</strong><br>' + err.message;
  document.getElementById('loading').classList.add('hide');
}
</script>
</body>
</html>
