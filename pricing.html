  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
  /* 중국어 문자에 Microsoft YaHei 폰트 적용 */
  :lang(zh), .cn-font {
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
  }
  /* CJK 통합한자 자동 적용을 위한 클래스 */
  .has-cn {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, 'Microsoft YaHei', '微软雅黑', sans-serif;
  }
  .scrollbar-thin::-webkit-scrollbar { height: 8px; width: 8px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: #f1f5f9; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  /* ============================
     컬럼 너비 조절 (resize) 기능
     ============================ */
  table.resizable-table {
    table-layout: fixed;
    width: 100%;
  }
  table.resizable-table th {
    position: relative;
    overflow: hidden;
  }
  /* 컬럼 리사이저 공통 (드래그 핸들) */
  table.resizable-table th .col-resizer {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 5px;
    cursor: col-resize;
    user-select: none;
    background: transparent;
    transition: background-color 0.15s;
    z-index: 10;
  }
  /* 우측 핸들 */
  table.resizable-table th .col-resizer.right {
    right: 0;
  }
  /* 좌측 핸들 */
  table.resizable-table th .col-resizer.left {
    left: 0;
  }
  table.resizable-table th .col-resizer:hover,
  table.resizable-table th .col-resizer.resizing {
    background: #3b82f6;
  }
  /* 우측 인디케이터 */
  table.resizable-table th .col-resizer.right::after {
    content: '';
    position: absolute;
    right: 2px;
    top: 25%;
    bottom: 25%;
    width: 1px;
    background: #cbd5e1;
  }
  /* 좌측 인디케이터 */
  table.resizable-table th .col-resizer.left::after {
    content: '';
    position: absolute;
    left: 2px;
    top: 25%;
    bottom: 25%;
    width: 1px;
    background: #cbd5e1;
  }
  table.resizable-table th:hover .col-resizer::after {
    background: #94a3b8;
  }

<div id="root"></div>

<script>
const {
  useState,
  useEffect,
  useMemo,
  useCallback
} = React;

/* ========================================
   설정값
======================================== */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwjMEou92nRuPu7o5tZtuB9oILA2ymY-jLCtCQwgh2NGqxdcZiKxzBGX2w7iuUbI76tBA/exec';
const STORAGE_KEY = 'pricePolicy_v1';

// ── Google Sheets 연동 (index.html과 동일한 JSONP 읽기 + POST 쓰기) ──
// 읽기: JSONP (CORS 우회) — ?action=loadPricing&callback=...
function gasLoadPricing() {
  return new Promise((resolve, reject) => {
    if (!GAS_URL) {
      reject(new Error('GAS_URL 미설정'));
      return;
    }
    const cbName = '__pricingCb_' + Date.now();
    const script = document.createElement('script');
    let timer;
    window[cbName] = data => {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      if (data && data.error) reject(new Error(data.error));else resolve(data);
    };
    timer = setTimeout(() => {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('Sheets 요청 타임아웃'));
    }, 30000);
    const sep = GAS_URL.includes('?') ? '&' : '?';
    script.src = `${GAS_URL}${sep}action=loadPricing&callback=${cbName}`;
    script.onerror = () => {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('Sheets 연결 실패'));
    };
    document.head.appendChild(script);
  });
}
// 쓰기: POST (text/plain 단순요청으로 CORS preflight 회피)
function gasSavePricing(payload) {
  if (!GAS_URL) return Promise.resolve(false);
  return fetch(GAS_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'text/plain;charset=utf-8'
    },
    body: JSON.stringify({
      action: 'savePricing',
      data: payload
    })
  }).then(() => true).catch(() => false);
}
const DEFAULT_EXCHANGE_RATE = 7.3; // USD → CNY 기본 환율 (수정 가능)
const IMPORT_MARGIN = 1.14; // 입고가 마진 (변경가 × 환율 × 1.14)
const EXCHANGE_RATE_CNY_TO_KRW = 203.9;

/* ========================================
   초기 데이터
======================================== */

// 수출가 정책 - 임플란트, 표준키트, 풀키트, ARi 추가
const INITIAL_EXPORT_PRICES = [{

//   base: "list" = 기본가격(예: ¥431) 기준
const SIM_POLICIES = [{
  id: 1,
  name: "월목표달성(부품)",
  color: "blue",
  base: "step",
  optionMode: "single",

}, {

  color: "blue",
  base: "list",
  optionMode: "product"
  /* 옵션은 제품군에 따라 동적 생성 */
}, {

  }, {

  }]

// 제품군별 특수정책 요율
// AR, BD는 특수정책 미적용 (0)
// ST는 2% (다른 제품 2.5%와 다름)
// EZ는 제품 삭제됨
const SPECIAL_POLICY_RATE = {
  AO: 2.5,
  BD: 0,
  AR: 0,
  ARi: 2.5,
  ST: 2
};

// 키트 카테고리 자동 매핑 (제품군에 따라 사용 가능한 카테고리)
//   각 제품의 표준키트/풀키트가 키트 종류 옵션
function getKitOptions(productGroup, exportPrices) {
  const cats = exportPrices.filter(p => p.group === productGroup).map(p => p.category);
  // 임플란트는 별도, 키트 종류만 추출
  return cats.filter(c => c !== '임플란트');
}
function SimulationPage({
  exportPrices,
  exchangeRate,
  dentalPrices,
  setDentalPrices,
  simHistory,
  setSimHistory,
  setActiveMenu,
  setNegoSource
}) {
  // ---------- 입력 상태 ----------
  const [productGroup, setProductGroup] = useState('AO');
  const [kitCategory, setKitCategory] = useState('표준키트'); // 표준키트 / 풀키트 / 키트
  const [tradeType, setTradeType] = useState('일반치과'); // '일반치과' | 'DSO'
  const [dealerGrade, setDealerGrade] = useState('A');
  const [dsoGrade, setDsoGrade] = useState('S');
  const [showDetail, setShowDetail] = useState(true);
  const [leftCollapsed, setLeftCollapsed] = useState(true); // 좌측 접기/펼치기 (기본 접힘)
  const [showFormulas, setShowFormulas] = useState(false); // 참고 계산식 표시
  const [showStKitConversion, setShowStKitConversion] = useState(false); // ST KIT 전환 참고표
  // 모델별 확정 최종금액 (대리상가격 전용, 독립 저장)
  const [confirmed, setConfirmed] = useState(() => {
    try {
      const s = localStorage.getItem('sim_main_confirmed_v1');
      if (s) return JSON.parse(s);
    } catch (e) {}
    return {};
  });
  useEffect(() => {
    try {
      localStorage.setItem('sim_main_confirmed_v1', JSON.stringify(confirmed));
    } catch (e) {}
  }, [confirmed]);
  const [showBasicInfo, setShowBasicInfo] = useState(false); // 기본 정보 토글 (기본 숨김)
  const [showGP, setShowGP] = useState(true); // 정책환산GP/본사GP 일괄 표시 토글

  // ---------- 정책 활성화/요율 ----------
  const SM_POLICIES = [{
    id: 1,
    name: "월목표달성(부품)",
    color: "blue",
    base: "step",
    optionMode: "single",
    options: [{
      label: "1% 적용",
      value: 1
    }]
  }, {
    id: 2,
    name: "특수정책(현금)",
    color: "blue",
    base: "list",
    optionMode: "product"
  }, {
    id: 3,
    name: "현금결제(현금)",
    color: "blue",
    base: "step",
    optionMode: "single",
    options: [{
      label: "3% 할인",
      value: 3
    }]
  }, {
    id: 4,
    name: "DSO 등급(제품)",
    color: "blue",
    base: "step",
    optionMode: "dso"
  }, {
    id: 5,
    name: "분기리베이트(제품/현금)",
    color: "amber",
    base: "list",
    optionMode: "quarterly",
    options: [{
      label: "4%",
      value: 4
    }, {
      label: "3%",
      value: 3
    }, {
      label: "2%",
      value: 2
    }]
  }, {
    id: 6,
    name: "년간리베이트(현금)",
    color: "amber",
    base: "list",
    optionMode: "yearly",
    options: [{
      label: "3%",
      value: 3
    }, {
      label: "2%",
      value: 2
    }, {
      label: "1%",
      value: 1
    }]
  }, {
    id: 7,
    name: "BD장려(현금)",
    color: "red",
    base: "step",
    optionMode: "bd",
    options: [{
      label: "1%",
      value: 1
    }]
  }];
  const [policyEnabled, setPolicyEnabled] = useState({
    1: true,
    2: true,
    3: true,
    4: false,
    5: true,
    6: true,
    7: false
  });
  const [policyRates, setPolicyRates] = useState({
    1: 1,
    2: 2.5,
    3: 3,
    4: 8,
    5: 4,
    6: 3,
    7: 1
  });
  const [qtrType, setQtrType] = useState('제품'); // 분기리베이트: '제품'(분모) | '현금'(곱셈)
  const [sellOverride, setSellOverride] = useState({}); // 수익성 요약 판매가 수정값

  // ---------- 저장 상태 ----------
  const [showHistoryModal, setShowHistoryModal] = useState(false);
  const [historyTitle, setHistoryTitle] = useState('');
  const [historyNote, setHistoryNote] = useState('');
  const [toast, setToast] = useState(null);

  // ---------- 키트 옵션 (제품군별) ----------
  const kitOptions = useMemo(() => getKitOptions(productGroup, exportPrices), [productGroup, exportPrices]);

  // 제품군 변경 시 키트 카테고리 자동 보정
  useEffect(() => {
    if (kitOptions.length && !kitOptions.includes(kitCategory)) {
      setKitCategory(kitOptions[0]);
    }
  }, [kitOptions]);

  // ---------- 특수정책 요율 자동 적용 (제품군 변경 시) ----------
  useEffect(() => {
    const rate = SPECIAL_POLICY_RATE[productGroup] || 0;
    setPolicyRates(prev => ({
      ...prev,
      2: rate
    }));
    if (rate === 0) {
      setPolicyEnabled(prev => ({
        ...prev,
        2: false
      }));
    } else {
      setPolicyEnabled(prev => ({
        ...prev,
        2: true
      }));
    }
  }, [productGroup]);

  // ---------- 대리상 등급 변경 시 정책 5,6 요율 자동 동기화 + 자동 ON ----------
  //   ST 제품: 분기/연도 미적용 → 정책 5,6 OFF 유지
  //            대신 대리상 등급에 따라 DSO 등급 자동 매핑 (A→S, B→A, C/D→B/C)
  useEffect(() => {
    const g = SIM_DEALER_GRADES.find(d => d.value === dealerGrade);
    if (g) {
      setPolicyRates(prev => ({
        ...prev,
        5: g.qtr,
        6: g.year
      }));
      // ST가 아닌 경우 정책 5, 6 자동 ON (대리상 등급 영향이 보이도록)
      if (productGroup !== 'ST') {
        setPolicyEnabled(prev => ({
          ...prev,
          5: true,
          6: true
        }));
      } else {
        // ST: 대리상 등급에 따라 DSO 등급 자동 매핑
        //   A → S (20%), B → A (15%), C/D → B/C (10%)
        const mappedDsoGrade = ST_DEALER_TO_DSO[dealerGrade];
        if (mappedDsoGrade) {
          setDsoGrade(mappedDsoGrade);
        }
      }
    }
  }, [dealerGrade, productGroup]);

  // ---------- DSO 등급 변경 시 정책 4 요율 자동 동기화 + 정책 4 ON ----------
  //   일반 제품: SIM_DSO_GRADES의 rate (3/5/8%)
  //   ST 제품: ST_DSO_CONFIG의 addRate (10/15/20%)
  //   tradeType이 DSO일 때만 적용, 정책 4도 자동 ON
  useEffect(() => {
    if (tradeType === 'DSO') {
      if (productGroup === 'ST') {
        const stConfig = ST_DSO_CONFIG[dsoGrade];
        if (stConfig) {
          setPolicyRates(prev => ({
            ...prev,
            4: stConfig.addRate
          }));
          setPolicyEnabled(prev => ({
            ...prev,
            4: true
          })); // 명시 ON
        }
      } else {
        const dsoG = SIM_DSO_GRADES.find(d => d.value === dsoGrade);
        if (dsoG) {
          setPolicyRates(prev => ({
            ...prev,
            4: dsoG.rate
          }));
          setPolicyEnabled(prev => ({
            ...prev,
            4: true
          })); // 명시 ON
        }
      }
    }
  }, [dsoGrade, tradeType, productGroup]);

  // ---------- 거래 유형 변경 시 정책 4 활성화 토글 ----------
  useEffect(() => {
    setPolicyEnabled(prev => ({
      ...prev,
      4: tradeType === 'DSO'
    }));
  }, [tradeType]);

  // ---------- ST 제품은 일반치과 미공급 → 자동으로 DSO로 변경 ----------
  useEffect(() => {
    if (productGroup === 'ST' && tradeType !== 'DSO') {
      setTradeType('DSO');
    }
  }, [productGroup]);

  // ---------- ST 제품 선택 시 일부 정책 자동 비활성화 ----------
  //   ST 정책 구조:
  //     ✓ 정책 ② 특수정책 (2%) - ST 전용 요율
  //     ✓ 정책 ③ 현금결제 (3%)
  //     ✓ 정책 ④ DSO 추가증정 (S 20% / A 15% / B/C 10%)
  //   비활성화:
  //     ✗ 정책 ① 월목표달성
  //     ✗ 정책 ⑤ 분기 리베이트
  //     ✗ 정책 ⑥ 연도 리베이트
  useEffect(() => {
    if (productGroup === 'ST') {
      setPolicyEnabled(prev => ({
        ...prev,
        1: true,
        // 월목표달성(부품) ON (1%)
        2: true,
        // 특수정책 ON (2%)
        3: true,
        // 현금결제 ON
        4: true,
        // DSO 추가증정 ON (중요: 명시 ON)
        5: false,
        // 분기 리베이트 OFF
        6: false // 연도 리베이트 OFF
      }));
      // ST 특수정책 요율 2% 자동 적용 (다른 제품은 2.5%)
      // ST DSO 추가증정 요율은 dsoGrade에 따라 별도 useEffect에서 동기화 (10/15/20%)
      setPolicyRates(prev => ({
        ...prev,
        1: 1,
        // 월목표달성 1%
        2: 2,
        // 특수정책 2%
        3: 3 // 현금결제 3%
      }));
    } else {
      // ST가 아니면 다른 제품의 기본 특수정책 요율 적용 (SPECIAL_POLICY_RATE)
      const defaultRate = SPECIAL_POLICY_RATE[productGroup];
      if (defaultRate !== undefined) {
        setPolicyRates(prev => ({
          ...prev,
          2: defaultRate
        }));
        // 특수정책 0%인 제품(AR, BD)은 OFF
        setPolicyEnabled(prev => ({
          ...prev,
          2: defaultRate > 0
        }));
      }
    }
  }, [productGroup]);

  // ---------- BD 제품 선택 시 BD장려금(정책 7번) 자동 활성화 ----------
  //   BD 외 제품은 정책 7번 자동 비활성화
  useEffect(() => {
    if (productGroup === 'BD') {
      setPolicyEnabled(prev => ({
        ...prev,
        7: true
      }));
      setPolicyRates(prev => ({
        ...prev,
        7: 1
      })); // BD장려 1% 고정
    } else {
      setPolicyEnabled(prev => ({
        ...prev,
        7: false
      }));
    }
  }, [productGroup]);

  // ---------- 핵심 가격 데이터 계산 ----------
  //   listPrice (기본가격) = SIM_LIST_PRICES (제품군별 권장 소비자가)
  //   applyRate (적용률)   = PRICE_POLICY_MARGIN
  //   supplyBase (공급가)  = listPrice / (1 + applyRate/100)
  //   listPriceMin/Max     = DENTAL_RECOMMENDED_PRICES (대리상 판매 권장가 범위, 수익성 요약표용)
  //   kitCost (키트 원가)  = exportPrices 의 selectedProduct.changeUSD × 환율 × 1.14 (입고가)
  const priceData = useMemo(() => {
    const applyRate = PRICE_POLICY_MARGIN[productGroup] || 30;
    const listPrice = SIM_LIST_PRICES[productGroup] || 0; // 시뮬레이션 전용 기본가격
    const supplyBase = listPrice > 0 ? Math.round(listPrice / (1 + applyRate / 100)) : 0;

    // 대리상 판매 권장가 범위 (수익성 요약표에 표시용)
    const dentalArr = dentalPrices[productGroup] && dentalPrices[productGroup][kitCategory] || [0, 0];
    const listPriceMin = dentalArr[0] || 0;
    const listPriceMax = dentalArr[dentalArr.length - 1] || 0;

    // 키트 원가 (CNY) = changeUSD × 환율 × 입고마진
    const selectedKit = exportPrices.find(p => p.group === productGroup && p.category === kitCategory);
    const kitCost = selectedKit ? Math.round(selectedKit.changeUSD * exchangeRate * IMPORT_MARGIN) : 0;
    return {
      applyRate,
      listPrice,
      listPriceMin,
      listPriceMax,
      supplyBase,
      kitCost,
      selectedKit
    };
  }, [productGroup, kitCategory, dentalPrices, exportPrices, exchangeRate]);

  // ---------- 계산 로직 (새 수식 체계) ----------
  // 정책별 계산 방식:
  //   ① 월목표달성 (denominator) → 분모에 % 추가
  //   ② 특수정책 (subtract_amount) → 기준가에서 금액 차감 (¥431 × 2.5% 등)
  //   ③ 현금결제 (multiply, 97折) → 곱셈 ×(1-3%) = ×97%
  //   ④ DSO 등급 (denominator) → 분모에 % 추가
  //   ⑤ 분기 (denominator) → 분모에 % 추가
  //   ⑥ 연도 (multiply) → 곱셈 ×(1-연도%)
  //      BD 제품일 경우: 연도+BD장려 묶어서 ×(1-연도%-BD장려%)
  //   ⑦ BD장려 (combined with 연도) → 별도 단계 없이 연도와 묶어서 처리
  //
  // 수식 예 (AO A등급 / 모든 정책 활성화):
  //   초기: 431
  //   ① 35%(기본) + 1%(목표): 431 / (1+0.35+0.01) = 317
  //   ② 특수 2.5%: (431 - 431×0.025) / (1+0.36) = 309
  //   ③ 현금 97折: (431 - 431×0.025) × 0.97 / (1+0.36) = 300
  //   ④ DSO 8%: (431 - 431×0.025) × 0.97 / (1+0.36+0.08) = ...
  //   ⑤ 분기 4%: (431 - 431×0.025) × 0.97 / (1+0.36+0.08+0.04) = 291 (DSO 없을 시)
  //   ⑥ 연도 3%: 위 값 × (1-0.03) = 282
  //   ⑦ BD장려 1%: BD제품인 경우 연도와 묶어서 (1-0.03-0.01) = 위 값 × 0.96

  const calculation = useMemo(() => {
    const {
      listPrice,
      supplyBase,
      kitCost,
      applyRate
    } = priceData;
    if (supplyBase <= 0 || listPrice <= 0) {
      return {
        steps: [],
        finalPrice: 0,
        totalDiscount: 0,
        totalDiscountRate: 0,
        appliedCount: 0,
        finalGP: 0,
        gpAvailable: false
      };
    }

    // ─────────────────────────────────────────────────
    // 정책환산GP 계산
    //   공식: GP = 1 - 정책반영원가 ÷ 정책반영기준가
    //   정책반영원가 = (임플란트원가 + KIT원가/KIT기준) × (1 + 제품증정 + 목표달성)
    //   정책반영기준가 = 단계별로 다름 (431, 431-10.8, ×97%, ×(1-연도%) 등)
    // ─────────────────────────────────────────────────
    const costData = SIM_COST_DATA[productGroup];
    const kitInfo = costData?.kits?.[kitCategory];
    const gpAvailable = !!(costData && kitInfo); // 원가 데이터 있을 때만 GP 계산

    // 환산원가 기본값 (제품증정/목표달성 미적용 시)
    const baseUnitCost = gpAvailable ? costData.implantCost + kitInfo.kitCost / kitInfo.kitRatio : 0;

    // 각 단계별 GP 계산 함수
    //   ratedCostMultiplier: 원가 환산배수 (1 + 제품증정 + 목표달성)
    //   refBasePrice: 정책반영 기준가 (분모)
    const calcGP = (refBasePrice, ratedCostMultiplier) => {
      if (!gpAvailable || refBasePrice <= 0) return null;
      const ratedCost = baseUnitCost * ratedCostMultiplier;
      return (1 - ratedCost / refBasePrice) * 100;
    };
    const steps = [];

    // 단계 0: 초기 기준가
    steps.push({
      step: 0,
      name: "초기 기준가",
      rate: null,
      basePrice: listPrice,
      discount: null,
      finalPrice: listPrice,
      gp: null,
      // 단계 0은 GP 없음
      method: 'base'
    });
    const r1_target = policyEnabled[1] ? policyRates[1] / 100 : 0;
    const r2_special = policyEnabled[2] ? policyRates[2] / 100 : 0;
    const r3_cash = policyEnabled[3] ? policyRates[3] / 100 : 0;
    const r4_dso = productGroup === 'ST' || policyEnabled[4] ? policyRates[4] / 100 : 0;
    const r5_qtr = policyEnabled[5] ? policyRates[5] / 100 : 0;
    const r6_year = policyEnabled[6] ? policyRates[6] / 100 : 0;
    const r7_bd = policyEnabled[7] ? policyRates[7] / 100 : 0;
    const baseRate = applyRate / 100;
    let denom = 1 + baseRate;
    let numerator = listPrice;
    let multiplier = 1;

    // GP 계산용: 정책반영기준가 추적
    let gpRefBase = listPrice; // 분모 기준가 (특수정책에서 reduce, 곱셈에서 multiply)
    let costMultiplier = 1 + baseRate; // 원가 환산배수 (제품증정 + 목표달성)

    // 단계 1: 제품증정 35% (기본 공급가)
    let cur = numerator / denom;
    steps.push({
      step: 1,
      name: `제품증정 ${(baseRate * 100).toFixed(0)}%`,
      rate: baseRate * 100,
      basePrice: listPrice,
      discount: Math.round((listPrice - cur) * 10) / 10,
      finalPrice: Math.round(cur),
      gp: calcGP(gpRefBase, costMultiplier),
      method: 'denominator'

  });
  rows += `<tr></tr><tr><td colspan="6" style="font-weight:bold;background:#eef2ff;">가격 시뮬레이션</td></tr>`;
  rows += `<tr><td><b>단계</b></td><td><b>정책/항목</b></td><td><b>적용률</b></td><td><b>기준가</b></td><td><b>할인금액</b></td><td><b>공급가</b></td></tr>`;
  d.simSteps.forEach(s => {
    rows += `<tr><td>${s.step}</td><td>${esc(s.name)}</td><td>${s.rate == null ? '' : s.rate + '%'}</td><td>${s.basePrice}</td><td>${s.discount ? -s.discount : ''}</td><td>${s.finalPrice}</td></tr>`;
  });
  rows += `<tr></tr><tr><td colspan="6" style="font-weight:bold;background:#eef2ff;">KPI</td></tr>`;
  rows += `<tr><td>최종 공급가</td><td>${d.kpi.finalPrice}</td><td>총 할인율</td><td>${(d.kpi.totalDiscountRate || 0).toFixed(2)}%</td><td>적용 정책 수</td><td>${d.kpi.appliedCount}개</td></tr>`;
  rows += `<tr><td>총 할인금액</td><td>${-d.kpi.totalDiscount}</td></tr>`;
  rows += `<tr></tr><tr><td colspan="6" style="font-weight:bold;background:#eef2ff;">대리상 수익성 요약 (${isDSO ? 'DSO치과' : '일반치과'})</td></tr>`;
  rows += isDSO ? `<tr><td><b>DSO등급</b></td><td><b>대리상등급</b></td><td><b>판매가</b></td><td><b>최종공급가</b></td><td><b>대리상수익</b></td><td><b>마진율</b></td></tr>` : `<tr><td><b>대리상등급</b></td><td><b>판매가</b></td><td><b>최종공급가</b></td><td><b>대리상수익</b></td><td><b>마진율</b></td></tr>`;
  d.profitRows.forEach(r => {
    rows += isDSO ? `<tr><td>${esc(r.dsoGrade)}</td><td>${r.dealerGrade}급</td><td>${r.sellPrice}</td><td>${r.supply}</td><td>${r.profit}</td><td>${r.margin.toFixed(1)}%</td></tr>` : `<tr><td>${r.dealerGrade}급</td><td>${r.sellPrice}</td><td>${r.supply}</td><td>${r.profit}</td><td>${r.margin.toFixed(1)}%</td></tr>`;
  });
  const table = `<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body><table border="1">${rows}</table></body></html>`;
  const blob = new Blob(['\ufeff' + table], {
    type: 'application/vnd.ms-excel;charset=utf-8'
  });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `江苏澍康_리포트_${d.productGroup}_${d.tradeLabel}_${new Date().toISOString().slice(0, 10)}.xls`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  useEffect(() => {
    if (tradeType !== 'DSO') {
      setPolicyEnabled(prev => prev[4] ? {
        ...prev,
        4: false
      } : prev);
    }
  }, [tradeType]);
  // ---------- BD 제품 선택 시 BD장려금(정책 7번) 자동 활성화 ----------
  //   BD 외 제품은 정책 7번 자동 비활성화
  useEffect(() => {
    if (productGroup === 'BD') {
      setPolicyEnabled(prev => ({
        ...prev,
        7: true
      }));
      setPolicyRates(prev => ({
        ...prev,
        7: 1
      })); // BD장려 1% 고정
    } else {
      setPolicyEnabled(prev => ({
        ...prev,
        7: false
      }));
    }
  }, [productGroup]);

  // ---------- 핵심 가격 데이터 계산 ----------
  //   listPrice (기본가격) = SIM_LIST_PRICES (제품군별 권장 소비자가)
  //   applyRate (적용률)   = PRICE_POLICY_MARGIN
  //   supplyBase (공급가)  = listPrice / (1 + applyRate/100)
  //   listPriceMin/Max     = DENTAL_RECOMMENDED_PRICES (대리상 판매 권장가 범위, 수익성 요약표용)
  //   kitCost (키트 원가)  = exportPrices 의 selectedProduct.changeUSD × 환율 × 1.14 (입고가)
  const priceData = useMemo(() => {
    const applyRate = PRICE_POLICY_MARGIN[productGroup] || 30;
    const listPrice = SIM_LIST_PRICES[productGroup] || 0; // 시뮬레이션 전용 기본가격
    const supplyBase = listPrice > 0 ? Math.round(listPrice / (1 + applyRate / 100)) : 0;

    // 대리상 판매 권장가 범위 (수익성 요약표에 표시용)
    const dentalArr = dentalPrices[productGroup] && dentalPrices[productGroup][kitCategory] || [0, 0];
    const listPriceMin = dentalArr[0] || 0;
    const listPriceMax = dentalArr[dentalArr.length - 1] || 0;

    // 키트 원가 (CNY) = changeUSD × 환율 × 입고마진
    const selectedKit = exportPrices.find(p => p.group === productGroup && p.category === kitCategory);
    const kitCost = selectedKit ? Math.round(selectedKit.changeUSD * exchangeRate * IMPORT_MARGIN) : 0;
    return {
      applyRate,
      listPrice,
      listPriceMin,
      listPriceMax,
      supplyBase,
      kitCost,
      selectedKit
    };
  }, [productGroup, kitCategory, dentalPrices, exportPrices, exchangeRate]);

  // ---------- 계산 로직 (새 수식 체계) ----------
  // 정책별 계산 방식:
  //   ① 월목표달성 (denominator) → 분모에 % 추가
  //   ② 특수정책 (subtract_amount) → 기준가에서 금액 차감 (¥431 × 2.5% 등)
  //   ③ 현금결제 (multiply, 97折) → 곱셈 ×(1-3%) = ×97%
  //   ④ DSO 등급 (denominator) → 분모에 % 추가
  //   ⑤ 분기 (denominator) → 분모에 % 추가
  //   ⑥ 연도 (multiply) → 곱셈 ×(1-연도%)
  //      BD 제품일 경우: 연도+BD장려 묶어서 ×(1-연도%-BD장려%)
  //   ⑦ BD장려 (combined with 연도) → 별도 단계 없이 연도와 묶어서 처리
  //
  // 수식 예 (AO A등급 / 모든 정책 활성화):
  //   초기: 431
  //   ① 35%(기본) + 1%(목표): 431 / (1+0.35+0.01) = 317
  //   ② 특수 2.5%: (431 - 431×0.025) / (1+0.36) = 309
  //   ③ 현금 97折: (431 - 431×0.025) × 0.97 / (1+0.36) = 300
  //   ④ DSO 8%: (431 - 431×0.025) × 0.97 / (1+0.36+0.08) = ...
  //   ⑤ 분기 4%: (431 - 431×0.025) × 0.97 / (1+0.36+0.08+0.04) = 291 (DSO 없을 시)
  //   ⑥ 연도 3%: 위 값 × (1-0.03) = 282
  //   ⑦ BD장려 1%: BD제품인 경우 연도와 묶어서 (1-0.03-0.01) = 위 값 × 0.96

  const calculation = useMemo(() => {
    const {
      listPrice,
      supplyBase,
      kitCost,
      applyRate
    } = priceData;
    if (supplyBase <= 0 || listPrice <= 0) {
      return {
        steps: [],
        finalPrice: 0,
        totalDiscount: 0,
        totalDiscountRate: 0,
        appliedCount: 0,
        finalGP: 0,
        gpAvailable: false
      };
    }

    // ─────────────────────────────────────────────────
    // 정책환산GP 계산
    //   공식: GP = 1 - 정책반영원가 ÷ 정책반영기준가
    //   정책반영원가 = (임플란트원가 + KIT원가/KIT기준) × (1 + 제품증정 + 목표달성)
    //   정책반영기준가 = 단계별로 다름 (431, 431-10.8, ×97%, ×(1-연도%) 등)
    // ─────────────────────────────────────────────────
    const costData = SIM_COST_DATA[productGroup];
    const kitInfo = costData?.kits?.[kitCategory];
    const gpAvailable = !!(costData && kitInfo); // 원가 데이터 있을 때만 GP 계산

    // 환산원가 기본값 (제품증정/목표달성 미적용 시)
    const baseUnitCost = gpAvailable ? costData.implantCost + kitInfo.kitCost / kitInfo.kitRatio : 0;

    // 각 단계별 GP 계산 함수
    //   ratedCostMultiplier: 원가 환산배수 (1 + 제품증정 + 목표달성)
    //   refBasePrice: 정책반영 기준가 (분모)
    const calcGP = (refBasePrice, ratedCostMultiplier) => {
      if (!gpAvailable || refBasePrice <= 0) return null;
      const ratedCost = baseUnitCost * ratedCostMultiplier;
      return (1 - ratedCost / refBasePrice) * 100;
    };
    const steps = [];

    // 단계 0: 초기 기준가
    steps.push({
      step: 0,
      name: "초기 기준가",
      rate: null,
      basePrice: listPrice,
      discount: null,
      finalPrice: listPrice,
      gp: null,
      // 단계 0은 GP 없음
      method: 'base'
    });
    const r1_target = policyEnabled[1] ? policyRates[1] / 100 : 0;
    const r2_special = policyEnabled[2] ? policyRates[2] / 100 : 0;
    const r3_cash = policyEnabled[3] ? policyRates[3] / 100 : 0;
    const r4_dso = policyEnabled[4] ? policyRates[4] / 100 : 0;
    const r5_qtr = policyEnabled[5] ? policyRates[5] / 100 : 0;
    const r6_year = policyEnabled[6] ? policyRates[6] / 100 : 0;
    const r7_bd = policyEnabled[7] ? policyRates[7] / 100 : 0;
    const r8_nextreb = policyEnabled[8] && productGroup !== 'AO' ? policyRates[8] / 100 : 0; // %형 익월리베이트(ST 등)
    const r8_flat = policyEnabled[8] && productGroup === 'AO' ? policyRates[8] || 0 : 0; // 정액 익월리베이트(AO, 위안/EA)
    const r9_special = policyEnabled[9] ? policyRates[9] / 100 : 0; // 특별적용(97% = 3% 차감, 곱셈)
    const baseRate = applyRate / 100;
    let denom = 1 + baseRate;
    let numerator = listPrice;
    let multiplier = 1;
    let flatDeduct = 0; // 정액 차감 누적(익월 정액 등)

    // GP 계산용: 정책반영기준가 추적
    let gpRefBase = listPrice; // 분모 기준가 (특수정책에서 reduce, 곱셈에서 multiply)
    let costMultiplier = 1 + baseRate; // 원가 환산배수 (제품증정 + 목표달성)

    // 단계 1: 제품증정 35% (기본 공급가)
    let cur = numerator / denom;
    steps.push({
      step: 1,
      name: `기본증정(제품) ${(baseRate * 100).toFixed(0)}%`,
      rate: baseRate * 100,
      basePrice: listPrice,
      discount: Math.round((listPrice - cur) * 10) / 10,
      finalPrice: Math.round(cur),
      gp: calcGP(gpRefBase, costMultiplier),
      method: 'denominator'
    });
    let appliedCount = 0;

    // 단계 2: 월목표달성 (분모 더하기)
    if (policyEnabled[1]) {
      denom += r1_target;
      costMultiplier += r1_target; // 원가도 함께 증가
      const before = cur;
      cur = numerator / denom;
      appliedCount += 1;
      steps.push({
        step: 1 + appliedCount,
        name: `월목표달성(부품) ${(r1_target * 100).toFixed(0)}%`,
        rate: r1_target * 100,
        basePrice: before,
        discount: Math.round((before - cur) * 10) / 10,
        finalPrice: Math.round(cur),
        gp: calcGP(gpRefBase, costMultiplier),
        method: 'denominator'
      });
    }

    // ─────────────────────────────────────────────────
    // 단계 3 & 4: 특수정책 ↔ DSO 순서
    // - 일반 제품(AO/AR/BD/ARi): 특수정책 → DSO
    // - ST 제품: DSO 추가증정 → 특수정책 (ST 전용 순서)
    //   ST는 첨부 4번 표에 따라 65% → DSO 추가증정 → 특수격려 → 현금결제 순서
    // ─────────────────────────────────────────────────
    const applySpecialPolicy = () => {
      if (policyEnabled[2]) {
        const amount = listPrice * r2_special;
        numerator = listPrice - amount;
        gpRefBase = gpRefBase - amount; // GP 분모도 감소
        const before = cur;
        cur = numerator / denom;
        appliedCount += 1;
        steps.push({
          step: 1 + appliedCount,
          name: `특수정책(현금) ${r2_special * 100}%`,
          rate: r2_special * 100,
          basePrice: before,
          discount: Math.round((before - cur) * 10) / 10,
          finalPrice: Math.round(cur),
          gp: calcGP(gpRefBase, costMultiplier),
          method: 'subtract_amount',
          returnAmount: Math.round(amount * 10) / 10
        });
      }
    };
    const applyDsoPolicy = () => {
      // ST 제품은 정책 4 ON/OFF와 무관하게 DSO 추가증정 항상 적용
      // 일반 제품은 정책 4가 ON일 때만 적용
      const shouldApply = tradeType === 'DSO' && policyEnabled[4];
      if (shouldApply) {
        denom += r4_dso;
        costMultiplier += r4_dso;
        const before = cur;
        cur = numerator / denom * multiplier - flatDeduct;
        appliedCount += 1;
        steps.push({
          step: 1 + appliedCount,
          name: productGroup === 'ST' ? `DSO 추가증정 ${(r4_dso * 100).toFixed(0)}%` : `DSO 등급 ${(r4_dso * 100).toFixed(0)}%`,
          rate: r4_dso * 100,
          basePrice: before,
          discount: Math.round((before - cur) * 10) / 10,
          finalPrice: Math.round(cur),
          gp: calcGP(gpRefBase, costMultiplier),
          method: 'denominator'
        });
      }
    };

    // 특수정책만 먼저 적용 (DSO는 분기리베이트 앞에서 적용)
    applySpecialPolicy();

    // 단계 5: 현금결제 97折 (곱셈) - GP 분모도 곱셈
    if (policyEnabled[3]) {
      multiplier *= 1 - r3_cash;
      gpRefBase = gpRefBase * (1 - r3_cash);
      const before = cur;
      cur = numerator / denom * multiplier;
      appliedCount += 1;
      steps.push({
        step: 1 + appliedCount,
        name: `현금결제(현금) 3%`,
        rate: r3_cash * 100,
        basePrice: before,
        discount: Math.round((before - cur) * 10) / 10,
        finalPrice: Math.round(cur),
        gp: calcGP(gpRefBase, costMultiplier),
        method: 'multiply'
      });
    }

    // 단계: 특별적용 (10만위안 주문시 97%, 곱셈) - AO 전용
    if (policyEnabled[9]) {
      multiplier *= 1 - r9_special;
      gpRefBase = gpRefBase * (1 - r9_special);
      const before = cur;
      cur = numerator / denom * multiplier;
      appliedCount += 1;
      steps.push({
        step: 1 + appliedCount,
        name: `특별적용(10만위안 주문시) ${(100 - r9_special * 100).toFixed(0)}%`,
        rate: r9_special * 100,
        basePrice: before,
        discount: Math.round((before - cur) * 10) / 10,
        finalPrice: Math.round(cur),
        gp: calcGP(gpRefBase, costMultiplier),
        method: 'multiply'
      });
    }

    // 단계: 익월리베이트 (ST=현금 %곱셈 / AO=정액 위안 차감)
    if (policyEnabled[8]) {
      const before = cur;
      if (productGroup === 'AO') {
        // 정액: EA당 r8_flat 위안 차감 (이후 곱셈 단계에도 유지되도록 flatDeduct 누적)
        flatDeduct += r8_flat;
        cur = numerator / denom * multiplier - flatDeduct;
        appliedCount += 1;
        steps.push({
          step: 1 + appliedCount,
          name: `익월리베이트(현금) ${r8_flat}위안/EA`,
          rate: null,
          basePrice: before,
          discount: Math.round((before - cur) * 10) / 10,
          finalPrice: Math.round(cur),
          gp: calcGP(gpRefBase, costMultiplier),
          method: 'subtract_amount'
        });
      } else {
        multiplier *= 1 - r8_nextreb;
        gpRefBase = gpRefBase * (1 - r8_nextreb);
        cur = numerator / denom * multiplier - flatDeduct;
        appliedCount += 1;
        steps.push({
          step: 1 + appliedCount,
          name: `익월리베이트(현금) ${(r8_nextreb * 100).toFixed(0)}%`,
          rate: r8_nextreb * 100,
          basePrice: before,
          discount: Math.round((before - cur) * 10) / 10,
          finalPrice: Math.round(cur),
          gp: calcGP(gpRefBase, costMultiplier),
          method: 'multiply'
        });
      }
    }

    // DSO 등급 적용 (특별적용·익월 다음, 분기리베이트 앞)
    applyDsoPolicy();

    // 단계 6: 분기 리베이트 — 제품(분모) 또는 현금(곱셈)
    if (policyEnabled[5]) {
      const before = cur;
      if (qtrType === '현금') {
        multiplier *= 1 - r5_qtr;
        gpRefBase = gpRefBase * (1 - r5_qtr);
        cur = numerator / denom * multiplier - flatDeduct;
      } else {
        denom += r5_qtr;
        costMultiplier += r5_qtr;
        cur = numerator / denom * multiplier - flatDeduct;
      }
      appliedCount += 1;
      steps.push({
        step: 1 + appliedCount,
        name: `분기리베이트(${qtrType}) ${(r5_qtr * 100).toFixed(0)}%`,
        rate: r5_qtr * 100,
        basePrice: before,
        discount: Math.round((before - cur) * 10) / 10,
        finalPrice: Math.round(cur),
        gp: calcGP(gpRefBase, costMultiplier),
        method: qtrType === '현금' ? 'multiply' : 'denominator'
      });
    }

    // 단계 7: 년간리베이트 (곱셈) - GP 분모도 곱셈
    if (policyEnabled[6]) {
      multiplier *= 1 - r6_year;
      gpRefBase = gpRefBase * (1 - r6_year);
      const before = cur;
      cur = numerator / denom * multiplier - flatDeduct;
      appliedCount += 1;
      steps.push({
        step: 1 + appliedCount,
        name: `년간리베이트(현금) ${(r6_year * 100).toFixed(0)}%`,
        rate: r6_year * 100,
        basePrice: before,
        discount: Math.round((before - cur) * 10) / 10,
        finalPrice: Math.round(cur),
        gp: calcGP(gpRefBase, costMultiplier),
        method: 'multiply'
      });
    }

    // 단계 8: BD장려 (곱셈) - 별도 단계
    if (policyEnabled[7]) {
      multiplier *= 1 - r7_bd;
      gpRefBase = gpRefBase * (1 - r7_bd);
      const before = cur;
      cur = numerator / denom * multiplier - flatDeduct;
      appliedCount += 1;
      steps.push({
        step: 1 + appliedCount,
        name: `BD장려(현금) ${(r7_bd * 100).toFixed(0)}%`,
        rate: r7_bd * 100,
        basePrice: before,
        discount: Math.round((before - cur) * 10) / 10,
        finalPrice: Math.round(cur),
        gp: calcGP(gpRefBase, costMultiplier),
        method: 'multiply'
      });
    }
    const finalPrice = Math.round(cur);
    const totalDiscount = Math.round((supplyBase - finalPrice) * 10) / 10;
    const totalDiscountRate = totalDiscount / supplyBase * 100;
    const finalGP = calcGP(gpRefBase, costMultiplier);
    return {
      steps,
      finalPrice,
      totalDiscount,
      totalDiscountRate,
      appliedCount,
      finalGP,
      gpAvailable
    };
  }, [priceData, policyEnabled, policyRates, productGroup, kitCategory, tradeType, qtrType]);

  // ---------- 대리상 수익성 요약 (첨부 양식: 거래유형별 분기) ----------
  // 일반치과: 대리상 등급(A/B/C/D) × 판매가(330/350) = 8행
  // DSO치과:  DSO등급(S/A/B/C) × 대리상등급(A/B/C/D) = 12행
  //
  // 첨부 7번 핵심 공식:
  //   공급가는 기준가에서 특수격려 반환금을 차감한 뒤, 제품증정+목표달성+DSO+분기를
  //   분모에 반영하여 계산하고, 현금결제(97折) 후 연도 리베이트를 현금성 차감으로 적용.
  //
  //   최종 공급가 = (기준가-반환금) × 97% / (1+제품증정+목표달성+DSO+분기) × (1-연도)
  //
  //   본사 GP (정책환산):
  //     원가 환산 = baseUnitCost × (1+제품증정+목표달성+DSO+분기)
  //     분모 (정책반영기준가) = (기준가-반환금) × 97% × (1-연도)
  //     GP = 1 - 원가환산 / 분모
  //
  //   대리상 수익 = 판매가 - 공급가
  //   대리상 마진율 = 수익 / 판매가
  //
  //   ※ 수익성 요약표는 정책 표준 시나리오로 항상 계산:
  //      - 목표달성 1%, 특수격려, 현금결제 97折 항상 적용
  //      - 분기/연도 리베이트는 대리상 등급에 따라 자동 적용
  const profitSummary = useMemo(() => {
    const {
      listPrice,
      applyRate
    } = priceData;
    if (listPrice <= 0) return {
      type: 'none',
      rows: []
    };

    // 표준 시나리오 정책률
    //   ST: 월목표/특수/분기/연도 모두 미적용 → r1_target=0, specialRate=0, qtrRate=0, yearRate=0
    //   다른 제품: 표준 정책 적용
    const isST = productGroup === 'ST';
    const r1_target = isST ? 0 : 0.01; // 월목표달성 (ST는 0)
    const r3_cash = 0.03; // 현금결제 3% (97折, 항상 적용)
    const baseRate = applyRate / 100;

    // 제품군별 특수정책 요율 (ST는 0)
    const specialRate = isST ? 0 : (SPECIAL_POLICY_RATE[productGroup] || 0) / 100;
    const refundAmount = listPrice * specialRate;
    const adjusted = (listPrice - refundAmount) * (1 - r3_cash);

    // 환산원가 데이터
    const costData = SIM_COST_DATA[productGroup];
    const kitInfo = costData?.kits?.[kitCategory];
    const gpAvailable = !!(costData && kitInfo);

    // 공통 계산 함수
    //   dsoRate: DSO 정책률 (0이면 일반치과)
    //   dealerG: 대리상 등급 객체 ({qtr, year, bdBonus})
    //   sellPrice: 판매가 기준
    const calcRow = (dsoRate, dealerG, sellPrice) => {
      // 위에서 선택/조정한 정책의 최종 공급가·GP를 그대로 반영
      const supply = Math.round(calculation.finalPrice);
      const hqGP = calculation.finalGP;
      const profit = sellPrice - supply;
      const margin = sellPrice > 0 ? profit / sellPrice * 100 : 0;
      return {
        supply,
        hqGP,
        profit,
        margin

function CorpSimPage({
  exportPrices,
  exchangeRate,
  dentalPrices,
  setDentalPrices,
  simHistory,
  setSimHistory,
  setActiveMenu,
  setNegoSource
}) {
  // ---------- 입력 상태 ----------
  const [productGroup, setProductGroup] = useState('AO');
  const [kitCategory, setKitCategory] = useState('标准配套'); // 标准配套 / 全套配套 / 키트
  const [tradeType, setTradeType] = useState('普通牙科'); // '普通牙科' | 'DSO'
  const [dealerGrade, setDealerGrade] = useState('A');
  const [dsoGrade, setDsoGrade] = useState('S');
  const [showDetail, setShowDetail] = useState(true);
  const [leftCollapsed, setLeftCollapsed] = useState(true); // 좌측 접기/展开 (기본 접힘)
  const [showFormulas, setShowFormulas] = useState(false); // 参考 计算公式 표시
  const [showStKitConversion, setShowStKitConversion] = useState(false); // ST KIT 전환 参考표
  // 各型号确定最终金额 (대리상가격 전용, 독립 저장)
  const [confirmed, setConfirmed] = useState(() => {
    try {
      const s = localStorage.getItem('corp_confirmed_v1');
      if (s) return JSON.parse(s);
    } catch (e) {}
    return {};
  });
  useEffect(() => {
    try {
      localStorage.setItem('corp_confirmed_v1', JSON.stringify(confirmed));
    } catch (e) {}
  }, [confirmed]);
  const [showBasicInfo, setShowBasicInfo] = useState(false); // 基本信息 토글 (기본 숨김)
  const [showGP, setShowGP] = useState(true); // 政策换算GP/总部GP 일괄 표시 토글

  // ---------- 정책 활성화/요율 ----------
  const SM_POLICIES = [{
    id: 1,
    name: "月目标达成(配件)",
    color: "blue",
    base: "step",
    optionMode: "single",
    options: [{
      label: "1% 适用",
      value: 1
    }]
  }, {
    id: 2,
    name: "特殊政策(现金)",
    color: "blue",
    base: "list",
    optionMode: "product"
  }, {
    id: 3,
    name: "现金结算(现金)",
    color: "blue",
    base: "step",
    optionMode: "single",
    options: [{
      label: "3% 折扣",
      value: 3
    }]
  }, {
    id: 4,
    name: "DSO等级(제품)",
    color: "blue",
    base: "step",
    optionMode: "dso"
  }, {
    id: 5,
    name: "季度返利(产品/现金)",
    color: "amber",
    base: "list",
    optionMode: "quarterly",
    options: [{
      label: "4%",
      value: 4
    }, {
      label: "3%",
      value: 3
    }, {
      label: "2%",
      value: 2
    }]
  }, {
    id: 6,
    name: "年度返利(现金)",
    color: "amber",
    base: "list",
    optionMode: "yearly",
    options: [{
      label: "3%",
      value: 3
    }, {
      label: "2%",
      value: 2
    }, {
      label: "1%",
      value: 1
    }]
  }, {
    id: 7,
    name: "BD奖励(现金)",
    color: "red",
    base: "step",
    optionMode: "bd",
    options: [{
      label: "1%",
      value: 1
    }]
  }];
  const [policyEnabled, setPolicyEnabled] = useState({
    1: true,
    2: true,
    3: true,
    4: false,
    5: true,
    6: true,
    7: false
  });
  const [policyRates, setPolicyRates] = useState({
    1: 1,
    2: 2.5,
    3: 3,
    4: 8,
    5: 4,
    6: 3,
    7: 1
  });
  const [qtrType, setQtrType] = useState('제품'); // 季度返利: '제품'(분모) | '현금'(곱셈)
  const [sellOverride, setSellOverride] = useState({}); // 收益汇总 판매가 수정값

  // ---------- 저장 상태 ----------
  const [showHistoryModal, setShowHistoryModal] = useState(false);
  const [historyTitle, setHistoryTitle] = useState('');
  const [historyNote, setHistoryNote] = useState('');
  const [toast, setToast] = useState(null);

  // ---------- 키트 옵션 (제품군별) ----------
  const kitOptions = useMemo(() => getKitOptions(productGroup, exportPrices), [productGroup, exportPrices]);

  // 제품군 변경 시 키트 카테고리 自动 보정
  useEffect(() => {
    if (kitOptions.length && !kitOptions.includes(kitCategory)) {
      setKitCategory(kitOptions[0]);
    }
  }, [kitOptions]);

  // ---------- 特殊政策 요율 自动 适用 (제품군 변경 시) ----------
  useEffect(() => {
    const rate = SPECIAL_POLICY_RATE[productGroup] || 0;
    setPolicyRates(prev => ({
      ...prev,
      2: rate
    }));
    if (rate === 0) {
      setPolicyEnabled(prev => ({
        ...prev,
        2: false
      }));
    } else {
      setPolicyEnabled(prev => ({
        ...prev,
        2: true
      }));
    }
  }, [productGroup]);

  // ---------- 经销商等级 변경 시 정책 5,6 요율 自动 동기화 + 自动 ON ----------
  //   ST 제품: 분기/연도 미适用 → 정책 5,6 OFF 유지
  //            대신 经销商等级에 따라 DSO等级 自动 매핑 (A→S, B→A, C/D→B/C)
  useEffect(() => {
    const g = SIM_DEALER_GRADES.find(d => d.value === dealerGrade);
    if (g) {
      setPolicyRates(prev => ({
        ...prev,
        5: g.qtr,
        6: g.year
      }));
      // ST가 아닌 경우 정책 5, 6 自动 ON (经销商等级 영향이 보이도록)
      if (productGroup !== 'ST') {
        setPolicyEnabled(prev => ({
          ...prev,
          5: true,
          6: true
        }));
      } else {
        // ST: 经销商等级에 따라 DSO等级 自动 매핑
        //   A → S (20%), B → A (15%), C/D → B/C (10%)
        const mappedDsoGrade = ST_DEALER_TO_DSO[dealerGrade];
        if (mappedDsoGrade) {
          setDsoGrade(mappedDsoGrade);
        }
      }
    }
  }, [dealerGrade, productGroup]);

  // ---------- DSO等级 변경 시 정책 4 요율 自动 동기화 + 정책 4 ON ----------
  //   일반 제품: SIM_DSO_GRADES의 rate (3/5/8%)
  //   ST 제품: ST_DSO_CONFIG의 addRate (10/15/20%)
  //   tradeType이 DSO일 때만 适用, 정책 4도 自动 ON
  useEffect(() => {
    if (tradeType === 'DSO') {
      if (productGroup === 'ST') {
        const stConfig = ST_DSO_CONFIG[dsoGrade];
        if (stConfig) {
          setPolicyRates(prev => ({
            ...prev,
            4: stConfig.addRate
          }));
          setPolicyEnabled(prev => ({
            ...prev,
            4: true
          })); // 명시 ON
        }
      } else {
        const dsoG = SIM_DSO_GRADES.find(d => d.value === dsoGrade);
        if (dsoG) {
          setPolicyRates(prev => ({
            ...prev,
            4: dsoG.rate
          }));
          setPolicyEnabled(prev => ({
            ...prev,
            4: true
          })); // 명시 ON
        }
      }
    }
  }, [dsoGrade, tradeType, productGroup]);

  // ---------- 交易类型 변경 시 정책 4 활성화 토글 ----------
  useEffect(() => {
    setPolicyEnabled(prev => ({
      ...prev,
      4: tradeType === 'DSO'
    }));
  }, [tradeType]);

  // ---------- ST 제품은 普通牙科 미공급 → 自动으로 DSO로 변경 ----------
  useEffect(() => {
    if (productGroup === 'ST' && tradeType !== 'DSO') {
      setTradeType('DSO');
    }
  }, [productGroup]);

  // ---------- ST 제품 선택 시 일부 정책 自动 비활성화 ----------
  //   ST 정책 구조:
  //     ✓ 정책 ② 特殊政策 (2%) - ST 전용 요율
  //     ✓ 정책 ③ 现金结算 (3%)
  //     ✓ 정책 ④ DSO追加赠品 (S 20% / A 15% / B/C 10%)
  //   비활성화:
  //     ✗ 정책 ① 月目标达成
  //     ✗ 정책 ⑤ 분기 리베이트
  //     ✗ 정책 ⑥ 연도 리베이트
  useEffect(() => {
    if (productGroup === 'ST') {
      setPolicyEnabled(prev => ({
        ...prev,
        1: true,
        // 月目标达成 ON (1%)
        2: true,
        // 特殊政策 ON (2%)
        3: true,
        // 现金结算 ON
        4: true,
        // DSO追加赠品 ON (중요: 명시 ON)
        5: false,
        // 분기 리베이트 OFF
        6: false // 연도 리베이트 OFF
      }));
      // ST 特殊政策 요율 2% 自动 适用 (다른 제품은 2.5%)
      // ST DSO追加赠品 요율은 dsoGrade에 따라 별도 useEffect에서 동기화 (10/15/20%)
      setPolicyRates(prev => ({
        ...prev,
        1: 1,
        // 月目标达成 1%
        2: 2,
        // 特殊政策 2%
        3: 3 // 现金结算 3%
      }));
    } else {
      // ST가 아니면 다른 제품의 기본 特殊政策 요율 适用 (SPECIAL_POLICY_RATE)
      const defaultRate = SPECIAL_POLICY_RATE[productGroup];
      if (defaultRate !== undefined) {
        setPolicyRates(prev => ({
          ...prev,
          2: defaultRate
        }));
        // 特殊政策 0%인 제품(AR, BD)은 OFF
        setPolicyEnabled(prev => ({
          ...prev,
          2: defaultRate > 0
        }));
      }
    }
  }, [productGroup]);

  // ---------- BD 제품 선택 시 BD奖励금(정책 7번) 自动 활성화 ----------
  //   BD 외 제품은 정책 7번 自动 비활성화
  useEffect(() => {
    if (productGroup === 'BD') {
      setPolicyEnabled(prev => ({
        ...prev,
        7: true
      }));
      setPolicyRates(prev => ({
        ...prev,
        7: 1
      })); // BD奖励 1% 고정
    } else {
      setPolicyEnabled(prev => ({
        ...prev,
        7: false
      }));
    }
  }, [productGroup]);

  // ---------- 핵심 가격 데이터 계산 ----------
  //   listPrice (基础价格) = SIM_LIST_PRICES (제품군별 建议零售价)
  //   applyRate (适用率)   = PRICE_POLICY_MARGIN
  //   supplyBase (供货价)  = listPrice / (1 + applyRate/100)
  //   listPriceMin/Max     = DENTAL_RECOMMENDED_PRICES (대리상 판매 권장가 범위, 收益汇总표용)
  //   kitCost (配套成本)  = exportPrices 의 selectedProduct.changeUSD × 환율 × 1.14 (入库价)
  const priceData = useMemo(() => {
    const applyRate = PRICE_POLICY_MARGIN[productGroup] || 30;
    const listPrice = SIM_LIST_PRICES[productGroup] || 0; // 시뮬레이션 전용 基础价格
    const supplyBase = listPrice > 0 ? Math.round(listPrice / (1 + applyRate / 100)) : 0;

    // 대리상 판매 권장가 범위 (收益汇总표에 표시용)
    const dentalArr = dentalPrices[productGroup] && dentalPrices[productGroup][kitCategory] || [0, 0];
    const listPriceMin = dentalArr[0] || 0;
    const listPriceMax = dentalArr[dentalArr.length - 1] || 0;

    // 配套成本 (CNY) = changeUSD × 환율 × 입고마진
    const selectedKit = exportPrices.find(p => p.group === productGroup && p.category === kitCategory);
    const kitCost = selectedKit ? Math.round(selectedKit.changeUSD * exchangeRate * IMPORT_MARGIN) : 0;
    return {
      applyRate,
      listPrice,
      listPriceMin,
      listPriceMax,
      supplyBase,
      kitCost,
      selectedKit
    };
  }, [productGroup, kitCategory, dentalPrices, exportPrices, exchangeRate]);

  // ---------- 계산 로직 (새 수식 체계) ----------
  // 정책별 계산 방식:
  //   ① 月目标达成 (denominator) → 분모에 % 추가
  //   ② 特殊政策 (subtract_amount) → 基准价에서 금액 차감 (¥431 × 2.5% 등)
  //   ③ 现金结算 (multiply, 97折) → 곱셈 ×(1-3%) = ×97%
  //   ④ DSO等级 (denominator) → 분모에 % 추가
  //   ⑤ 분기 (denominator) → 분모에 % 추가
  //   ⑥ 연도 (multiply) → 곱셈 ×(1-연도%)
  //      BD 제품일 경우: 연도+BD奖励 묶어서 ×(1-연도%-BD奖励%)
  //   ⑦ BD奖励 (combined with 연도) → 별도 步骤 없이 연도와 묶어서 처리
  //
  // 수식 예 (AO A등급 / 모든 정책 활성화):
  //   초기: 431
  //   ① 35%(기본) + 1%(목표): 431 / (1+0.35+0.01) = 317
  //   ② 특수 2.5%: (431 - 431×0.025) / (1+0.36) = 309
  //   ③ 현금 97折: (431 - 431×0.025) × 0.97 / (1+0.36) = 300
  //   ④ DSO 8%: (431 - 431×0.025) × 0.97 / (1+0.36+0.08) = ...
  //   ⑤ 분기 4%: (431 - 431×0.025) × 0.97 / (1+0.36+0.08+0.04) = 291 (DSO 없을 시)
  //   ⑥ 연도 3%: 위 값 × (1-0.03) = 282
  //   ⑦ BD奖励 1%: BD제품인 경우 연도와 묶어서 (1-0.03-0.01) = 위 값 × 0.96

  const calculation = useMemo(() => {
    const {
      listPrice,
      supplyBase,
      kitCost,
      applyRate
    } = priceData;
    if (supplyBase <= 0 || listPrice <= 0) {
      return {
        steps: [],
        finalPrice: 0,
        totalDiscount: 0,
        totalDiscountRate: 0,
        appliedCount: 0,
        finalGP: 0,
        gpAvailable: false
      };
    }

    // ─────────────────────────────────────────────────
    // 政策换算GP 계산
    //   공식: GP = 1 - 정책반영원가 ÷ 정책반영基准价
    //   정책반영원가 = (임플란트원가 + KIT원가/KIT기준) × (1 + 赠品(产品) + 목표달성)
    //   정책반영基准价 = 步骤별로 다름 (431, 431-10.8, ×97%, ×(1-연도%) 등)
    // ─────────────────────────────────────────────────
    const costData = SIM_COST_DATA[productGroup];
    const kitInfo = costData?.kits?.[kitCategory];
    const gpAvailable = !!(costData && kitInfo); // 원가 데이터 있을 때만 GP 계산

    // 환산원가 기본값 (赠品(产品)/목표달성 미适用 시)
    const baseUnitCost = gpAvailable ? costData.implantCost + kitInfo.kitCost / kitInfo.kitRatio : 0;

    // 각 步骤별 GP 계산 함수
    //   ratedCostMultiplier: 원가 환산배수 (1 + 赠品(产品) + 목표달성)
    //   refBasePrice: 정책반영 基准价 (분모)
    const calcGP = (refBasePrice, ratedCostMultiplier) => {
      if (!gpAvailable || refBasePrice <= 0) return null;
      const ratedCost = baseUnitCost * ratedCostMultiplier;
      return (1 - ratedCost / refBasePrice) * 100;
    };
    const steps = [];

    // 步骤 0: 初始基准价
    steps.push({
      step: 0,
      name: "初始基准价",
      rate: null,
      basePrice: listPrice,
      discount: null,
      finalPrice: listPrice,
      gp: null,
      // 步骤 0은 GP 없음
      method: 'base'
    });
    const r1_target = policyEnabled[1] ? policyRates[1] / 100 : 0;
    const r2_special = policyEnabled[2] ? policyRates[2] / 100 : 0;
    const r3_cash = policyEnabled[3] ? policyRates[3] / 100 : 0;
    const r4_dso = productGroup === 'ST' || policyEnabled[4] ? policyRates[4] / 100 : 0;
    const r5_qtr = policyEnabled[5] ? policyRates[5] / 100 : 0;
    const r6_year = policyEnabled[6] ? policyRates[6] / 100 : 0;
    const r7_bd = policyEnabled[7] ? policyRates[7] / 100 : 0;
    const baseRate = applyRate / 100;
    let denom = 1 + baseRate;
    let numerator = listPrice;
    let multiplier = 1;

    // GP 계산용: 정책반영基准价 추적
    let gpRefBase = listPrice; // 분모 基准价 (特殊政策에서 reduce, 곱셈에서 multiply)
    let costMultiplier = 1 + baseRate; // 원가 환산배수 (赠品(产品) + 목표달성)

    // 步骤 1: 赠品(产品) 35% (기본 供货价)
    let cur = numerator / denom;
    steps.push({
      step: 1,
      name: `赠品(产品) ${(baseRate * 100).toFixed(0)}%`,
      rate: baseRate * 100,
      basePrice: listPrice,
      discount: Math.round((listPrice - cur) * 10) / 10,
      finalPrice: Math.round(cur),
      gp: calcGP(gpRefBase, costMultiplier),
      method: 'denominator'
    });
    let appliedCount = 0;

    // 步骤 2: 月目标达成 (분모 더하기)
    if (policyEnabled[1]) {
      denom += r1_target;
      costMultiplier += r1_target; // 원가도 함께 증가
      const before = cur;
      cur = numerator / denom;
      appliedCount += 1;
      steps.push({
        step: 1 + appliedCount,
        name: `月目标达成 ${(r1_target * 100).toFixed(0)}%`,
        rate: r1_target * 100,
        basePrice: before,
        discount: Math.round((before - cur) * 10) / 10,
        finalPrice: Math.round(cur),
        gp: calcGP(gpRefBase, costMultiplier),
        method: 'denominator'
      });
    }

    // ─────────────────────────────────────────────────
    // 步骤 3 & 4: 特殊政策 ↔ DSO 순서
    // - 일반 제품(AO/AR/BD/ARi): 特殊政策 → DSO
    // - ST 제품: DSO追加赠品 → 特殊政策 (ST 전용 순서)
    //   ST는 첨부 4번 표에 따라 65% → DSO追加赠品 → 특수격려 → 现金结算 순서
    // ─────────────────────────────────────────────────
    const applySpecialPolicy = () => {
      if (policyEnabled[2]) {
        const amount = listPrice * r2_special;
        numerator = listPrice - amount;
        gpRefBase = gpRefBase - amount; // GP 분모도 감소
        const before = cur;
        cur = numerator / denom;
        appliedCount += 1;
        steps.push({
          step: 1 + appliedCount,
          name: `特殊政策 ${r2_special * 100}%`,
          rate: r2_special * 100,
          basePrice: before,
          discount: Math.round((before - cur) * 10) / 10,
          finalPrice: Math.round(cur),
          gp: calcGP(gpRefBase, costMultiplier),
          method: 'subtract_amount',
          returnAmount: Math.round(amount * 10) / 10
        });
      }
    };
    const applyDsoPolicy = () => {
      // ST 제품은 정책 4 ON/OFF와 무관하게 DSO追加赠品 항상 适用
      // 일반 제품은 정책 4가 ON일 때만 适用
      const shouldApply = tradeType === 'DSO' && (productGroup === 'ST' || policyEnabled[4]);
      if (shouldApply) {
        denom += r4_dso;
        costMultiplier += r4_dso;
        const before = cur;
        cur = numerator / denom * multiplier;
        appliedCount += 1;
        steps.push({
          step: 1 + appliedCount,
          name: productGroup === 'ST' ? `DSO追加赠品 ${(r4_dso * 100).toFixed(0)}%` : `DSO等级 ${(r4_dso * 100).toFixed(0)}%`,
          rate: r4_dso * 100,
          basePrice: before,
          discount: Math.round((before - cur) * 10) / 10,
          finalPrice: Math.round(cur),
          gp: calcGP(gpRefBase, costMultiplier),
          method: 'denominator'
        });
      }
    };

    // 特殊政策만 适用 (DSO는 季度返利 앞에서 适用)
    applySpecialPolicy();

    // 步骤 5: 现金结算 97折 (곱셈) - GP 분모도 곱셈
    if (policyEnabled[3]) {
      multiplier *= 1 - r3_cash;
      gpRefBase = gpRefBase * (1 - r3_cash);
      const before = cur;
      cur = numerator / denom * multiplier;
      appliedCount += 1;
      steps.push({
        step: 1 + appliedCount,
        name: `现金结算 3%`,
        rate: r3_cash * 100,
        basePrice: before,
        discount: Math.round((before - cur) * 10) / 10,
        finalPrice: Math.round(cur),
        gp: calcGP(gpRefBase, costMultiplier),
        method: 'multiply'
      });
    }

    // DSO等级 适用 (特殊政策·现金结算 다음, 季度返利 앞)
    applyDsoPolicy();

    // 步骤 6: 분기 리베이트 — 제품(분모) 또는 현금(곱셈)
    if (policyEnabled[5]) {
      const before = cur;
      if (qtrType === '현금') {
        multiplier *= 1 - r5_qtr;
        gpRefBase = gpRefBase * (1 - r5_qtr);
        cur = numerator / denom * multiplier;
      } else {
        denom += r5_qtr;
        costMultiplier += r5_qtr;
        cur = numerator / denom * multiplier;
      }
      appliedCount += 1;
      steps.push({
        step: 1 + appliedCount,
        name: `季度返利(${qtrType}) ${(r5_qtr * 100).toFixed(0)}%`,
        rate: r5_qtr * 100,
        basePrice: before,
        discount: Math.round((before - cur) * 10) / 10,
        finalPrice: Math.round(cur),
        gp: calcGP(gpRefBase, costMultiplier),
        method: qtrType === '현금' ? 'multiply' : 'denominator'
      });
    }

    // 步骤 7: 年度返利 (곱셈) - GP 분모도 곱셈
    if (policyEnabled[6]) {
      multiplier *= 1 - r6_year;
      gpRefBase = gpRefBase * (1 - r6_year);
      const before = cur;
      cur = numerator / denom * multiplier;
      appliedCount += 1;
      steps.push({
        step: 1 + appliedCount,
        name: `年度返利(现金) ${(r6_year * 100).toFixed(0)}%`,
        rate: r6_year * 100,
        basePrice: before,
        discount: Math.round((before - cur) * 10) / 10,
        finalPrice: Math.round(cur),
        gp: calcGP(gpRefBase, costMultiplier),
        method: 'multiply'
      });
    }

    // 步骤 8: BD奖励 (곱셈) - 별도 步骤
    if (policyEnabled[7]) {
      multiplier *= 1 - r7_bd;
      gpRefBase = gpRefBase * (1 - r7_bd);
      const before = cur;
      cur = numerator / denom * multiplier;
      appliedCount += 1;
      steps.push({
        step: 1 + appliedCount,
        name: `BD奖励(现金) ${(r7_bd * 100).toFixed(0)}%`,
        rate: r7_bd * 100,
        basePrice: before,
        discount: Math.round((before - cur) * 10) / 10,
        finalPrice: Math.round(cur),
        gp: calcGP(gpRefBase, costMultiplier),
        method: 'multiply'
      });
    }
    const finalPrice = Math.round(cur);
    const totalDiscount = Math.round((supplyBase - finalPrice) * 10) / 10;
    const totalDiscountRate = totalDiscount / supplyBase * 100;
    const finalGP = calcGP(gpRefBase, costMultiplier);
    return {
      steps,
      finalPrice,
      totalDiscount,
      totalDiscountRate,
      appliedCount,
      finalGP,
      gpAvailable
    };
  }, [priceData, policyEnabled, policyRates, productGroup, kitCategory, tradeType, qtrType]);

  // ---------- 经销商利润성 요약 (첨부 양식: 거래유형별 분기) ----------
  // 普通牙科: 经销商等级(A/B/C/D) × 판매가(330/350) = 8행
  // DSO连锁牙科:  DSO등급(S/A/B/C) × 대리상등급(A/B/C/D) = 12행
  //
  // 첨부 7번 핵심 공식:
  //   供货价는 基准价에서 특수격려 반환금을 차감한 뒤, 赠品(产品)+목표달성+DSO+분기를
  //   분모에 반영하여 계산하고, 现金结算(97折) 후 연도 리베이트를 현금성 차감으로 适用.
  //
  //   最终供货价 = (基准价-반환금) × 97% / (1+赠品(产品)+목표달성+DSO+분기) × (1-연도)
  //
  //   总部GP (정책환산):
  //     원가 환산 = baseUnitCost × (1+赠品(产品)+목표달성+DSO+분기)
  //     분모 (정책반영基准价) = (基准价-반환금) × 97% × (1-연도)
  //     GP = 1 - 원가환산 / 분모
  //
  //   经销商利润 = 판매가 - 供货价
  //   经销商毛利率 = 利润 / 판매가
  //
  //   ※ 收益汇总표는 정책 표준 시나리오로 항상 계산:
  //      - 목표달성 1%, 특수격려, 现金结算 97折 항상 适用
  //      - 분기/연도 리베이트는 经销商等级에 따라 自动 适用
  const profitSummary = useMemo(() => {
    const {
      listPrice,
      applyRate
    } = priceData;
    if (listPrice <= 0) return {
      type: 'none',
      rows: []
    };

    // 표준 시나리오 정책률
    //   ST: 월목표/특수/분기/연도 모두 미适用 → r1_target=0, specialRate=0, qtrRate=0, yearRate=0
    //   다른 제품: 표준 정책 适用
    const isST = productGroup === 'ST';
    const r1_target = isST ? 0 : 0.01; // 月目标达成 (ST는 0)
    const r3_cash = 0.03; // 现金结算 3% (97折, 항상 适用)
    const baseRate = applyRate / 100;

    // 제품군별 特殊政策 요율 (ST는 0)
    const specialRate = isST ? 0 : (SPECIAL_POLICY_RATE[productGroup] || 0) / 100;
    const refundAmount = listPrice * specialRate;
    const adjusted = (listPrice - refundAmount) * (1 - r3_cash);

    // 환산원가 데이터
    const costData = SIM_COST_DATA[productGroup];
    const kitInfo = costData?.kits?.[kitCategory];
    const gpAvailable = !!(costData && kitInfo);

    // 공통 계산 함수
    //   dsoRate: DSO 정책률 (0이면 普通牙科)
    //   dealerG: 经销商等级 객체 ({qtr, year, bdBonus})
    //   sellPrice: 售价基准
    const calcRow = (dsoRate, dealerG, sellPrice) => {
      // 위에서 선택/조정한 정책의 最终供货价·GP를 그대로 반영
      const supply = Math.round(calculation.finalPrice);
      const hqGP = calculation.finalGP;
      const profit = sellPrice - supply;
      const margin = sellPrice > 0 ? profit / sellPrice * 100 : 0;
      return {
        supply,
        hqGP,
        profit,
        margin
      };
    };

    // 제품별 판매가 설정 가져오기
    const sellConfig = SIM_SELL_PRICES[productGroup];
    if (!sellConfig) return {
      type: 'none',
      rows: []
    };

    // 선택된 经销商等级만 필터링하여 표시
    const selectedDealer = SIM_DEALER_GRADES.find(d => d.value === dealerGrade);
    if (!selectedDealer) return {
      type: 'none',
      rows: []
    };
    if (tradeType === 'DSO') {
      const dsoConfig = sellConfig.dso;
      const rows = [];
      if (dsoConfig.structure === 'per_dso') {
        // 구조 A: DSO等级별 판매가 다름 (AO, AR, ST)
        //   선택된 经销商等级 + 선택된 DSO等级 = 1행만
        const dsoValueMap = {
          'S': 'S',
          'A': 'A',
          'B/C': 'BC'
        };
        const selectedDsoValue = dsoValueMap[dsoGrade] || 'S';
        const selectedDso = dsoConfig.list.find(d => d.dsoGrade === selectedDsoValue);
        if (selectedDso) {
          const r = calcRow(selectedDso.dsoRate, selectedDealer, selectedDso.sellPrice);
          rows.push({
            dsoGrade: selectedDso.dsoLabel,
            dealerGrade: selectedDealer.value,
            sellPrice: selectedDso.sellPrice,
            ...r
          });
        }
      } else if (dsoConfig.structure === 'uniform') {
        // 구조 B: DSO等级 무관 동일 판매가 2종 (BD, ARi)
