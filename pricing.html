  return v.toLocaleString('ko-KR', { minimumFractionDigits: d, maximumFractionDigits: d });

/* ========================================
   컬럼 너비 조절 핸들 (리사이저)
   - 사용법: <th><ColResizer />...</th>  ← 양방향 (좌/우 둘 다)
   - 마우스로 드래그하여 컬럼 너비 조절
======================================== */
function ColResizer() {
  // 우측 핸들: 현재 컬럼의 우측 끝을 드래그하여 너비 조절
  const onMouseDownRight = (e) => {
    e.preventDefault();
    e.stopPropagation();
    const th = e.target.closest('th');
    if (!th) return;
    const resizer = e.target;
    resizer.classList.add('resizing');
    const startX = e.clientX;
    const startWidth = th.offsetWidth;

    const onMouseMove = (mv) => {
      const delta = mv.clientX - startX;
      const newWidth = Math.max(40, startWidth + delta);
      th.style.width = newWidth + 'px';
      th.style.minWidth = newWidth + 'px';
    };
    const onMouseUp = () => {
      resizer.classList.remove('resizing');
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
    };
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  };

  // 좌측 핸들: 현재 컬럼의 좌측 끝을 드래그 (왼쪽으로 가면 너비 +, 오른쪽으로 가면 -)
  const onMouseDownLeft = (e) => {
    e.preventDefault();
    e.stopPropagation();
    const th = e.target.closest('th');
    if (!th) return;
    const resizer = e.target;
    resizer.classList.add('resizing');
    const startX = e.clientX;
    const startWidth = th.offsetWidth;

    const onMouseMove = (mv) => {
      // 좌측 핸들은 방향 반대: 왼쪽으로 끌면 너비 증가
      const delta = startX - mv.clientX;
      const newWidth = Math.max(40, startWidth + delta);
      th.style.width = newWidth + 'px';
      th.style.minWidth = newWidth + 'px';
    };
    const onMouseUp = () => {
      resizer.classList.remove('resizing');
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
    };
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  };

  return (
    <React.Fragment>
      <div className="col-resizer left" onMouseDown={onMouseDownLeft} title="드래그하여 너비 조절 (양방향)"></div>
      <div className="col-resizer right" onMouseDown={onMouseDownRight} title="드래그하여 너비 조절 (양방향)"></div>
    </React.Fragment>
  );
}

    setData(prev => prev.map(r => r.id === id ? { ...r, [field]: value } : r));

    const newId = `NEW-${Date.now()}`;
    const existingNewGroups = data
      .map(r => r.group)
      .filter(g => /^NEW\d+$/.test(g));
    const nextNum = existingNewGroups.length + 1;
    const defaultGroup = `NEW${nextNum}`.slice(0, 10);
    setData(prev => [...prev, {
      id: newId, group: defaultGroup, category: '', currentUSD: 0, changeUSD: 0,
      importPolicy: '', boxPolicy: '-'
    }]);
  };
  // 기존 시스템에 분류 추가
  const addCategoryToSystem = (groupName) => {
    const newId = `${groupName}-${Date.now()}`;
    // 같은 시스템 그룹의 마지막 행 위치에 삽입
    setData(prev => {
      const lastIdxOfGroup = prev.map(r => r.group).lastIndexOf(groupName);
      const newRow = {
        id: newId, group: groupName, category: '', currentUSD: 0, changeUSD: 0,
        importPolicy: '', boxPolicy: '-'
      };
      if (lastIdxOfGroup === -1) return [...prev, newRow];
      return [...prev.slice(0, lastIdxOfGroup + 1), newRow, ...prev.slice(lastIdxOfGroup + 1)];
    });
  };
  const removeRow = (id) => {
    if (!confirm('이 행을 삭제하시겠습니까?')) return;
    setData(prev => prev.filter(r => r.id !== id));

  const grouped = useMemo(() => {
    const map = {};
    data.forEach(r => {
      if (!map[r.group]) map[r.group] = [];
      map[r.group].push(r);
    });
    return map;
  }, [data]);

  const calcImportCNY = (changeUSD) => changeUSD * exchangeRate * IMPORT_MARGIN;

      {/* 변경이력 저장 모달 */}

        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center" onClick={() => setShowSnapshotModal(false)}>
          <div className="bg-white rounded-lg shadow-xl w-full max-w-md p-6" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center gap-2 mb-4">
              <span className="text-2xl">📌</span>
              <h3 className="text-lg font-bold text-slate-800">변경이력 저장</h3>
            </div>
            <p className="text-sm text-slate-600 mb-4">
              현재 수출가 정책 전체 상태를 스냅샷으로 저장합니다. 메모를 입력해주세요.
            </p>
            <div className="mb-4">
              <label className="text-xs font-semibold text-slate-700 block mb-1">변경 사유 / 메모 <span className="text-red-500">*</span></label>
              <textarea
                value={snapshotNote}
                onChange={(e) => setSnapshotNote(e.target.value)}
                rows="3"
                placeholder="예: 환율 조정 + BD-표준키트 가격 인상"
                className="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:outline-none focus:border-emerald-500"
                autoFocus
              />
            </div>
            <div className="bg-slate-50 rounded p-3 mb-4 text-xs text-slate-600 space-y-1">
              <div>• 저장 시점: <span className="font-semibold">{new Date().toLocaleString('ko-KR')}</span></div>
              <div>• 환율: <span className="font-semibold">{exchangeRate}</span></div>
              <div>• 품목 수: <span className="font-semibold">{data.length}개</span></div>
            </div>
            <div className="flex gap-2 justify-end">
              <button onClick={() => setShowSnapshotModal(false)} className="px-4 py-2 border border-slate-300 rounded text-sm hover:bg-slate-50">취소</button>
              <button onClick={handleSaveSnapshot} className="px-4 py-2 bg-emerald-600 text-white rounded text-sm font-medium hover:bg-emerald-700">저장하기</button>
            </div>
          </div>
        </div>
      )}

      {/* 환율 입력 카드 */}
      <div className="bg-amber-50 border border-amber-300 rounded-lg p-4 mb-4 flex items-center gap-6">
        <div className="flex items-center gap-3">
          <span className="text-sm font-bold text-amber-900">💱 환율 (USD → CNY)</span>
          <input
            type="number"
            step="0.01"
            value={exchangeRate}
            onChange={(e) => setExchangeRate(parseFloat(e.target.value) || 0)}
            className="w-24 px-3 py-1.5 border border-amber-400 rounded text-sm font-bold text-amber-900 bg-white focus:outline-none focus:border-amber-600"
          />
          <button
            onClick={() => setExchangeRate(DEFAULT_EXCHANGE_RATE)}
            className="text-xs text-amber-700 hover:text-amber-900 underline"
          >
            기본값({DEFAULT_EXCHANGE_RATE})로 초기화
          </button>
        </div>
        <div className="ml-auto text-xs text-amber-800 bg-white px-3 py-1.5 rounded border border-amber-300">
          <span className="font-bold">입고가 수식:</span> 변경 수입가(USD) × 환율({exchangeRate}) × {IMPORT_MARGIN} = <span className="font-bold">CNY</span>
        </div>
      </div>

      {/* 수출가 정책 - 시스템(그룹)별 카드 펼침 디자인 */}
      <div className="space-y-3">
        {Object.entries(grouped).map(([groupName, rows]) => (
          <ExportPriceGroupCard
            key={groupName}
            groupName={groupName}
            rows={rows}
            data={data}
            setData={setData}
            updateRow={updateRow}
            addCategoryToSystem={addCategoryToSystem}
            removeRow={removeRow}
            calcImportCNY={calcImportCNY}
          />
        ))}
      </div>

      <div className="mt-4 p-3 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-800">
        <div className="font-semibold mb-1">📌 사용 안내</div>
        <ul className="space-y-0.5 list-disc list-inside">
          <li>입고가(CNY) = 변경 수입가(USD) × 환율({exchangeRate}) × {IMPORT_MARGIN} (정수 표시)</li>
          <li>[+ 시스템 추가]: 새 시스템 신규 생성 (예: NEW1)</li>
          <li>각 시스템 카드를 클릭하여 펼치기/접기 가능 · [+ 분류 추가] 버튼으로 키트 추가</li>
          <li>카드 형태로 가로 스크롤 없이 편하게 관리 가능</li>
        </ul>
      </div>
    </div>
  );
}

/* ========================================
   수출가 정책 - 시스템별 카드 (펼침 형태)
======================================== */
function ExportPriceGroupCard({ groupName, rows, data, setData, updateRow, addCategoryToSystem, removeRow, calcImportCNY }) {
  const [expanded, setExpanded] = useState(true);

  // 시스템 이름 변경
  const handleGroupNameChange = (newGroup) => {
    setData(prev => prev.map(r =>
      r.group === groupName ? { ...r, group: newGroup } : r
    ));
  };

  // 변경된 키트 개수
  const changedCount = rows.filter(r => r.currentUSD !== r.changeUSD).length;
  // 전체 입고가 합계
  const totalCNY = rows.reduce((sum, r) => sum + calcImportCNY(r.changeUSD), 0);

  return (
    <div className="bg-white rounded-lg border border-slate-200 overflow-hidden">
      {/* 카드 헤더 (클릭하면 펼침/접힘) */}
      <div className="bg-gradient-to-r from-slate-50 to-white border-b border-slate-200 px-4 py-3 flex items-center justify-between">
        <div className="flex items-center gap-3 flex-1">
          <button
            onClick={() => setExpanded(!expanded)}
            className="text-slate-500 hover:text-slate-700 text-sm w-6"
          >
            {expanded ? '▼' : '▶'}
          </button>
          <input
            type="text"
            value={groupName}
            maxLength={10}
            onChange={(e) => handleGroupNameChange(e.target.value)}
            className="w-24 px-2 py-1 border border-transparent hover:border-amber-400 focus:border-amber-500 focus:outline-none rounded text-lg font-bold text-slate-800 bg-transparent"
            placeholder="시스템명"
            title="최대 10글자"
          />
          <span className="text-xs text-slate-500">
            · 키트 <span className="font-semibold text-slate-700">{rows.length}개</span>
          </span>
          {changedCount > 0 && (
            <span className="text-xs px-2 py-0.5 bg-amber-100 text-amber-800 rounded-full font-semibold">
              {changedCount}건 변경
            </span>
          )}
        </div>
        <div className="flex items-center gap-3">
          <div className="text-xs text-slate-600">
            <span className="text-slate-500">총 입고가 </span>
            <span className="font-bold text-emerald-700">¥{Math.round(totalCNY).toLocaleString()}</span>
          </div>
          <button
            onClick={() => addCategoryToSystem(groupName)}
            className="px-3 py-1.5 bg-emerald-500 text-white rounded text-xs font-medium hover:bg-emerald-600"
          >
            + 분류 추가
          </button>
        </div>
      </div>

      {/* 카드 본문 (펼쳐졌을 때만 표시) */}
      {expanded && (
        <div className="p-3 space-y-2">
          {rows.map((row, idx) => {
            const cny = calcImportCNY(row.changeUSD);
            const isChanged = row.currentUSD !== row.changeUSD;
            const hasChinese = /[\u4e00-\u9fff]/.test(row.category);
            return (
              <div key={row.id} className={`border rounded-lg p-3 transition ${isChanged ? 'border-amber-300 bg-amber-50/30' : 'border-slate-200 hover:border-slate-300 hover:bg-slate-50/50'}`}>
                <div className="grid grid-cols-12 gap-3 items-center">
                  {/* 분류 */}
                  <div className="col-span-3">
                    <label className="block text-[10px] font-semibold text-slate-500 mb-1">분류</label>
                    <input
                      type="text"
                      value={row.category}
                      onChange={(e) => updateRow(row.id, 'category', e.target.value)}
                      placeholder="예: 표준 키트"
                      className={`w-full px-2 py-1.5 border border-slate-300 rounded text-sm focus:outline-none focus:border-blue-500 ${hasChinese ? 'cn-font' : ''}`}
                    />
                  </div>

                  {/* 현재 USD */}
                  <div className="col-span-2">
                    <label className="block text-[10px] font-semibold text-slate-500 mb-1">현재 (USD)</label>
                    <div className="relative">
                      <span className="absolute left-2 top-1/2 -translate-y-1/2 text-xs text-slate-400">$</span>
                      <input
                        type="number"
                        step="0.1"
                        value={row.currentUSD}
                        onChange={(e) => updateRow(row.id, 'currentUSD', parseFloat(e.target.value) || 0)}
                        className="w-full pl-5 pr-2 py-1.5 border border-slate-300 rounded text-sm text-right focus:outline-none focus:border-blue-500"
                      />
                    </div>
                  </div>

                  {/* 변경 USD */}
                  <div className="col-span-2">
                    <label className="block text-[10px] font-semibold text-slate-500 mb-1">
                      변경 (USD) {isChanged && <span className="text-amber-600">●</span>}
                    </label>
                    <div className="relative">
                      <span className="absolute left-2 top-1/2 -translate-y-1/2 text-xs text-slate-400">$</span>
                      <input
                        type="number"
                        step="0.1"
                        value={row.changeUSD}
                        onChange={(e) => updateRow(row.id, 'changeUSD', parseFloat(e.target.value) || 0)}
                        className={`w-full pl-5 pr-2 py-1.5 border rounded text-sm text-right focus:outline-none ${isChanged ? 'border-amber-400 bg-amber-50 font-bold focus:border-amber-500' : 'border-slate-300 focus:border-blue-500'}`}
                      />
                    </div>
                  </div>

                  {/* 입고가 CNY */}
                  <div className="col-span-1">
                    <label className="block text-[10px] font-semibold text-slate-500 mb-1">입고가 (CNY)</label>
                    <div className="px-2 py-1.5 bg-emerald-50 border border-emerald-200 rounded text-sm font-bold text-emerald-800 text-right">
                      ¥{Math.round(cny)}
                    </div>
                  </div>

                  {/* 키트 정책 */}
                  <div className="col-span-2">
                    <label className="block text-[10px] font-semibold text-slate-500 mb-1">키트 정책</label>
                    <input
                      type="text"
                      value={row.importPolicy || ''}
                      onChange={(e) => updateRow(row.id, 'importPolicy', e.target.value)}
                      placeholder="예: 80:1"
                      className={`w-full px-2 py-1.5 border border-slate-300 rounded text-sm focus:outline-none focus:border-blue-500 ${/[\u4e00-\u9fff]/.test(row.importPolicy || '') ? 'cn-font' : ''}`}
                    />
                  </div>

                  {/* 수입정책 */}
                  <div className="col-span-1">
                    <label className="block text-[10px] font-semibold text-slate-500 mb-1">수입정책</label>
                    <input
                      type="text"
                      value={row.boxPolicy || '-'}
                      onChange={(e) => updateRow(row.id, 'boxPolicy', e.target.value)}
                      className="w-full px-2 py-1.5 border border-slate-300 rounded text-sm text-center focus:outline-none focus:border-blue-500"
                    />
                  </div>

                  {/* 작업 */}
                  <div className="col-span-1">
                    <label className="block text-[10px] font-semibold text-slate-500 mb-1">작업</label>
                    <button
                      onClick={() => removeRow(row.id)}
                      className="w-full px-2 py-1.5 bg-white border border-red-300 text-red-600 rounded text-xs hover:bg-red-50"
                    >
                      🗑 삭제
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ========================================
   메뉴 1-2: 수출가 변경이력 (타임라인)
======================================== */
function HistoryPage({ history, setHistory, onRestore }) {
  const [selectedId, setSelectedId] = useState(null);

  const removeSnapshot = (id) => {
    if (!confirm('이 이력을 삭제하시겠습니까?\n(되돌릴 수 없습니다)')) return;
    setHistory(prev => prev.filter(h => h.id !== id));
    if (selectedId === id) setSelectedId(null);
  };

  const restoreSnapshot = (snap) => {
    if (!confirm(`이 시점(${snap.savedAt})으로 복원하시겠습니까?\n현재 수출가 정책이 덮어쓰여집니다.`)) return;
    onRestore(snap);
    alert('복원되었습니다. 수출가 정책 메뉴에서 확인하세요.');
  };

  const selected = history.find(h => h.id === selectedId);

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-5">
        <div>
          <h1 className="text-2xl font-bold text-slate-800">수출가 변경이력</h1>
          <p className="text-sm text-slate-500 mt-1">저장된 스냅샷을 시간순으로 확인하고 특정 시점으로 복원할 수 있습니다</p>
        </div>
        <div className="flex items-center gap-2 px-3 py-2 bg-emerald-50 border border-emerald-200 rounded-lg text-sm text-emerald-800">
          <span className="font-semibold">총 {history.length}건</span>
          <span className="text-xs text-emerald-600">저장됨</span>
        </div>
      </div>

      {history.length === 0 ? (
        <div className="bg-white rounded-lg border border-slate-200 p-12 text-center">
          <div className="text-5xl mb-3">📭</div>
          <div className="text-slate-700 font-semibold mb-1">아직 저장된 이력이 없습니다</div>
          <div className="text-sm text-slate-500">수출가 정책 메뉴에서 "📌 변경이력 저장" 버튼을 눌러 첫 이력을 만들어보세요</div>
        </div>
      ) : (
        <div className="grid grid-cols-12 gap-4">
          {/* 좌측: 타임라인 */}
          <div className="col-span-7">
            <div className="bg-white rounded-lg border border-slate-200 p-5">
              <div className="space-y-0">
                {history.map((snap, idx) => {
                  const isSelected = selectedId === snap.id;
                  const isLatest = idx === 0;
                  return (
                    <div key={snap.id} className="flex gap-4">
                      {/* 타임라인 점/선 */}
                      <div className="flex flex-col items-center min-w-[24px]">
                        <div className={`w-3 h-3 rounded-full border-2 ${
                          isLatest ? 'bg-emerald-500 border-emerald-600' : 'bg-white border-slate-400'
                        }`}></div>
                        {idx !== history.length - 1 && (
                          <div className="w-0.5 flex-1 bg-slate-200 min-h-[40px]"></div>
                        )}
                      </div>
                      {/* 콘텐츠 */}
                      <div className={`flex-1 pb-5 cursor-pointer ${isSelected ? '' : ''}`} onClick={() => setSelectedId(snap.id)}>
                        <div className={`rounded-lg border transition p-3 ${
                          isSelected
                            ? 'bg-blue-50 border-blue-400 shadow-sm'
                            : 'bg-slate-50 border-slate-200 hover:bg-slate-100'
                        }`}>
                          <div className="flex items-center justify-between mb-1">
                            <div className="flex items-center gap-2">
                              <span className="text-xs font-mono text-slate-500">{snap.savedAt}</span>
                              {isLatest && (
                                <span className="px-2 py-0.5 bg-emerald-500 text-white text-[10px] rounded font-bold">최신</span>
                              )}
                            </div>
                            <div className="flex gap-1">
                              <button
                                onClick={(e) => { e.stopPropagation(); restoreSnapshot(snap); }}
                                className="text-xs px-2 py-0.5 bg-white border border-slate-300 rounded hover:bg-blue-50 hover:border-blue-400 text-slate-600 hover:text-blue-700"
                              >
                                복원
                              </button>
                              <button
                                onClick={(e) => { e.stopPropagation(); removeSnapshot(snap.id); }}
                                className="text-xs px-2 py-0.5 bg-white border border-slate-300 rounded hover:bg-red-50 hover:border-red-400 text-slate-600 hover:text-red-700"
                              >
                                삭제
                              </button>
                            </div>
                          </div>
                          <div className="text-sm text-slate-800 font-medium mb-1">{snap.note}</div>
                          <div className="flex gap-3 text-xs text-slate-500">
                            <span>💱 환율 {snap.exchangeRate}</span>
                            <span>📦 {snap.exportPrices?.length || 0}개 품목</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* 우측: 상세보기 */}
          <div className="col-span-5">
            {selected ? (
              <div className="bg-white rounded-lg border border-slate-200 p-5 sticky top-4">
                <div className="flex items-center justify-between mb-3 pb-3 border-b border-slate-200">
                  <div>
                    <div className="text-xs text-slate-500 mb-0.5">스냅샷 상세</div>
                    <div className="text-sm font-bold text-slate-800">{selected.savedAt}</div>
                  </div>
                  <button
                    onClick={() => setSelectedId(null)}
                    className="text-slate-400 hover:text-slate-600 text-lg"
                  >×</button>
                </div>

                <div className="space-y-3">
                  <div>
                    <div className="text-xs font-semibold text-slate-600 mb-1">변경 사유</div>
                    <div className="text-sm text-slate-800 bg-amber-50 p-2 rounded border border-amber-200">{selected.note}</div>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <div className="bg-slate-50 p-2 rounded">
                      <div className="text-xs text-slate-500">환율</div>
                      <div className="text-sm font-bold text-slate-800">{selected.exchangeRate}</div>
                    </div>
                    <div className="bg-slate-50 p-2 rounded">
                      <div className="text-xs text-slate-500">품목 수</div>
                      <div className="text-sm font-bold text-slate-800">{selected.exportPrices?.length || 0}개</div>
                    </div>
                  </div>

                  <div>
                    <div className="text-xs font-semibold text-slate-600 mb-1">수출가 데이터</div>
                    <div className="max-h-96 overflow-y-auto scrollbar-thin border border-slate-200 rounded">
                      <table className="w-full text-xs">
                        <thead className="bg-slate-100 sticky top-0">
                          <tr>
                            <th className="px-2 py-1.5 text-left font-semibold text-slate-700">시스템</th>
                            <th className="px-2 py-1.5 text-left font-semibold text-slate-700">분류</th>
                            <th className="px-2 py-1.5 text-right font-semibold text-slate-700">변경(USD)</th>
                            <th className="px-2 py-1.5 text-right font-semibold text-slate-700">입고가</th>
                          </tr>
                        </thead>
                        <tbody>
                          {selected.exportPrices?.map((p, i) => (
                            <tr key={i} className="border-b border-slate-100">
                              <td className="px-2 py-1.5 font-medium">{p.group}</td>
                              <td className="px-2 py-1.5 text-slate-700">{p.category}</td>
                              <td className="px-2 py-1.5 text-right text-blue-700">${p.changeUSD?.toFixed(1)}</td>
                              <td className="px-2 py-1.5 text-right text-slate-700">¥{fmtInt(Math.round(p.changeUSD * selected.exchangeRate * IMPORT_MARGIN))}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  <button
                    onClick={() => restoreSnapshot(selected)}
                    className="w-full py-2 bg-blue-600 text-white rounded font-semibold text-sm hover:bg-blue-700"
                  >
                    ↺ 이 시점으로 복원
                  </button>
                </div>
              </div>
            ) : (
              <div className="bg-slate-50 rounded-lg border border-dashed border-slate-300 p-8 text-center">
                <div className="text-3xl mb-2">👈</div>
                <div className="text-sm text-slate-500">좌측에서 이력을 선택하면<br/>상세 내용이 표시됩니다</div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ========================================
   시뮬레이션 이력 페이지 (v46 - 첨부 디자인 양식)
   - 좌측: 타임라인 카드 (날짜, 최신 뱃지, 복원/삭제 버튼, 제목, 메타)
   - 우측: 선택 시 상세 내용 / 미선택 시 안내 메시지
======================================== */
function SimulationHistoryPage({ simHistory, setSimHistory }) {
  const [selectedId, setSelectedId] = useState(null);
  const selected = simHistory.find(h => h.id === selectedId);

  const removeHistory = (id) => {
    if (!confirm('이 이력을 삭제하시겠습니까?')) return;
    setSimHistory(prev => prev.filter(h => h.id !== id));
    if (selectedId === id) setSelectedId(null);
  };

  const restoreHistory = (item) => {
    // 복원: 현재 메뉴에서는 정보 표시만, 실제 시뮬레이션 복원 기능은 향후 확장
    alert(`이력 "${item.title || item.savedAt}" 의 설정값을 확인했습니다.\n\n· 제품: ${item.productGroup}\n· 키트: ${item.kitCategory || item.productCategory || '-'}\n· 대리상 등급: ${item.dealerGrade || item.grade || '-'}\n· 거래유형: ${item.tradeType || '-'}\n· 최종공급가: ¥${item.finalPrice || item.dealerFinalCNY || 0}`);
  };

  const clearAllHistory = () => {
    if (!confirm('모든 시뮬레이션 이력을 삭제하시겠습니까?')) return;

/* ========================================
   네고 시뮬레이션 페이지 (신규)
   - 기존 시뮬레이션 결과를 기반으로 추가 할인/네고 시뮬레이션
   - 입력 방법:
     1) 이력에서 선택 → 자동 로드
     2) 가격시뮬레이션에서 "🔥 네고하기" 버튼 → 자동 전달
   - 추가 항목:
     1) 추가 할인 금액 (절대값, 예: -¥10)
     2) 추가 할인율 (%, 예: -2%)
     3) 정책 비중 조정 (분기 4% → 6% 등)
   - 견적서: Excel(XLSX) 다운로드
======================================== */
function NegoSimulationPage({ simHistory, negoSource, setNegoSource }) {
  // ---------- State ----------
  const [selectedBase, setSelectedBase] = useState(null);   // 기준이 되는 시뮬레이션 데이터
  const [negoDiscountAmount, setNegoDiscountAmount] = useState(0);  // 추가 할인 금액
  const [negoDiscountRate, setNegoDiscountRate] = useState(0);      // 추가 할인율 (%)
  const [policyAdjust, setPolicyAdjust] = useState({});             // 정책 비중 조정 {1: 1.5, 5: 6, ...}
  const [customerName, setCustomerName] = useState('');             // 고객사명
  const [dealerName, setDealerName] = useState('');                 // 대리상명
  const [quantity, setQuantity] = useState(1);                      // 수량
  const [showQuote, setShowQuote] = useState(false);                // 견적서 미리보기

  // ---------- negoSource에서 자동 로드 ----------
  useEffect(() => {
    if (negoSource) {
      setSelectedBase(negoSource);
      setNegoSource(null);  // 한 번 사용 후 초기화
    }
  }, [negoSource]);

  // ---------- 네고 결과 계산 ----------
  const negoResult = useMemo(() => {
    if (!selectedBase) return null;

    const base = selectedBase;
    const listPrice  = base.listPrice || 0;
    const applyRate  = base.applyRate || 30;
    const baseRate   = applyRate / 100;
    const isST       = base.productGroup === 'ST';
    const isBD       = base.productGroup === 'BD';

    // 정책 비중 조정 반영 (없으면 원래 값 사용)
    const r1 = (policyAdjust[1] ?? (base.policyEnabled?.[1] ? (base.policyRates?.[1] || 0) : 0)) / 100;
    const r2 = (policyAdjust[2] ?? (base.policyEnabled?.[2] ? (base.policyRates?.[2] || 0) : 0)) / 100;
    const r3 = (policyAdjust[3] ?? (base.policyEnabled?.[3] ? (base.policyRates?.[3] || 0) : 0)) / 100;
    const r4 = (policyAdjust[4] ?? (base.policyEnabled?.[4] ? (base.policyRates?.[4] || 0) : 0)) / 100;
    const r5 = (policyAdjust[5] ?? (base.policyEnabled?.[5] ? (base.policyRates?.[5] || 0) : 0)) / 100;
    const r6 = (policyAdjust[6] ?? (base.policyEnabled?.[6] ? (base.policyRates?.[6] || 0) : 0)) / 100;
    const r7 = (policyAdjust[7] ?? (base.policyEnabled?.[7] ? (base.policyRates?.[7] || 0) : 0)) / 100;

    // 공급가 재계산 (기존 공식과 동일)
    const refundAmount = listPrice * r2;
    const adjusted = (listPrice - refundAmount) * (1 - r3);
    const denom = 1 + baseRate + r1 + r4 + r5;
    const yearMult = (1 - r6 - r7);
    const recalculatedSupply = Math.round((adjusted / denom) * yearMult);

    // 네고 적용
    let negoSupply = recalculatedSupply;
    if (negoDiscountRate > 0) {
      negoSupply = Math.round(negoSupply * (1 - negoDiscountRate / 100));
    }
    if (negoDiscountAmount > 0) {
      negoSupply = Math.round(negoSupply - negoDiscountAmount);
    }
    negoSupply = Math.max(negoSupply, 0);  // 음수 방지

    // GP 재계산
    const costData = SIM_COST_DATA[base.productGroup];
    const kitInfo = costData?.kits?.[base.kitCategory];
    let negoGP = null;
    let recalcGP = null;
    if (costData && kitInfo) {
      const costMult = 1 + baseRate + r1 + r4 + r5;
      const ratedCost = costData.implantCost * costMult + kitInfo.kitCost * costMult / kitInfo.kitRatio;
      const refBase = adjusted * yearMult;
      recalcGP = refBase > 0 ? (1 - ratedCost / refBase) * 100 : null;

      // 네고 GP - 네고 공급가를 직접 사용한 GP
      const baseUnitCost = costData.implantCost + kitInfo.kitCost / kitInfo.kitRatio;
      negoGP = negoSupply > 0 ? (1 - baseUnitCost / negoSupply) * 100 : null;
    }

    // 기존 공급가 vs 재계산 vs 네고
    const originalSupply = base.finalPrice || 0;
    const originalGP = base.finalGP || 0;

    // 총 추가 할인
    const totalNegoDiscount = recalculatedSupply - negoSupply;
    const negoDiscountPct = recalculatedSupply > 0 ? (totalNegoDiscount / recalculatedSupply * 100) : 0;

    return {
      originalSupply, originalGP,
      recalculatedSupply, recalcGP,
      negoSupply, negoGP,
      totalNegoDiscount, negoDiscountPct,
      adjustedRates: { r1, r2, r3, r4, r5, r6, r7 },
    };
  }, [selectedBase, negoDiscountAmount, negoDiscountRate, policyAdjust]);

  // ---------- 정책 조정 핸들러 ----------
  const handlePolicyAdjust = (id, val) => {
    const num = parseFloat(val);
    setPolicyAdjust(prev => ({ ...prev, [id]: isNaN(num) ? undefined : num }));
  };

  const resetPolicyAdjust = (id) => {
    setPolicyAdjust(prev => {
      const next = { ...prev };
      delete next[id];
      return next;
    });
  };

  const handleResetAll = () => {
    if (!confirm('모든 네고 조건을 초기화하시겠습니까?')) return;
    setNegoDiscountAmount(0);
    setNegoDiscountRate(0);
    setPolicyAdjust({});
  };

  // ---------- Excel 다운로드 (HTML 테이블 → .xls) ----------
  const handleDownloadQuote = () => {
    if (!selectedBase || !negoResult) {
      alert('견적할 시뮬레이션이 없습니다.');
      return;
    }
    const now = new Date();
    const dateStr = now.toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    const quoteNo = `Q-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;

    const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"><title>견적서</title>

// ST는 2% (다른 제품 2.5%와 다름)
// EZ는 제품 삭제됨
const SPECIAL_POLICY_RATE = {
  AO: 2.5, BD: 0, AR: 0, ARi: 2.5, ST: 2,
};

// 키트 카테고리 자동 매핑 (제품군에 따라 사용 가능한 카테고리)
//   각 제품의 표준키트/풀키트가 키트 종류 옵션
function getKitOptions(productGroup, exportPrices) {
  const cats = exportPrices.filter(p => p.group === productGroup).map(p => p.category);
  // 임플란트는 별도, 키트 종류만 추출
  return cats.filter(c => c !== '임플란트');
}

function SimulationPage({ exportPrices, exchangeRate, dentalPrices, setDentalPrices, simHistory, setSimHistory, setActiveMenu, setNegoSource }) {
  // ---------- 입력 상태 ----------
  const [productGroup, setProductGroup] = useState('AO');
  const [kitCategory, setKitCategory] = useState('표준키트');  // 표준키트 / 풀키트 / 키트
  const [tradeType, setTradeType] = useState('일반치과');       // '일반치과' | 'DSO'
  const [dealerGrade, setDealerGrade] = useState('A');
  const [dsoGrade, setDsoGrade] = useState('S');
  const [showDetail, setShowDetail] = useState(true);
  const [leftCollapsed, setLeftCollapsed] = useState(true);   // 좌측 접기/펼치기 (기본 접힘)
  const [showFormulas, setShowFormulas] = useState(false);     // 참고 계산식 표시
  const [showStKitConversion, setShowStKitConversion] = useState(false);  // ST KIT 전환 참고표

  // ---------- 정책 활성화/요율 ----------
  const [policyEnabled, setPolicyEnabled] = useState({
    1: true, 2: true, 3: true, 4: false, 5: true, 6: true, 7: false,
  });
  const [policyRates, setPolicyRates] = useState({
    1: 1, 2: 2.5, 3: 3, 4: 8, 5: 4, 6: 3, 7: 1,
  });

  // ---------- 저장 상태 ----------
  const [showHistoryModal, setShowHistoryModal] = useState(false);
  const [historyTitle, setHistoryTitle] = useState('');
  const [historyNote, setHistoryNote] = useState('');
  const [toast, setToast] = useState(null);

  // ---------- 키트 옵션 (제품군별) ----------
  const kitOptions = useMemo(() => getKitOptions(productGroup, exportPrices), [productGroup, exportPrices]);
  
  // 제품군 변경 시 키트 카테고리 자동 보정
  useEffect(() => {
    if (kitOptions.length && !kitOptions.includes(kitCategory)) {
      setKitCategory(kitOptions[0]);
    }
  }, [kitOptions]);

  // ---------- 특수정책 요율 자동 적용 (제품군 변경 시) ----------
  useEffect(() => {
    const rate = SPECIAL_POLICY_RATE[productGroup] || 0;
    setPolicyRates(prev => ({ ...prev, 2: rate }));
    if (rate === 0) {
      setPolicyEnabled(prev => ({ ...prev, 2: false }));
    } else {
      setPolicyEnabled(prev => ({ ...prev, 2: true }));
    }
  }, [productGroup]);

  // ---------- 대리상 등급 변경 시 정책 5,6 요율 자동 동기화 + 자동 ON ----------
  //   ST 제품: 분기/연도 미적용 → 정책 5,6 OFF 유지
  //            대신 대리상 등급에 따라 DSO 등급 자동 매핑 (A→S, B→A, C/D→B/C)
  useEffect(() => {
    const g = SIM_DEALER_GRADES.find(d => d.value === dealerGrade);
    if (g) {
      setPolicyRates(prev => ({
        ...prev,
        5: g.qtr,
        6: g.year,
      }));
      // ST가 아닌 경우 정책 5, 6 자동 ON (대리상 등급 영향이 보이도록)
      if (productGroup !== 'ST') {
        setPolicyEnabled(prev => ({
          ...prev,
          5: true,
          6: true,
        }));
      } else {
        // ST: 대리상 등급에 따라 DSO 등급 자동 매핑
        //   A → S (20%), B → A (15%), C/D → B/C (10%)
        const mappedDsoGrade = ST_DEALER_TO_DSO[dealerGrade];
        if (mappedDsoGrade) {
          setDsoGrade(mappedDsoGrade);
        }
      }
    }
  }, [dealerGrade, productGroup]);

  // ---------- DSO 등급 변경 시 정책 4 요율 자동 동기화 + 정책 4 ON ----------
  //   일반 제품: SIM_DSO_GRADES의 rate (3/5/8%)
  //   ST 제품: ST_DSO_CONFIG의 addRate (10/15/20%)
  //   tradeType이 DSO일 때만 적용, 정책 4도 자동 ON
  useEffect(() => {
    if (tradeType === 'DSO') {
      if (productGroup === 'ST') {
        const stConfig = ST_DSO_CONFIG[dsoGrade];
        if (stConfig) {
          setPolicyRates(prev => ({ ...prev, 4: stConfig.addRate }));
          setPolicyEnabled(prev => ({ ...prev, 4: true }));  // 명시 ON
        }
      } else {
        const dsoG = SIM_DSO_GRADES.find(d => d.value === dsoGrade);
        if (dsoG) {
          setPolicyRates(prev => ({ ...prev, 4: dsoG.rate }));
          setPolicyEnabled(prev => ({ ...prev, 4: true }));  // 명시 ON
        }
      }
    }
  }, [dsoGrade, tradeType, productGroup]);

  // ---------- 거래 유형 변경 시 정책 4 활성화 토글 ----------
  useEffect(() => {
    setPolicyEnabled(prev => ({ ...prev, 4: tradeType === 'DSO' }));
  }, [tradeType]);

  // ---------- ST 제품은 일반치과 미공급 → 자동으로 DSO로 변경 ----------
  useEffect(() => {
    if (productGroup === 'ST' && tradeType !== 'DSO') {
      setTradeType('DSO');
    }
  }, [productGroup]);

  // ---------- ST 제품 선택 시 일부 정책 자동 비활성화 ----------
  //   ST 정책 구조:
  //     ✓ 정책 ② 특수정책 (2%) - ST 전용 요율
  //     ✓ 정책 ③ 현금결제 (3%)
  //     ✓ 정책 ④ DSO 추가증정 (S 20% / A 15% / B/C 10%)
  //   비활성화:
  //     ✗ 정책 ① 월목표달성
  //     ✗ 정책 ⑤ 분기 리베이트
  //     ✗ 정책 ⑥ 연도 리베이트
  useEffect(() => {
    if (productGroup === 'ST') {
      setPolicyEnabled(prev => ({
        ...prev,
        1: false,  // 월목표달성 OFF
        2: true,   // 특수정책 ON (2%)
        3: true,   // 현금결제 ON
        4: true,   // DSO 추가증정 ON (중요: 명시 ON)
        5: false,  // 분기 리베이트 OFF
        6: false,  // 연도 리베이트 OFF
      }));
      // ST 특수정책 요율 2% 자동 적용 (다른 제품은 2.5%)
      // ST DSO 추가증정 요율은 dsoGrade에 따라 별도 useEffect에서 동기화 (10/15/20%)
      setPolicyRates(prev => ({
        ...prev,
        2: 2,    // 특수정책 2%
        3: 3,    // 현금결제 3%
      }));
    } else {
      // ST가 아니면 다른 제품의 기본 특수정책 요율 적용 (SPECIAL_POLICY_RATE)
      const defaultRate = SPECIAL_POLICY_RATE[productGroup];
      if (defaultRate !== undefined) {
        setPolicyRates(prev => ({ ...prev, 2: defaultRate }));
        // 특수정책 0%인 제품(AR, BD)은 OFF
        setPolicyEnabled(prev => ({ ...prev, 2: defaultRate > 0 }));
      }
    }
  }, [productGroup]);

  // ---------- BD 제품 선택 시 BD장려금(정책 7번) 자동 활성화 ----------
  //   BD 외 제품은 정책 7번 자동 비활성화
  useEffect(() => {
    if (productGroup === 'BD') {
      setPolicyEnabled(prev => ({ ...prev, 7: true }));
      setPolicyRates(prev => ({ ...prev, 7: 1 }));  // BD장려 1% 고정
    } else {
      setPolicyEnabled(prev => ({ ...prev, 7: false }));
    }
  }, [productGroup]);

  // ---------- 핵심 가격 데이터 계산 ----------
  //   listPrice (기본가격) = SIM_LIST_PRICES (제품군별 권장 소비자가)
  //   applyRate (적용률)   = PRICE_POLICY_MARGIN
  //   supplyBase (공급가)  = listPrice / (1 + applyRate/100)
  //   listPriceMin/Max     = DENTAL_RECOMMENDED_PRICES (대리상 판매 권장가 범위, 수익성 요약표용)
  //   kitCost (키트 원가)  = exportPrices 의 selectedProduct.changeUSD × 환율 × 1.14 (입고가)
  const priceData = useMemo(() => {
    const applyRate = PRICE_POLICY_MARGIN[productGroup] || 30;
    const listPrice = SIM_LIST_PRICES[productGroup] || 0;  // 시뮬레이션 전용 기본가격
    const supplyBase = listPrice > 0 ? Math.round(listPrice / (1 + applyRate/100)) : 0;

    // 대리상 판매 권장가 범위 (수익성 요약표에 표시용)
    const dentalArr = (dentalPrices[productGroup] && dentalPrices[productGroup][kitCategory]) || [0, 0];
    const listPriceMin = dentalArr[0] || 0;
    const listPriceMax = dentalArr[dentalArr.length - 1] || 0;

    // 키트 원가 (CNY) = changeUSD × 환율 × 입고마진
    const selectedKit = exportPrices.find(p => p.group === productGroup && p.category === kitCategory);
    const kitCost = selectedKit ? Math.round(selectedKit.changeUSD * exchangeRate * IMPORT_MARGIN) : 0;

    return { applyRate, listPrice, listPriceMin, listPriceMax, supplyBase, kitCost, selectedKit };
  }, [productGroup, kitCategory, dentalPrices, exportPrices, exchangeRate]);

  // ---------- 계산 로직 (새 수식 체계) ----------
  // 정책별 계산 방식:
  //   ① 월목표달성 (denominator) → 분모에 % 추가
  //   ② 특수정책 (subtract_amount) → 기준가에서 금액 차감 (¥431 × 2.5% 등)
  //   ③ 현금결제 (multiply, 97折) → 곱셈 ×(1-3%) = ×97%
  //   ④ DSO 등급 (denominator) → 분모에 % 추가
  //   ⑤ 분기 (denominator) → 분모에 % 추가
  //   ⑥ 연도 (multiply) → 곱셈 ×(1-연도%)
  //      BD 제품일 경우: 연도+BD장려 묶어서 ×(1-연도%-BD장려%)
  //   ⑦ BD장려 (combined with 연도) → 별도 단계 없이 연도와 묶어서 처리
  //
  // 수식 예 (AO A등급 / 모든 정책 활성화):
  //   초기: 431
  //   ① 35%(기본) + 1%(목표): 431 / (1+0.35+0.01) = 317
  //   ② 특수 2.5%: (431 - 431×0.025) / (1+0.36) = 309
  //   ③ 현금 97折: (431 - 431×0.025) × 0.97 / (1+0.36) = 300
  //   ④ DSO 8%: (431 - 431×0.025) × 0.97 / (1+0.36+0.08) = ...
  //   ⑤ 분기 4%: (431 - 431×0.025) × 0.97 / (1+0.36+0.08+0.04) = 291 (DSO 없을 시)
  //   ⑥ 연도 3%: 위 값 × (1-0.03) = 282
  //   ⑦ BD장려 1%: BD제품인 경우 연도와 묶어서 (1-0.03-0.01) = 위 값 × 0.96

  const calculation = useMemo(() => {
    const { listPrice, supplyBase, kitCost, applyRate } = priceData;
    if (supplyBase <= 0 || listPrice <= 0) {
      return { steps: [], finalPrice: 0, totalDiscount: 0, totalDiscountRate: 0, appliedCount: 0, finalGP: 0, gpAvailable: false };
    }

    // ─────────────────────────────────────────────────
    // 정책환산GP 계산
    //   공식: GP = 1 - 정책반영원가 ÷ 정책반영기준가
    //   정책반영원가 = (임플란트원가 + KIT원가/KIT기준) × (1 + 제품증정 + 목표달성)
    //   정책반영기준가 = 단계별로 다름 (431, 431-10.8, ×97%, ×(1-연도%) 등)
    // ─────────────────────────────────────────────────
    const costData = SIM_COST_DATA[productGroup];
    const kitInfo = costData?.kits?.[kitCategory];
    const gpAvailable = !!(costData && kitInfo);  // 원가 데이터 있을 때만 GP 계산

    // 환산원가 기본값 (제품증정/목표달성 미적용 시)
    const baseUnitCost = gpAvailable
      ? costData.implantCost + kitInfo.kitCost / kitInfo.kitRatio
      : 0;

    // 각 단계별 GP 계산 함수
    //   ratedCostMultiplier: 원가 환산배수 (1 + 제품증정 + 목표달성)
    //   refBasePrice: 정책반영 기준가 (분모)
    const calcGP = (refBasePrice, ratedCostMultiplier) => {
      if (!gpAvailable || refBasePrice <= 0) return null;
      const ratedCost = baseUnitCost * ratedCostMultiplier;
      return (1 - ratedCost / refBasePrice) * 100;
    };

    const steps = [];

    // 단계 0: 초기 기준가
    steps.push({
      step: 0,
      name: "초기 기준가",
      rate: null, basePrice: listPrice, discount: null, finalPrice: listPrice,
      gp: null,  // 단계 0은 GP 없음
      method: 'base',
    });

    const r1_target  = policyEnabled[1] ? policyRates[1] / 100 : 0;
    const r2_special = policyEnabled[2] ? policyRates[2] / 100 : 0;
    const r3_cash    = policyEnabled[3] ? policyRates[3] / 100 : 0;
    const r4_dso     = (productGroup === 'ST' || policyEnabled[4]) ? policyRates[4] / 100 : 0;
    const r5_qtr     = policyEnabled[5] ? policyRates[5] / 100 : 0;
    const r6_year    = policyEnabled[6] ? policyRates[6] / 100 : 0;
    const r7_bd      = policyEnabled[7] ? policyRates[7] / 100 : 0;
    const baseRate   = applyRate / 100;

    let denom = 1 + baseRate;
    let numerator = listPrice;
    let multiplier = 1;

    // GP 계산용: 정책반영기준가 추적
    let gpRefBase = listPrice;          // 분모 기준가 (특수정책에서 reduce, 곱셈에서 multiply)
    let costMultiplier = 1 + baseRate;  // 원가 환산배수 (제품증정 + 목표달성)

    // 단계 1: 제품증정 35% (기본 공급가)
    let cur = numerator / denom;
    steps.push({
      step: 1,
      name: `제품증정 ${(baseRate*100).toFixed(0)}%`,
      rate: baseRate * 100,
      basePrice: listPrice,
      discount: Math.round((listPrice - cur) * 10) / 10,
      finalPrice: Math.round(cur),
      gp: calcGP(gpRefBase, costMultiplier),
      method: 'denominator',
    });

    let appliedCount = 0;

    // 단계 2: 월목표달성 (분모 더하기)
    if (policyEnabled[1]) {
      denom += r1_target;
      costMultiplier += r1_target;  // 원가도 함께 증가
      const before = cur;
      cur = numerator / denom;
      appliedCount += 1;
      steps.push({
        step: 1 + appliedCount,
        name: `월목표달성 ${(r1_target*100).toFixed(0)}%`,
        rate: r1_target * 100,
        basePrice: before,
        discount: Math.round((before - cur) * 10) / 10,
        finalPrice: Math.round(cur),
        gp: calcGP(gpRefBase, costMultiplier),
        method: 'denominator',
      });
    }

    // ─────────────────────────────────────────────────
    // 단계 3 & 4: 특수정책 ↔ DSO 순서
    // - 일반 제품(AO/AR/BD/ARi): 특수정책 → DSO
    // - ST 제품: DSO 추가증정 → 특수정책 (ST 전용 순서)
    //   ST는 첨부 4번 표에 따라 65% → DSO 추가증정 → 특수격려 → 현금결제 순서
    // ─────────────────────────────────────────────────
    const applySpecialPolicy = () => {
      if (policyEnabled[2]) {
        const amount = listPrice * r2_special;
        numerator = listPrice - amount;
        gpRefBase = gpRefBase - amount;  // GP 분모도 감소
        const before = cur;
        cur = numerator / denom;
        appliedCount += 1;
        steps.push({
          step: 1 + appliedCount,
          name: `특수정책 ${(r2_special*100)}%`,
          rate: r2_special * 100,
          basePrice: before,
          discount: Math.round((before - cur) * 10) / 10,
          finalPrice: Math.round(cur),
          gp: calcGP(gpRefBase, costMultiplier),
          method: 'subtract_amount',
          returnAmount: Math.round(amount * 10) / 10,
        });
      }
    };

    const applyDsoPolicy = () => {
      // ST 제품은 정책 4 ON/OFF와 무관하게 DSO 추가증정 항상 적용
      // 일반 제품은 정책 4가 ON일 때만 적용
      const shouldApply = tradeType === 'DSO' && (productGroup === 'ST' || policyEnabled[4]);
      if (shouldApply) {
        denom += r4_dso;
        costMultiplier += r4_dso;
        const before = cur;
        cur = (numerator / denom) * multiplier;
        appliedCount += 1;
        steps.push({
          step: 1 + appliedCount,
          name: productGroup === 'ST'
            ? `DSO 추가증정 ${(r4_dso*100).toFixed(0)}%`
            : `DSO 등급 ${(r4_dso*100).toFixed(0)}%`,
          rate: r4_dso * 100,
          basePrice: before,
          discount: Math.round((before - cur) * 10) / 10,
          finalPrice: Math.round(cur),
          gp: calcGP(gpRefBase, costMultiplier),
          method: 'denominator',
        });
      }
    };

    if (productGroup === 'ST') {
      // ST 순서: DSO 추가증정 → 특수정책
      applyDsoPolicy();
      applySpecialPolicy();
    } else {
      // 일반 제품 순서: 특수정책 → DSO
      applySpecialPolicy();
      applyDsoPolicy();
    }

    // 단계 5: 현금결제 97折 (곱셈) - GP 분모도 곱셈
    if (policyEnabled[3]) {
      multiplier *= (1 - r3_cash);
      gpRefBase = gpRefBase * (1 - r3_cash);
      const before = cur;
      cur = (numerator / denom) * multiplier;
      appliedCount += 1;
      steps.push({
        step: 1 + appliedCount,
        name: `현금결제 3%`,
        rate: r3_cash * 100,
        basePrice: before,
        discount: Math.round((before - cur) * 10) / 10,
        finalPrice: Math.round(cur),
        gp: calcGP(gpRefBase, costMultiplier),
        method: 'multiply',
      });
    }

    // 단계 6: 분기 리베이트 (분모 더하기) - GP: 원가 환산배수에 추가
    if (policyEnabled[5]) {
      denom += r5_qtr;
      costMultiplier += r5_qtr;  // 원가도 함께 증가
      const before = cur;
      cur = (numerator / denom) * multiplier;
      appliedCount += 1;
      steps.push({
        step: 1 + appliedCount,
        name: `분기 리베이트 ${(r5_qtr*100).toFixed(0)}%`,
        rate: r5_qtr * 100,
        basePrice: before,
        discount: Math.round((before - cur) * 10) / 10,
        finalPrice: Math.round(cur),
        gp: calcGP(gpRefBase, costMultiplier),
        method: 'denominator',
      });
    }

    // 단계 7: 연도 리베이트 (곱셈) - GP 분모도 곱셈
    if (policyEnabled[6] || policyEnabled[7]) {
      const yearTotal = r6_year + r7_bd;
      multiplier *= (1 - yearTotal);
      gpRefBase = gpRefBase * (1 - yearTotal);
      const before = cur;
      cur = (numerator / denom) * multiplier;
      appliedCount += 1;
      const nameLabel = policyEnabled[7]
        ? `연도 리베이트 ${(r6_year*100).toFixed(0)}% + BD장려 ${(r7_bd*100).toFixed(0)}%`
        : `연도 리베이트 ${(r6_year*100).toFixed(0)}%`;
      steps.push({
        step: 1 + appliedCount,
        name: nameLabel,
        rate: yearTotal * 100,
        basePrice: before,
        discount: Math.round((before - cur) * 10) / 10,
        finalPrice: Math.round(cur),
        gp: calcGP(gpRefBase, costMultiplier),
        method: 'multiply',
      });
    }

    const finalPrice = Math.round(cur);
    const totalDiscount = Math.round((supplyBase - finalPrice) * 10) / 10;
    const totalDiscountRate = (totalDiscount / supplyBase) * 100;
    const finalGP = calcGP(gpRefBase, costMultiplier);

    return { steps, finalPrice, totalDiscount, totalDiscountRate, appliedCount, finalGP, gpAvailable };
  }, [priceData, policyEnabled, policyRates, productGroup, kitCategory, tradeType]);

  // ---------- 대리상 수익성 요약 (첨부 양식: 거래유형별 분기) ----------
  // 일반치과: 대리상 등급(A/B/C/D) × 판매가(330/350) = 8행
  // DSO치과:  DSO등급(S/A/B/C) × 대리상등급(A/B/C/D) = 12행
  //
  // 첨부 7번 핵심 공식:
  //   공급가는 기준가에서 특수격려 반환금을 차감한 뒤, 제품증정+목표달성+DSO+분기를
  //   분모에 반영하여 계산하고, 현금결제(97折) 후 연도 리베이트를 현금성 차감으로 적용.
  //
  //   최종 공급가 = (기준가-반환금) × 97% / (1+제품증정+목표달성+DSO+분기) × (1-연도)
  //
  //   본사 GP (정책환산):
  //     원가 환산 = baseUnitCost × (1+제품증정+목표달성+DSO+분기)
  //     분모 (정책반영기준가) = (기준가-반환금) × 97% × (1-연도)
  //     GP = 1 - 원가환산 / 분모
  //
  //   대리상 수익 = 판매가 - 공급가
  //   대리상 마진율 = 수익 / 판매가
  //
  //   ※ 수익성 요약표는 정책 표준 시나리오로 항상 계산:
  //      - 목표달성 1%, 특수격려, 현금결제 97折 항상 적용
  //      - 분기/연도 리베이트는 대리상 등급에 따라 자동 적용
  const profitSummary = useMemo(() => {
    const { listPrice, applyRate } = priceData;
    if (listPrice <= 0) return { type: 'none', rows: [] };

    // 표준 시나리오 정책률
    //   ST: 월목표/특수/분기/연도 모두 미적용 → r1_target=0, specialRate=0, qtrRate=0, yearRate=0
    //   다른 제품: 표준 정책 적용
    const isST = productGroup === 'ST';
    const r1_target  = isST ? 0 : 0.01;   // 월목표달성 (ST는 0)
    const r3_cash    = 0.03;              // 현금결제 3% (97折, 항상 적용)
    const baseRate   = applyRate / 100;

    // 제품군별 특수정책 요율 (ST는 0)
    const specialRate = isST ? 0 : ((SPECIAL_POLICY_RATE[productGroup] || 0) / 100);
    const refundAmount = listPrice * specialRate;
    const adjusted = (listPrice - refundAmount) * (1 - r3_cash);

    // 환산원가 데이터
    const costData = SIM_COST_DATA[productGroup];
    const kitInfo = costData?.kits?.[kitCategory];
    const gpAvailable = !!(costData && kitInfo);

    // 공통 계산 함수
    //   dsoRate: DSO 정책률 (0이면 일반치과)
    //   dealerG: 대리상 등급 객체 ({qtr, year, bdBonus})
    //   sellPrice: 판매가 기준
    const calcRow = (dsoRate, dealerG, sellPrice) => {
      // ST는 분기/연도/BD장려 모두 미적용
      const qtrRate  = isST ? 0 : (dealerG.qtr / 100);
      const yearRate = isST ? 0 : (dealerG.year / 100);
      const bdRate   = (productGroup === 'BD') ? (dealerG.bdBonus / 100) : 0;
      const yearTotal = yearRate + bdRate;

      // 최종 공급가
      // 일반 제품: (기준가-반환금) × 97% / (1+제품증정+목표달성+DSO+분기) × (1-연도-BD장려)
      // ST: (기준가) × 97% / (1+제품증정+DSO 추가증정)
      const denom = 1 + baseRate + r1_target + (dsoRate / 100) + qtrRate;
      const yearMult = (1 - yearTotal);
      const supply = Math.round((adjusted / denom) * yearMult);

      // 본사 정책환산GP
      let hqGP = null;
      if (gpAvailable) {
        const costMult = 1 + baseRate + r1_target + (dsoRate / 100) + qtrRate;
        // 원가 = 임플란트 × costMult + KIT × costMult / KIT기준
        const ratedCost = costData.implantCost * costMult
                        + kitInfo.kitCost * costMult / kitInfo.kitRatio;
        const refBase = adjusted * yearMult;
        hqGP = refBase > 0 ? (1 - ratedCost / refBase) * 100 : null;
      }

      // 대리상 수익 / 마진율
      const profit = sellPrice - supply;
      const margin = sellPrice > 0 ? (profit / sellPrice) * 100 : 0;

      return { supply, hqGP, profit, margin };
    };

    // 제품별 판매가 설정 가져오기
    const sellConfig = SIM_SELL_PRICES[productGroup];
    if (!sellConfig) return { type: 'none', rows: [] };

    // 선택된 대리상 등급만 필터링하여 표시
    const selectedDealer = SIM_DEALER_GRADES.find(d => d.value === dealerGrade);
    if (!selectedDealer) return { type: 'none', rows: [] };

    if (tradeType === 'DSO') {
      const dsoConfig = sellConfig.dso;
      const rows = [];

      if (dsoConfig.structure === 'per_dso') {
        // 구조 A: DSO 등급별 판매가 다름 (AO, AR, ST)
        //   선택된 대리상 등급 + 선택된 DSO 등급 = 1행만
        const dsoValueMap = { 'S': 'S', 'A': 'A', 'B/C': 'BC' };
        const selectedDsoValue = dsoValueMap[dsoGrade] || 'S';
        const selectedDso = dsoConfig.list.find(d => d.dsoGrade === selectedDsoValue);
        if (selectedDso) {
          const r = calcRow(selectedDso.dsoRate, selectedDealer, selectedDso.sellPrice);
          rows.push({
            dsoGrade: selectedDso.dsoLabel,
            dealerGrade: selectedDealer.value,
            sellPrice: selectedDso.sellPrice,
            ...r,
          });
        }
      } else if (dsoConfig.structure === 'uniform') {
        // 구조 B: DSO 등급 무관 동일 판매가 2종 (BD, ARi)
        //   선택된 대리상 등급 + 선택된 DSO 등급 × 판매가 2종 = 2행
        const dsoValueMap = { 'S': 'S', 'A': 'A', 'B/C': 'BC' };
        const selectedDsoValue = dsoValueMap[dsoGrade] || 'S';
        const selectedDso = dsoConfig.list.find(d => d.dsoGrade === selectedDsoValue);
        if (selectedDso) {
          dsoConfig.sellPrices.forEach(sp => {
            const r = calcRow(selectedDso.dsoRate, selectedDealer, sp);
            rows.push({
              dsoGrade: selectedDso.dsoLabel,
              dealerGrade: selectedDealer.value,
              sellPrice: sp,
              ...r,
            });
          });
        }
      }
      return { type: 'DSO', rows };
    } else {
      // 일반치과: 선택된 대리상등급의 판매가 2종 = 2행
      if (!sellConfig.general) return { type: 'none', rows: [] };
      const sellPrices = sellConfig.general;
      const rows = [];
      sellPrices.forEach(sp => {
        const r = calcRow(0, selectedDealer, sp); // DSO 정책률 = 0
        rows.push({
          dealerGrade: selectedDealer.value,
          sellPrice: sp,
          ...r,
        });
      });
      return { type: 'GENERAL', rows };
    }
  }, [priceData, productGroup, kitCategory, tradeType, dealerGrade, dsoGrade]);

  // ---------- 함수: Toast ----------
  const showToast = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2500);
  };

  // ---------- 함수: 초기화 ----------
  const handleReset = () => {
    if (!confirm("모든 입력을 초기화하시겠습니까?")) return;
    setProductGroup("AO");
    setTradeType("일반치과");
    setDealerGrade("A");
    setDsoGrade("S");
    setPolicyEnabled({ 1: true, 2: true, 3: true, 4: false, 5: true, 6: true, 7: false });
    setPolicyRates({ 1: 1, 2: 2.5, 3: 3, 4: 8, 5: 4, 6: 3, 7: 1 });
    showToast("초기화 완료");
  };

  // ---------- 함수: 이력저장 모달 열기 ----------
  const handleOpenHistoryModal = () => {
    // 자동 제목 (사용자가 비어두면 이 값 사용)
    const autoTitle = `${productGroup} ${kitCategory} / ${dealerGrade}급 / ${tradeType === 'DSO' ? `DSO ${dsoGrade}급` : '민영치과'}`;
    setHistoryTitle(autoTitle);
    setHistoryNote('');
    setShowHistoryModal(true);
  };

  // ---------- 함수: 이력저장 확정 ----------
  const handleConfirmSaveHistory = () => {
    const title = historyTitle.trim() || `${productGroup} ${kitCategory} / ${dealerGrade}급`;
    const entry = {
      id: `sim_${Date.now()}`,
      savedAt: new Date().toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
      title,
      note: historyNote.trim(),
      productGroup, productCategory: kitCategory, kitCategory,
      grade: dealerGrade, dealerGrade, dsoGrade, tradeType,
      policyEnabled: { ...policyEnabled },
      policyRates: { ...policyRates },
      finalPrice: calculation.finalPrice,
      finalGP: calculation.finalGP,
      totalDiscountRate: calculation.totalDiscountRate,
      totalDiscount: calculation.totalDiscount,
      appliedCount: calculation.appliedCount,
      // 가격 시뮬레이션 단계별 결과 저장
      calculationSteps: calculation.steps.map(s => ({
        step: s.step, name: s.name, rate: s.rate,
        basePrice: s.basePrice, discount: s.discount,
        finalPrice: s.finalPrice, gp: s.gp,
      })),
      // 대리상 수익성 요약 저장
      profitSummary: {
        type: profitSummary.type,
        rows: profitSummary.rows ? profitSummary.rows.map(r => ({ ...r })) : [],
      },
      // 기준 정보
      listPrice: priceData.listPrice,
      applyRate: priceData.applyRate,
      supplyBase: priceData.supplyBase,
      // 기존 필드와의 호환
      exportPrice: priceData.selectedKit?.changeUSD || 0,
      exchangeRate,
      targetPct: policyEnabled[1] ? policyRates[1] : 0,
      cashPct: policyEnabled[3] ? policyRates[3] : 0,
      dsoPct: policyEnabled[4] ? policyRates[4] : 0,
      qtrPct: policyEnabled[5] ? policyRates[5] : 0,
      yearPct: policyEnabled[6] ? policyRates[6] : 0,
      bdBonusPct: policyEnabled[7] ? policyRates[7] : 0,
      cnyImport: priceData.kitCost,
      supplyCNY: priceData.supplyBase,
      dealerFinalCNY: calculation.finalPrice,
      dentalRecommendedCNY: priceData.listPriceMin,
      headOfficGP: calculation.finalGP,
      corporateGP: calculation.finalGP,
      dealerGP: calculation.finalGP,
    };
    setSimHistory(prev => [entry, ...prev]);
    setShowHistoryModal(false);
    setHistoryTitle('');
    setHistoryNote('');
    showToast("이력이 저장되었습니다");
  };

  // ---------- 함수: localStorage 저장 ----------
  const handleSave = () => {
    const payload = {
      productGroup, kitCategory, tradeType, dealerGrade, dsoGrade,
      policyEnabled, policyRates,
      savedAt: new Date().toISOString(),
    };
    try {
      localStorage.setItem("price_sim_current_v46", JSON.stringify(payload));
      showToast("현재 시뮬레이션이 저장되었습니다");
    } catch {
      showToast("저장 실패", "error");
    }
  };

  // ---------- 함수: CSV 다운로드 ----------
  const handleDownload = () => {
    const rows = [
      ["가격 시뮬레이션 결과"],
      ["제품군", productGroup, "키트", kitCategory],
      ["기본가격", `¥${priceData.listPrice}`, "적용률", `${priceData.applyRate}%`],
      ["공급가(기준)", `¥${priceData.supplyBase}`, "키트원가(입고가CNY)", `¥${priceData.kitCost}`],
      ["거래유형", tradeType, "대리상 등급", dealerGrade],
      [],
      ["단계", "정책/항목", "방식", "적용률(%)", "기준가", "할인금액", "공급가", "정책환산GP(%)"],
      ...calculation.steps.map(s => [
        s.step, s.name,
        s.method === "denominator" ? "분모" : (s.method === "subtract_amount" ? "금액차감" : (s.method === "multiply" ? "곱셈" : "-")),
        s.rate === null ? "-" : s.rate.toFixed(1),
        Math.round(s.basePrice),
        s.discount === null ? "-" : -s.discount,
        s.finalPrice,
        s.gp === null ? "-" : s.gp.toFixed(1),
      ]),
      [],
      ["최종 공급가", calculation.finalPrice],
      ["최종 정책환산GP", calculation.finalGP === null ? "-" : (calculation.finalGP.toFixed(1) + "%")],
      ["총 할인율(누적)", calculation.totalDiscountRate.toFixed(2) + "%"],
      ["총 할인금액", -calculation.totalDiscount],
      ["적용 정책 수", calculation.appliedCount + "개"],
    ];
    const csv = "\uFEFF" + rows.map(r => r.join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `가격시뮬레이션_${productGroup}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("계산내역이 다운로드되었습니다");
  };

  // ============================================================
  // 렌더링
  // ============================================================
  return (
    <div className="p-6 lg:p-8 bg-slate-50 min-h-full">

    return m;
  } catch(e) { return costDefaultData(); }
}

// GP 적정성 3단계 판정 (적정/양호/주의)
function costGrade(v, good, ok) {
  // v: 비율(0~1), ok: 적정 임계, good: 양호 임계
  const pct = v*100;
  const okP = ok*100, goodP = good*100;
  const tip = `적정: ${okP}% 이상\n양호: ${goodP}~${okP}% 미만\n주의: ${goodP}% 미만`;
  if (v >= ok) return { grade:"적정", tip };
  if (v >= good) return { grade:"양호", tip };
  return { grade:"주의", tip };
}

function costCompute(d) {
  const cur = d.systems[d.selectedSystem];
  const impMakeCost = Number(cur.makeCost)||0;         // 임플란트 제조원가 입력
  const kitMakeCost = Number(cur.kitMakeCost)||0;      // 키트 제조원가 입력
  const basePrice = Number(cur.basePrice)||0;          // 치과 판매금액(기본단가)
  const impExport = Number(cur.impExport)||24.5;       // 수출단가 (임의, 기본 24.5)
  const cnyUsd = Number(d.cnyUsd)||0, krwUsd = Number(d.krwUsd)||0;
  const N = Number(d.freeBonus)||0, kitDivisor = Number(d.kitDivisor)||80, loss = Number(d.lossCost)||0;
  const corpCoef = 1.14;
  const paid = 10, total = 10 + N;                     // 유상 10, 총 10+N

  // 수량적용 임플란트 제조원가 = (제조원가 × (10+N)) / 10
  const qtyMakeCost = (impMakeCost * total) / paid;
  // 키트 개당분산 = 키트 제조원가 ÷ 키트 증정기준
  const kitContrib = kitMakeCost / kitDivisor;
  // 키트적용 임플란트 제조원가 = 수량적용 + 키트분산
  const makeCost = qtyMakeCost + kitContrib;

  const exportPrice = impExport;                       // 수출단가 (임의 24.5)
  const hqGP = exportPrice>0 ? (1 - makeCost/exportPrice) : 0; // 본사 GP

  // 법인매입단가 = 수출단가 × 환율 × 1.14
  const corpBuyUnit = exportPrice * cnyUsd * corpCoef;
  // 대리상판매단가 = 치과판매금액 × (10/(10+N)) × 손실
  const dealerSellUnit = total>0 ? (basePrice * (paid/total) * loss) : 0;
  const corpGP = dealerSellUnit>0 ? (1 - corpBuyUnit/dealerSellUnit) : 0; // 법인 GP

  // 치과판매금액 → 실치과판매금액 = 치과 × 손실
  const dentalUnit = basePrice * loss;
  const dealerGP = dentalUnit>0 ? (1 - dealerSellUnit/dentalUnit) : 0; // 대리상 GP

  // KIT 매입단가 개당 = 키트제조원가 ÷ 증정수량(총수량÷증정기준)
  const kitGiftQty = total / kitDivisor;
  const kitBuyPer = kitGiftQty>0 ? (kitMakeCost / kitGiftQty) : 0;

  const paidQty = 100, freeQty = paidQty * N / 10;
  const totalFixture = paidQty + freeQty, donutKitQty = totalFixture / kitDivisor, totalQty = totalFixture + donutKitQty;

  return {
    system:d.selectedSystem, impExport, exportPrice, makeCost, qtyMakeCost, basePrice,
    hqGP, corpBuyUnit, dealerSellUnit, corpGP, dentalUnit, dealerGP,
    kitBuyPer, N,
    paidQty, freeQty, kitQty:donutKitQty, totalQty,
    metrics: [
      { key:"임플란트 제조원가", u:"USD/개", v:fmt(impMakeCost,1), f:"입력값", cls:"text-slate-700", chk:null },
      { key:"키트 제조원가", u:"USD/개", v:fmt(kitMakeCost,1), f:"입력값", cls:"text-slate-500", chk:null },
      { key:"수량적용 제조원가", u:"USD/개", v:fmt(qtyMakeCost,1), f:"(제조원가 × "+total+") ÷ 10", cls:"text-slate-700", chk:null },
      { key:"키트적용 제조원가", u:"USD/개", v:fmt(makeCost,1), f:"수량적용 제조원가 + (키트 제조원가 ÷ "+kitDivisor+")", cls:"font-bold text-slate-800", chk:null },
      { key:"수출단가", u:"USD/개", v:fmt(exportPrice,1), f:"입력값(임의 산정)", cls:"text-red-600 font-bold", chk:null },
      { key:"본사 GP", u:"%", v:fmt(hqGP*100,1), f:"1 − 키트적용 제조원가 ÷ 수출단가", cls:"font-bold text-slate-800", chk: costGrade(hqGP, 0.50, 0.70) },
      { key:"법인매입단가", u:"RMB/개", v:fmt(corpBuyUnit,1), f:"수출단가 × "+fmt(cnyUsd,1)+" × 1.14", cls:"text-slate-700", chk:null },
      { key:"대리상판매단가", u:"RMB/개", v:fmt(dealerSellUnit,1), f:"치과판매금액 × (10 ÷ "+total+") × "+fmt(loss,1), cls:"text-blue-600 font-bold", chk:null },
      { key:"법인 GP", u:"%", v:fmt(corpGP*100,1), f:"1 − 법인매입단가 ÷ 대리상판매단가", cls:"text-emerald-600 font-bold", chk: costGrade(corpGP, 0.30, 0.45) },
      { key:"치과판매금액", u:"RMB/개", v:fmt(basePrice,1), f:"입력값", cls:"text-slate-700", chk:null },
      { key:"실치과판매금액", u:"RMB/개", v:fmt(dentalUnit,1), f:"치과판매금액 × "+fmt(loss,1), cls:"text-slate-700", chk:null },
      { key:"대리상 GP", u:"%", v:fmt(dealerGP*100,1), f:"1 − 대리상판매단가 ÷ 실치과판매금액", cls:"text-purple-600 font-bold", chk: costGrade(dealerGP, 0.15, 0.30) },
    ],
  };
}

function CostDonut({ data }) {
  const total = data.reduce((s,d)=>s+d.value,0) || 1;
  let acc = 0; const R=70, r=45, cx=90, cy=90;
  const arcs = data.map(d=>{
    const a0 = acc/total*2*Math.PI - Math.PI/2; acc += d.value;
    const a1 = acc/total*2*Math.PI - Math.PI/2;
    const large = (a1-a0) > Math.PI ? 1 : 0;
    const x0=cx+R*Math.cos(a0), y0=cy+R*Math.sin(a0), x1=cx+R*Math.cos(a1), y1=cy+R*Math.sin(a1);
    const xi1=cx+r*Math.cos(a1), yi1=cy+r*Math.sin(a1), xi0=cx+r*Math.cos(a0), yi0=cy+r*Math.sin(a0);
    return { d:`M ${x0} ${y0} A ${R} ${R} 0 ${large} 1 ${x1} ${y1} L ${xi1} ${yi1} A ${r} ${r} 0 ${large} 0 ${xi0} ${yi0} Z`, fill:d.fill };
  });
  return (
    <div className="flex items-center gap-4">
      <svg width="180" height="180" viewBox="0 0 180 180">
        {arcs.map((a,i)=><path key={i} d={a.d} fill={a.fill}/>)}
        <text x="90" y="86" textAnchor="middle" className="fill-slate-400" fontSize="11">총 수량</text>
        <text x="90" y="106" textAnchor="middle" className="fill-slate-800" fontSize="16" fontWeight="bold">{fmt(total,1)} EA</text>
      </svg>
      <div className="space-y-1.5 text-sm">
        {data.map((d,i)=>(
          <div key={i} className="flex items-center gap-2">
            <span className="w-3 h-3 rounded-sm inline-block" style={{background:d.fill}}></span>
            <span className="text-slate-600">{d.name}</span>
            <span className="font-semibold text-slate-800">{fmt(d.value,1)} EA</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function CostLine({ data, series, xKey, w=420, h=240, refX }) {
  const pad = { t:20, r:14, b:30, l:36 };
  const innerW = w - pad.l - pad.r, innerH = h - pad.t - pad.b;
  const allVals = data.flatMap(d=>series.map(s=>d[s.key])).filter(v=>v!=null);
  const maxV = Math.max(...allVals, 10), minV = Math.min(...allVals, 0);
  const yMax = Math.ceil(maxV/10)*10, yMin = Math.floor(minV/10)*10;
  const xN = data.length;
  const xPos = i => pad.l + (xN<=1?innerW/2:innerW*i/(xN-1));
  const yPos = v => pad.t + innerH*(1-(v-yMin)/((yMax-yMin)||1));
  const ticks = []; for(let v=yMin; v<=yMax; v+=Math.max(10,Math.round((yMax-yMin)/4/10)*10)) ticks.push(v);
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`}>
      {ticks.map((t,i)=>(
        <g key={i}>
          <line x1={pad.l} y1={yPos(t)} x2={w-pad.r} y2={yPos(t)} stroke="#e2e8f0" strokeDasharray="3 3"/>
          <text x={pad.l-6} y={yPos(t)+3} textAnchor="end" className="fill-slate-400" fontSize="9">{t}%</text>
        </g>
      ))}
      {data.map((d,i)=>(
        <text key={i} x={xPos(i)} y={h-12} textAnchor="middle" className="fill-slate-400" fontSize="9">{d[xKey]}</text>
      ))}
      {refX!=null && (()=>{ const idx=data.findIndex(d=>String(d[xKey])===String(refX)); if(idx<0) return null;
        return <line x1={xPos(idx)} y1={pad.t} x2={xPos(idx)} y2={pad.t+innerH} stroke="#94a3b8" strokeDasharray="4 4"/>; })()}
      {series.map((s,si)=>{
        const pts = data.map((d,i)=> d[s.key]==null?null:`${xPos(i)},${yPos(d[s.key])}`).filter(Boolean).join(" ");
        return (
          <g key={si}>
            <polyline points={pts} fill="none" stroke={s.color} strokeWidth="2"/>
            {data.map((d,i)=> d[s.key]==null?null:<circle key={i} cx={xPos(i)} cy={yPos(d[s.key])} r="2.5" fill={s.color}/>)}
          </g>
        );
      })}
    </svg>
  );
}

function CostSimPage() {

  useEffect(()=>{ try{ localStorage.setItem(COST_LS, JSON.stringify(d)); }catch(e){} }, [d]);

  const c = costCompute(d);
  const cur = d.systems[d.selectedSystem];
  const setCommon = (k,v)=> setD(p=>({...p,[k]:v}));
  const setSys = (k,v)=> setD(p=>({...p, systems:{...p.systems, [p.selectedSystem]:{...p.systems[p.selectedSystem],[k]:v}}}));

  const trend = (()=>{
    const arr=[]; const base=Number(cur.impExport)||24.5;
    const start=Math.max(1,base*0.6), end=base*1.4, step=(end-start)/9;
    for(let i=0;i<=9;i++){ const p=+(start+step*i).toFixed(2);
      const tmp=JSON.parse(JSON.stringify(d)); tmp.systems[tmp.selectedSystem].impExport=p;
      const cc=costCompute(tmp);
      arr.push({ price:p.toFixed(1), corp:+(cc.corpGP*100).toFixed(1), dealer:+(cc.dealerGP*100).toFixed(1) }); }
    return arr;
  })();
  const donut = [
    { name:"유상 판매", value:+c.paidQty.toFixed(1), fill:"#3b82f6" },
    { name:"무상 증정", value:+c.freeQty.toFixed(1), fill:"#22c55e" },
    { name:"KIT 증정", value:+c.kitQty.toFixed(1), fill:"#f59e0b" },
  ];

  const saveSnapshot = () => {
    const now = new Date();

      corpGP:c.corpGP, dentalUnit:c.dentalUnit, dealerGP:c.dealerGP,
    };
    const next = [record, ...history];
    setHistory(next);
    try{ localStorage.setItem(COST_HIST_LS, JSON.stringify(next)); }catch(e){}

function App() {
  const [activeMenu, setActiveMenu] = useState('export');
  const [policyTab, setPolicyTab] = useState('export');   // 수출가 정책 / 수출가 변경이력
  const [simTab, setSimTab] = useState('sim-main');        // 대리상가격 / 이력 / 네고
  const [exportPrices, setExportPrices] = useState(INITIAL_EXPORT_PRICES);
  const [exchangeRate, setExchangeRate] = useState(DEFAULT_EXCHANGE_RATE);
  const [dentalPrices, setDentalPrices] = useState(DENTAL_RECOMMENDED_PRICES);
  const [history, setHistory] = useState([]);  // 수출가 변경이력 (최신순)
  const [simHistory, setSimHistory] = useState([]);  // 시뮬레이션 이력 (최신순)
  const [saveStatus, setSaveStatus] = useState('');
  const [negoSource, setNegoSource] = useState(null);  // 네고 시뮬레이션 - 가격시뮬레이션에서 직접 전달

  // 로컬스토리지 불러오기 (옛 용어 자동 마이그레이션 + ARi 자동 추가)
  useEffect(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed.exportPrices) {
          let migrated = parsed.exportPrices.map(r => ({
            ...r,
            category: (r.category || '')
              .replace(/种植体/g, '임플란트')
              .replace(/표준工具盒/g, '표준키트')
              .replace(/고배율工具盒/g, '풀키트')
              .replace(/工具盒/g, '키트'),
            importPolicy: (r.importPolicy || '').replace(/工具盒/g, '키트'),
          }));

          // ARi 시스템 누락 시 자동 추가 (BD 데이터 카피)
          const hasARi = migrated.some(r => r.group === 'ARi');
          if (!hasARi) {
            const bdRows = migrated.filter(r => r.group === 'BD');
            if (bdRows.length > 0) {
              const ariRows = bdRows.map(r => ({
                ...r,
                id: r.id.replace(/^BD-/, 'ARi-') || `ARi-${Date.now()}-${Math.random()}`,
                group: 'ARi',
              }));
              // BD 뒤에 ARi 삽입
              const bdLastIdx = migrated.map(r => r.group).lastIndexOf('BD');
              migrated = [
                ...migrated.slice(0, bdLastIdx + 1),
                ...ariRows,
                ...migrated.slice(bdLastIdx + 1)
              ];
              console.log('[Migration] ARi 시스템 자동 추가됨');
            }
          }
          setExportPrices(migrated);
        }
        if (parsed.exchangeRate) setExchangeRate(parsed.exchangeRate);
        if (parsed.dentalPrices) setDentalPrices({ ...DENTAL_RECOMMENDED_PRICES, ...parsed.dentalPrices });
        if (parsed.history && Array.isArray(parsed.history)) {
          const migratedHistory = parsed.history.map(h => ({
            ...h,
            exportPrices: (h.exportPrices || []).map(r => ({
              ...r,
              category: (r.category || '')
                .replace(/种植体/g, '임플란트')
                .replace(/표준工具盒/g, '표준키트')
                .replace(/고배율工具盒/g, '풀키트')
                .replace(/工具盒/g, '키트'),
            }))
          }));
          setHistory(migratedHistory);
        }
        if (parsed.simHistory && Array.isArray(parsed.simHistory)) {
          setSimHistory(parsed.simHistory);
        }
        // ⚠️ 이전 버전의 대리상 가격정책 데이터는 더 이상 로드되지 않으며 다음 저장 시 자동 제거됨
      }
    } catch (e) { console.error(e); }
  }, []);

  // 자동 저장
  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ exportPrices, exchangeRate, dentalPrices, history, simHistory }));
    } catch (e) { console.error(e); }
  }, [exportPrices, exchangeRate, dentalPrices, history, simHistory]);

  // 변경이력 저장 (스냅샷 생성)
  const saveSnapshot = (note) => {
    const now = new Date();
    const savedAt = now.getFullYear() + '-' +
                    String(now.getMonth() + 1).padStart(2, '0') + '-' +
                    String(now.getDate()).padStart(2, '0') + ' ' +
                    String(now.getHours()).padStart(2, '0') + ':' +
                    String(now.getMinutes()).padStart(2, '0');
    const snapshot = {
      id: 'snap_' + now.getTime(),
      savedAt,
      note,
      exchangeRate,
      exportPrices: JSON.parse(JSON.stringify(exportPrices)),  // 깊은 복사
    };
    setHistory(prev => [snapshot, ...prev]);  // 최신순
    setSaveStatus('snapshot_saved');
    setTimeout(() => setSaveStatus(''), 2000);
  };

  // 스냅샷 복원
  const restoreSnapshot = (snap) => {
    setExportPrices(JSON.parse(JSON.stringify(snap.exportPrices)));
    setExchangeRate(snap.exchangeRate);
    setActiveMenu('export');  // 수출가 정책 페이지로 이동
  };

  const saveToSheets = async () => {
    setSaveStatus('saving');
    try {
      const payload = {
        action: 'savePricePolicy',
        timestamp: new Date().toISOString(),
        exportPrices, exchangeRate, dentalPrices, history, simHistory,
      };
      await fetch(GAS_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload),
      });
      setSaveStatus('saved');
      setTimeout(() => setSaveStatus(''), 2000);
    } catch (e) {
      console.error(e);
      setSaveStatus('error');
      setTimeout(() => setSaveStatus(''), 3000);
    }
  };

  const latestSnapshot = history[0] || null;

  return (
    <div className="flex h-screen bg-slate-50">
      <Sidebar activeMenu={activeMenu} setActiveMenu={setActiveMenu} />
      <main className="flex-1 overflow-y-auto">
        {saveStatus && (
          <div className={`fixed top-4 right-4 z-50 px-4 py-2 rounded-lg shadow-lg text-sm font-medium ${
            saveStatus === 'saving' ? 'bg-blue-600 text-white' :
            saveStatus === 'saved' ? 'bg-emerald-600 text-white' :
            saveStatus === 'snapshot_saved' ? 'bg-emerald-600 text-white' :
            'bg-red-600 text-white'
          }`}>
            {saveStatus === 'saving' && '⏳ 저장 중...'}
            {saveStatus === 'saved' && '✅ Sheets 저장 완료'}
            {saveStatus === 'snapshot_saved' && '📌 변경이력 저장 완료'}
            {saveStatus === 'error' && '❌ 저장 실패'}
          </div>
        )}
        {activeMenu === 'export' && (
          <div className="p-6">
            <div className="mb-4 border-b border-slate-200 flex gap-2">
              {[['export','수출가 정책'],['history','수출가 변경이력']].map(([k,label])=>(
                <button key={k} onClick={()=>setPolicyTab(k)}
                  className={"px-4 py-2 text-sm font-semibold border-b-2 -mb-px "+(policyTab===k?"border-blue-600 text-blue-700":"border-transparent text-slate-500")}>{label}</button>
              ))}
            </div>
            <div className="-mx-6 -mb-6">
              {policyTab === 'export' && (
                <ExportPricePage
                  data={exportPrices} setData={setExportPrices}
                  exchangeRate={exchangeRate} setExchangeRate={setExchangeRate}
                  onSave={saveToSheets}
                  onSaveSnapshot={saveSnapshot}
                  latestSnapshot={latestSnapshot}
                />
              )}
              {policyTab === 'history' && (
                <HistoryPage history={history} setHistory={setHistory} onRestore={restoreSnapshot} />
              )}
            </div>
          </div>
        )}
        {activeMenu === 'sim-main' && (
          <div className="p-6">
            <div className="mb-4 border-b border-slate-200 flex gap-2">
              {[['sim-main','대리상가격'],['sim-history','시뮬레이션 이력'],['sim-nego','네고 시뮬레이션']].map(([k,label])=>(
                <button key={k} onClick={()=>setSimTab(k)}
                  className={"px-4 py-2 text-sm font-semibold border-b-2 -mb-px "+(simTab===k?"border-blue-600 text-blue-700":"border-transparent text-slate-500")}>{label}</button>
              ))}
            </div>
            <div className="-mx-6 -mb-6">
              {simTab === 'sim-main' && <SimulationPage exportPrices={exportPrices} exchangeRate={exchangeRate} dentalPrices={dentalPrices} setDentalPrices={setDentalPrices} simHistory={simHistory} setSimHistory={setSimHistory} setActiveMenu={(k)=>{setActiveMenu('sim-main'); setSimTab(k);}} setNegoSource={setNegoSource} />}
              {simTab === 'sim-history' && <SimulationHistoryPage simHistory={simHistory} setSimHistory={setSimHistory} />}
              {simTab === 'sim-nego' && <NegoSimulationPage simHistory={simHistory} negoSource={negoSource} setNegoSource={setNegoSource} />}
            </div>
          </div>
        )}
        {activeMenu === 'cost-sim' && <CostSimPage />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
